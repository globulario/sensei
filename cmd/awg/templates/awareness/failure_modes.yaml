# Failure Modes — incidents that happened or could happen.
#
# Each entry documents a known failure: what triggers it, what it looks
# like, and how to fix it properly (not just the obvious-but-wrong way).
#
# The most valuable entries come from real incidents. After debugging a
# production issue, encode it here so the same class of bug is caught
# before it ships again.
#
# Schema:
#   id:                  unique.dotted.identifier
#   title:               short description
#   severity:            critical | high | degraded
#   status:              active | fixed | review_only
#   symptoms:            observable signs of the failure
#   root_cause:          technical explanation
#   trigger:             what event or condition causes this
#   architecture_fix:    the correct fix
#   forbidden_fixes:     anti-patterns that make it worse
#   related_invariants:  links to invariants.yaml entries

failure_modes:


# Incident Patterns — edit shapes that introduce bugs.
#
# Each entry describes a class of code change that has historically
# caused problems. When someone makes a similar edit, the briefing
# warns them about the pattern.
#
# Think of these as "if you're doing X, watch out for Y."
#
# Schema:
#   id:                  pat.identifier
#   title:               short name for the pattern
#   edit_shapes:         descriptions of the dangerous edit
#   failure_mode:        which failure_mode this triggers
#   files:               files where this pattern is most dangerous
#   lesson:              what the developer should know
#   required_tests:      tests to run after this kind of edit
#   wrong_fixes:         common but incorrect responses

incident_patterns:


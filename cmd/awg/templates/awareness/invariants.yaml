# Invariants — architectural rules that must always hold.
#
# Each invariant encodes a rule your codebase depends on. When someone
# (human or AI) edits a file protected by an invariant, the awareness
# briefing surfaces it before the edit is made.
#
# Start with your most painful past bugs. If it broke once and the fix
# was non-obvious, it belongs here.
#
# Schema:
#   id:                  unique.dotted.identifier (snake_case)
#   title:               short human description
#   severity:            critical | high | medium | low
#   status:              active | deprecated | review_only
#   protects.files:      list of file paths this invariant applies to
#   protects.symbols:    list of function/type names (optional)
#   forbidden_fixes:     patterns that look correct but are known-broken
#   required_tests:      tests that must pass when touching protected files
#   related_failure_modes: links to failure_modes.yaml entries


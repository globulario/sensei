<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="./dashboard.css" rel="stylesheet" />
  <title>Sensei architecture dashboard — globulario/sensei</title>
</head>
<body>
  <div class="cp-modebar">
    <strong class="cp-brand">Sensei — architecture dashboard</strong>
    <span id="cpSnapshotMeta" class="muted"></span>
  </div>

  <div id="controlPanel" class="cp">
    <div id="cpTopStrip" class="cp-topstrip" aria-label="Repository posture"></div>
    <div class="cp-body">
      <nav id="cpRail" class="cp-rail" aria-label="Ontology navigation"></nav>
      <section class="cp-center">
        <div id="cpChips" class="cp-chips" role="toolbar" aria-label="Attention and artifact filters"></div>
        <div id="cpList" class="cp-list" role="list" aria-live="polite"></div>
        <div id="cpPager" class="cp-pager"></div>
      </section>
      <aside id="cpHeader" class="cp-header-pane" aria-label="Selected artifact header"></aside>
    </div>
  </div>

  <footer class="footer">
    Read-only snapshot generated by CI from the <a href="https://github.com/globulario/sensei">Sensei</a> awareness graph — no mutation actions are available here.
    For the full interactive control panel (including the guarded architect-answer workflow), install the
    <a href="https://github.com/globulario/sensei/tree/main/editor/vscode">VS Code extension</a> or run <code>sensei serve</code> locally.
  </footer>

  <script src="./controlPanelFmt.js"></script>
  <script src="./controlPanel.js"></script>
</body>
</html>

# Copy this to .github/workflows/sensei.yml in YOUR repo.
# It reviews every pull request against your committed docs/awareness/ graph and
# writes a Markdown summary into the Actions job summary.
name: Sensei architectural review

on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so the PR diff resolves

      - uses: globulario/sensei-action@v1
        with:
          mode: advisory            # advisory (report, never blocks) | enforce (fail on a violation)
          # awareness-dir: docs/awareness
          # domain: github.com/you/yourrepo

# Example: enforce Sensei's architectural rules on every PR.
#
# Copy to .github/workflows/sensei-gate.yml in your repo. This is a CONTROL gate:
# it fails the PR when a change trips an `enforcement: block` rule in your
# awareness graph (a forbidden-fix shape, a boundary violation, …). Clean PRs
# pass. It never edits code.
#
# `sensei gate --enforce` exits:
#   0 — PASS      (no blocking finding)
#   1 — BLOCKED   (a change tripped an enforcement:block rule; see the log)
#   2 — CANNOT VERIFY (Sensei could not evaluate the diff — fails closed)
#
# Use `--report-only` instead of `--enforce` to start advisory (always exit 0)
# while you tune rules, then flip to `--enforce` to make it bite.

name: Sensei gate
on:
  pull_request:
    branches: ['**']

jobs:
  sensei-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base branch to diff against

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Sensei
        run: |
          curl -fsSL https://raw.githubusercontent.com/globulario/sensei/main/install.sh | sh
          # Or build from a vendored checkout: make sensei

      - name: Serve the awareness graph
        run: |
          sensei serve -no-seed &             # local Oxigraph + gRPC server
          sensei build                        # compile docs/awareness into the store
          for i in $(seq 1 15); do sensei metadata >/dev/null 2>&1 && break; sleep 1; done

      - name: Enforce architectural rules on the diff
        env:
          # Record every outcome (block/warn/allow + rules) to an evidence
          # ledger. Aggregate it later with `sensei evidence --log <path>` to get
          # "caught N drift incidents across M repos". Optional; omit to disable.
          SENSEI_EVENT_LOG: sensei-events.jsonl
        run: |
          sensei gate --enforce \
            --diff "origin/${{ github.base_ref }}...HEAD" \
            --repo-root .
          # exit 1 (blocked) or 2 (cannot verify) fails the job; 0 passes.

      # Optional: persist the ledger so evidence accrues across runs/repos.
      - name: Upload evidence ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sensei-events
          path: sensei-events.jsonl
          if-no-files-found: ignore

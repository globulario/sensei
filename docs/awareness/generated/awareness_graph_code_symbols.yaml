    symbol: TestAdvanceWaitsToPerformMutationThenVerify
    package: tasksession
    language: go
    doc: "TestAdvanceWaitsToPerformMutationThenVerify: after a decision the next action is\nconsume_capability; after consumption it is perform_mutation (a single step, not\n\"apply then verify\"). Each step is exactly one action."
  - id: golang/architecture/tasksession/advance_result_test.go:TestNextActionTableIsSingleStep

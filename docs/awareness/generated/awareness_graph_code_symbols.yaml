  - id: golang/coverage/runtimeboundary_ownership_test.go:TestRuntimeBoundaryOwnershipBoundary
    file: golang/coverage/runtimeboundary_ownership_test.go
    symbol: TestRuntimeBoundaryOwnershipBoundary
    package: coverage
    language: go
    doc: "TestRuntimeBoundaryOwnershipBoundary proves the Phase 9.7 CP1 owner boundary statically: the\nruntimeboundary package is a PURE, transport-neutral assessment owner. It imports only stdlib plus\nthe closure-protocol primitives and the RDF vocabulary; it emits no RDF, has no write-verb surface,\nand is not re-implemented by any consumer. This enforces \"observed traffic cannot create\narchitecture\" structurally — the owner can neither mutate nor project runtime data into the graph."
  - id: golang/coverage/runtimeboundarycompose_ownership_test.go:TestRuntimeBoundaryComposeOwnershipBoundary
    file: golang/coverage/runtimeboundarycompose_ownership_test.go
    symbol: TestRuntimeBoundaryComposeOwnershipBoundary
    package: coverage
    language: go
    doc: "TestRuntimeBoundaryComposeOwnershipBoundary proves the Phase 9.7 CP3 anti-doppelgänger DAG\nstatically. Runtime-boundary truth reaches the control panel through ONE bridge package that\nprojects an already-decided verdict verbatim; no downstream surface re-derives runtime-boundary\nsemantics.\n\n\truntimeboundarycompose ──► runtimeboundary   (reads a.Verdict; never re-assesses)\n\t         └────────────────► controlstate      (fills its typed DimensionObservation)\n\ncontrolstate must NOT import runtimeboundary (else it could reach the verdict logic and recompute);\nruntimeboundary must NOT import controlstate; the server carries the runtime dimension through the\ngeneric transport and never imports the runtimeboundary owner directly."
  - id: golang/coverage/runtimeprobe_ownership_test.go:TestRuntimeProbeOwnershipBoundary
    file: golang/coverage/runtimeprobe_ownership_test.go
    symbol: TestRuntimeProbeOwnershipBoundary
    package: coverage
    language: go
    doc: "TestRuntimeProbeOwnershipBoundary proves the Phase 9.7 CP2 adapter boundary statically: the PURE\nruntimeprobe core imports only the runtimeboundary owner + closureprotocol receipt primitives — NOT\nthe os-tainted probe package, and nothing transport/store/mutation. The single seam that reads\nprobe.ProbeResult is isolated in the runtimeprobe/probesource subpackage. The core emits no RDF and\nexposes no write-verb surface, so observed probe evidence can neither mutate nor be projected into\nthe graph."
  - id: golang/coverage/self_governance_test.go:TestHighRiskRegistryCoversAuthoritySurface
    file: golang/coverage/self_governance_test.go
    symbol: TestHighRiskRegistryCoversAuthoritySurface
    package: coverage
    language: go
    doc: "TestHighRiskRegistryCoversAuthoritySurface proves Sensei's self-governance is\nSTRUCTURAL, not a convention: an edit to any core authority-surface path is\ncovered by docs/awareness/high_risk_files.yaml, so the enforce-briefing hook\nrequires a briefing before the edit (and the graph records a guardrail\n`protects` edge). It also proves the registry is not blanket \"everything is\nhigh-risk\" — proximity is not authority — so a non-load-bearing path is NOT\nforced through the gate, which would train the reader to ignore it."

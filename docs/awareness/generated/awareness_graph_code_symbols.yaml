    doc: "TestControlStateOwnershipBoundary proves the Phase 9.5 owner boundary statically: the\ncontrolstate package is transport-neutral (imports no server/protobuf/editor/CLI/os) and it is\nthe single semantic composition owner — no consumer reimplements its classification and it\nnever uses closure.Report.Verdict as artifact closure."
  - id: golang/coverage/controlstate_ownership_test.go:TestControlStateTransportOwnershipBoundary
    file: golang/coverage/controlstate_ownership_test.go
    symbol: TestControlStateTransportOwnershipBoundary
    package: coverage
    language: go
    doc: "TestControlStateTransportOwnershipBoundary proves the Checkpoint-2 transport boundary\nstatically:\n\n  - the pure mapper (golang/server/controlstateproto) imports ONLY controlstate, the generated\n    protobuf package, gRPC-free stdlib — no graph stores, governed-YAML readers, mutation\n    owners, or certification writers;\n  - the mapper and server define no second semantic vocabulary (no closure/severity/lifecycle\n    mapping tables outside the controlstate owner);\n  - the read-only store interface the handlers consume has NO write method (structural\n    no-mutation proof for the control-panel read surfaces)."
  - id: golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
    file: golang/coverage/phase8_1b_contract_test.go
    symbol: TestPhase81bGovernedContractPresent
    package: coverage
    language: go
    doc: "TestPhase81bGovernedContractPresent is the govern-first gate for Slice 8.1b\n(governed promotion). It proves the atomicity/projection/journal laws and the\ndedicated promotion authority are authored in the canonical source YAML —\nevery new invariant, failure mode, forbidden fix, and authority record is\npresent and schema-valid — and that the promotion authority surfaces are\nhigh-risk covered. The contract exists before any promotion implementation."
  - id: golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
    file: golang/coverage/phase8_contract_test.go
    symbol: TestPhase8GovernedContractPresent
    package: coverage
    language: go
    doc: "TestPhase8GovernedContractPresent is the govern-first gate for Phase 8 (terminal\narchitectural closure). It proves the Phase-8 governed contract (Slice 8.0) is\nauthored in the canonical source YAML — every invariant, failure mode, and\nforbidden fix is present and schema-valid (id + title) — and that the Phase-8\nauthority surfaces are high-risk covered so a future Phase-8 edit requires a\nbriefing/preflight. The contract exists before any Phase-8 implementation."
  - id: golang/coverage/phase9_5_contract_test.go:TestPhase95Checkpoint2GovernedContractPresent
    file: golang/coverage/phase9_5_contract_test.go
    symbol: TestPhase95Checkpoint2GovernedContractPresent
    package: coverage
    language: go
    doc: "TestPhase95Checkpoint2GovernedContractPresent is the govern-first gate for Phase 9.5\nCheckpoint 2 (read-only protobuf + server surfaces). Every Checkpoint-2 invariant, failure\nmode, and forbidden fix is authored + schema-valid in the canonical source YAML, and the\nCheckpoint-2 rulings section exists in the opening contract — before the transport is built.\nTwo directive items are satisfied by existing Checkpoint-1 records and are asserted here under\ntheir canonical IDs: server reclassification (controlstate.server_or_editor_reclassifies_\ncontrol_state) and cwd/workspace repository authority (phase9_5_derive_repository_identity_\nfrom_cwd_or_workspace)."
  - id: golang/coverage/phase9_5_contract_test.go:TestPhase95GovernedContractPresent
    file: golang/coverage/phase9_5_contract_test.go
    symbol: TestPhase95GovernedContractPresent
    package: coverage
    language: go
    doc: "TestPhase95GovernedContractPresent is the govern-first gate for Phase 9.5 Checkpoint 1 (the\ncanonical architectural-state projection owner). It proves every Checkpoint-1 invariant,\nfailure mode, and forbidden fix is authored + schema-valid in the canonical source YAML, the\nopening contract exists, and the controlstate surface is high-risk covered — all before the\nowner is exercised."

    symbol: TestNextActionTableIsSingleStep
    package: tasksession
    language: go
    doc: "TestNextActionTableIsSingleStep asserts that every machine action identity the\norchestrator can emit has a summary, and that no summary smuggles a second action\n(no \" then \" / \" and \" connective that would recreate the flat-output failure)."
  - id: golang/architecture/tasksession/briefing_feedback_test.go:TestPromotedKnowledgeDerivedFromProjection

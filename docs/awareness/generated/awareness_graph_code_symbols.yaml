    doc: "TestE2EStaleReportsAdvancedCurrentState proves the stale outcome reports the\nstate belonging to the ADVANCED current head, not the pre-attempt scope_verified\ndisposition. A competing writer records the transition first (advancing the task\nto proving); our own record then observes a stale expected head. The stale\ncondition is injected through the private dependency boundary — no production\npipeline seam, no build tag."
  - id: golang/architecture/tasksession/advance_result_test.go:TestAdvanceCannotBackdateExpiredCapability
    file: golang/architecture/tasksession/advance_result_test.go
    symbol: TestAdvanceCannotBackdateExpiredCapability
    package: tasksession
    language: go
    doc: "TestAdvanceCannotBackdateExpiredCapability proves an API caller cannot revive an\nexpired capability by supplying a past time: the request has no clock field, so\nexpiry is always evaluated against the trusted internal clock, which is an\ninjected dependency (never a process global). When the clock is (test-only)\ninjected just before expiry the capability binds; at/after expiry it refuses —\nthe caller has no say."
  - id: golang/architecture/tasksession/advance_result_test.go:TestAdvanceFailsClosedAtScopeVerifiedWithoutValidResult
    file: golang/architecture/tasksession/advance_result_test.go
    symbol: TestAdvanceFailsClosedAtScopeVerifiedWithoutValidResult
    package: tasksession
    language: go
    doc: "TestAdvanceFailsClosedAtScopeVerifiedWithoutValidResult: at the scope_verified\nterminal a missing/invalid result prerequisite is a typed refusal — never a false\nsuccess and never a recorded transition — and still reports the current state."
  - id: golang/architecture/tasksession/advance_result_test.go:TestAdvanceRefusesExpiredDecision
    file: golang/architecture/tasksession/advance_result_test.go
    symbol: TestAdvanceRefusesExpiredDecision
    package: tasksession
    language: go
    doc: "TestAdvanceRefusesExpiredDecision: a decision whose single-use capability has\nexpired grants nothing — the orchestrator refuses, never advances. The expiry is\nevaluated against the trusted internal clock, not a caller-supplied time."
  - id: golang/architecture/tasksession/advance_result_test.go:TestAdvanceRejectsMalformedRequest
    file: golang/architecture/tasksession/advance_result_test.go
    symbol: TestAdvanceRejectsMalformedRequest
    package: tasksession
    language: go
    doc: "TestAdvanceRejectsMalformedRequest: a request with no task directory is a hard\nerror, never a silent success."
  - id: golang/architecture/tasksession/advance_result_test.go:TestAdvanceWaitsForAdmissionDecision
    file: golang/architecture/tasksession/advance_result_test.go
    symbol: TestAdvanceWaitsForAdmissionDecision
    package: tasksession
    language: go
    doc: "TestAdvanceWaitsForAdmissionDecision: authority is resolved but no typed\ndecision is recorded, so the one legal action is decide_admission — reported, not\nperformed, and no transition is recorded."
  - id: golang/architecture/tasksession/advance_result_test.go:TestAdvanceWaitsMechanicalOnScopeViolation
    file: golang/architecture/tasksession/advance_result_test.go
    symbol: TestAdvanceWaitsMechanicalOnScopeViolation
    package: tasksession
    language: go

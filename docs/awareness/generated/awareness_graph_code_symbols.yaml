    symbol: TestAwarenessAuditDiffTool_GraphNoCommitIdentityFailsClosed
    package: main
    language: go
    doc: "An authoritative graph that exposes no source/build commit identity cannot be\nbound to expected_head and must fail closed."
  - id: cmd/awareness-mcp/main_test.go:TestAwarenessAuditDiffTool_ModifyWithoutExpectedHeadCannotVerify
    file: cmd/awareness-mcp/main_test.go
    symbol: TestAwarenessAuditDiffTool_ModifyWithoutExpectedHeadCannotVerify
    package: main
    language: go
    doc: "Without expected_head the base of a modified file cannot be bound to a\ncanonical snapshot, and the tool must not read ambient working-tree state\n(§2). The modify hunk therefore degrades to cannot_verify."
  - id: cmd/awareness-mcp/main_test.go:TestAwarenessAuditDiffTool_NoExpectedHeadMissingGraphCommitFailsClosed

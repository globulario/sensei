  - id: golang/store/oxigraph/oxigraph_test.go:TestHealth_OK
    file: golang/store/oxigraph/oxigraph_test.go
    symbol: TestHealth_OK
    package: oxigraph_test
    language: go
    doc: "TestHealth_OK pins the happy path. Verifies (1) the client posts to\nthe SPARQL endpoint with content-type sparql-query, (2) it accepts a\n2xx as healthy. The server side asserts on the request shape so a\nsilent client-side regression (e.g. wrong content-type) fails the\ntest."
  - id: golang/store/oxigraph/oxigraph_test.go:TestHealth_RespectsContextCancellation
    file: golang/store/oxigraph/oxigraph_test.go
    symbol: TestHealth_RespectsContextCancellation
    package: oxigraph_test
    language: go
    doc: "TestHealth_RespectsContextCancellation drives a server that hangs\nforever and asserts Health returns when ctx is cancelled. Without\nthis, a slow/wedged backend could block the server's startup health\ncheck past any reasonable timeout.\n\nDefer ordering matters here. httptest.Server.Close() blocks until\nevery active handler returns; we need to unblock the handler BEFORE\nClose fires, or the test deadlocks itself in cleanup. The two\ndefers below run LIFO — `close(hang)` first, then `ts.Close()` —\nso the handler is always free to exit before Close starts waiting."
  - id: golang/store/oxigraph/oxigraph_test.go:TestHealth_Unreachable
    file: golang/store/oxigraph/oxigraph_test.go
    symbol: TestHealth_Unreachable
    package: oxigraph_test
    language: go
    doc: "TestHealth_Unreachable asserts that a connect failure surfaces as a\nregular wrapped error — NOT a panic, NOT a hang. This is the\nproduction-critical case: -require-store=false relies on the error\nbeing recoverable to log a warning and continue."
  - id: golang/store/oxigraph/oxigraph_test.go:TestImpactForFile_FailureModeViaInvariantChain
    file: golang/store/oxigraph/oxigraph_test.go
    symbol: TestImpactForFile_FailureModeViaInvariantChain

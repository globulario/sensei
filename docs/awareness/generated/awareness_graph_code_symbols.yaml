    language: go
    doc: "Repeated verifications of the same immutable chain digest each payload once per\nevaluation — the bounded-work contract, proven by the computation counter rather\nthan wall-clock."
  - id: golang/architecture/ledger/verifyscope_test.go:TestVerificationScope_MutationBetweenVerificationsIsDetected

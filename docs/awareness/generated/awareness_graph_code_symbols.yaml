  - id: cmd/annotation-scanner/main_test.go:TestAnnotationScanner_Deterministic
    file: cmd/annotation-scanner/main_test.go
    symbol: TestAnnotationScanner_Deterministic
    package: main
    language: go
    doc: "TestAnnotationScanner_Deterministic verifies that scanning the same source\ntree twice produces byte-identical output — a prerequisite for the CI\nfreshness check to be reliable across different environments and run orders."
  - id: cmd/awareness-mcp/admission_tools_test.go:TestMCPAdmissionToolsAreRegistered
    file: cmd/awareness-mcp/admission_tools_test.go
    symbol: TestMCPAdmissionToolsAreRegistered
    package: main
    language: go
  - id: cmd/awareness-mcp/admission_tools_test.go:TestMCPAdmissionToolsDoNotRequireProtoChanges
    file: cmd/awareness-mcp/admission_tools_test.go
    symbol: TestMCPAdmissionToolsDoNotRequireProtoChanges
    package: main
    language: go
  - id: cmd/awareness-mcp/complete_task_test.go:TestCompleteTaskToolDelegatesRefusesWritesNothing
    file: cmd/awareness-mcp/complete_task_test.go
    symbol: TestCompleteTaskToolDelegatesRefusesWritesNothing
    package: main
    language: go
    doc: "The MCP tool only delegates: a seeded-but-unready task is refused, the outcome is\nsurfaced in the tool result, and the owner writes nothing — the tool cannot manufacture\ncompletion."
  - id: cmd/awareness-mcp/complete_task_test.go:TestCompleteTaskToolOutcomeMapping
    file: cmd/awareness-mcp/complete_task_test.go
    symbol: TestCompleteTaskToolOutcomeMapping
    package: main
    language: go
    doc: "A typed outcome (success or refusal) is a structured result with err == nil; an\ninfrastructure error is a Go error, never a fabricated outcome. Injected delegate so\nall paths are proven without the readiness world."
  - id: cmd/awareness-mcp/complete_task_test.go:TestCompleteTaskToolRegistered
    file: cmd/awareness-mcp/complete_task_test.go
    symbol: TestCompleteTaskToolRegistered
    package: main
    language: go
    doc: "The complete_task tool is registered as a typed delegation and exposes no raw query\nsurface (respecting awareness.no_arbitrary_sparql)."
  - id: cmd/awareness-mcp/complete_task_test.go:TestCompleteTaskToolRejectsUnknownProperty
    file: cmd/awareness-mcp/complete_task_test.go
    symbol: TestCompleteTaskToolRejectsUnknownProperty
    package: main
    language: go
    doc: "The tool rejects caller-supplied claims both by schema (additionalProperties:false) and\nat runtime — a schema declaration alone is an advisory lock painted on the door."
  - id: cmd/awareness-mcp/main_test.go:TestAwarenessAddrs_LocalhostAddsFallback
    file: cmd/awareness-mcp/main_test.go

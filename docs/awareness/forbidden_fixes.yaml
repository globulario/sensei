forbidden_fixes:
  - id: add_second_package_identity_authority
    title: add a second package-identity authority
    summary: Introduce a second surface that defines which packages exist or their identity (kind/version/build_id) — a generated manifest, installer mirror, or tarball name — alongside packages/registry.yaml.
    related_invariants:
    reason: packages/registry.yaml is the SOLE package-identity authority; all other surfaces are projections validated against it
    contract: packages/registry.yaml is the SOLE package-identity authority; all other surfaces are projections validated against it
  - id: infer_package_identity_from_binary_or_tarball
    title: infer package identity from a binary or tarball
    summary: Derive a package's name/kind/version/build_id by inspecting a built binary or .tgz filename instead of reading packages/registry.yaml.
    related_invariants:
    reason: resolve identity from registry.yaml; filenames/binaries are outputs, never authority (do not infer truth from filenames when a manifest exists)
    contract: resolve identity from registry.yaml; filenames/binaries are outputs, never authority (do not infer truth from filenames when a manifest exists)
  - id: keep_undeclared_binary_aliases_in_packages_bin
    title: keep undeclared binary aliases in packages/bin
    summary: Leave binaries in packages/bin that are not declared by a registry-backed canonical spec (stale or alias binaries).
    related_invariants:
    reason: packages/bin stages only registry-declared binaries; remove undeclared/stale aliases
    contract: packages/bin stages only registry-declared binaries; remove undeclared/stale aliases
  - id: treat_generated_specs_as_canonical_recipe
    title: treat generated specs as the canonical recipe
    summary: Treat services/generated/specs (or any generated spec copy) as the canonical install recipe.
    related_invariants:
    reason: the canonical recipe is packages/metadata/<name>/specs; generated specs are derived build inputs
    contract: the canonical recipe is packages/metadata/<name>/specs; generated specs are derived build inputs
  - id: revive_legacy_spec_forest_in_consumed_paths
    title: revive a legacy spec forest in consumed paths
    summary: Reintroduce legacy or duplicate spec trees in consumed paths as an active authority.
    related_invariants:
    reason: consume specs only from packages/metadata; do not revive legacy spec roots
    contract: consume specs only from packages/metadata; do not revive legacy spec roots
  - id: restore_dist_bin_as_long_lived_authority_path
    title: restore dist/bin as a long-lived authority path
    summary: Restore or depend on services/dist/bin as a long-lived authoritative binary path.
    related_invariants:
    reason: dist/bin is transient staging; binaries are compiled fresh each build
    contract: dist/bin is transient staging; binaries are compiled fresh each build
  - id: delete_generated_mid_flow_without_regeneration
    title: delete generated/ mid-flow without regenerating
    summary: Delete services/generated mid-flow without regenerating it, leaving the build to consume stale or missing inputs.
    related_invariants:
    reason: regenerate generated/ at the sanctioned boundary (regenerate-release-inputs.sh / --full-regenerate); never delete mid-flow
    contract: regenerate generated/ at the sanctioned boundary (regenerate-release-inputs.sh / --full-regenerate); never delete mid-flow
  - id: consume_generated_workspace_as_release_authority
    title: consume the generated workspace as release authority
    summary: Consume services/generated as the authoritative release source instead of a disposable derived workspace.
    related_invariants:
    reason: generated/ is a derived workspace validated against registry/metadata; authority stays in packages
    contract: generated/ is a derived workspace validated against registry/metadata; authority stays in packages
  - id: treat_dist_as_persistent_source_tree
    title: treat services/dist as a persistent source tree
    summary: 'Edit services/dist in place, or depend on its contents surviving across builds, instead of treating it as disposable release output. Observed this session: running the installer against dist/ in-place created root-owned files that blocked the next build''s wipe.'
    related_invariants:
    reason: services/dist is disposable release output — wiped and recreated each build; never authored source
    contract: services/dist is disposable release output — wiped and recreated each build; never authored source
  - id: establish_a_verdict_from_within_the_pre_review_report
    title: establish a verdict from within the pre-review report
    summary: Make the pre-review report create or upgrade an admission, certification, or completion verdict — for example deriving certified from a caller boolean or a pre-set disposition, or displaying a certification without a receipt digest.
    related_invariants:
      - prereview.report_is_projection_not_authority
    reason: the pre-review report is a projection; verdicts come only from receipts, and Finalize always re-derives the disposition and summary from evidence so a caller cannot forge one
    contract: the pre-review report may display verdicts sourced from receipts but must never create or upgrade an admission, certification, or completion

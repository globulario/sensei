# Forbidden fixes for the architectural spine (Stage A). The spec's canonical
# example: a UI that promotes candidates by writing the corpus directly,
# bypassing the guarded CLI/backend path.
forbidden_fixes:
  - id: ui_direct_candidate_promotion_without_guarded_backend_api
    title: UI promotes candidates by writing corpus directly
    summary: >-
      Letting the dashboard (or any UI) promote a candidate by writing the
      corpus / store directly, instead of going through the guarded awg CLI or a
      reviewed backend mutation API.
    reason: >-
      It bypasses human review and the validation pipeline, lets the UI become a
      second uncontrolled writer of the corpus, and treats the compiled graph as
      mutable authority. Promotion must stay CLI/file guarded until a safe,
      reviewed mutation API exists.
    related_invariants:
      - awareness.graph.compiled_context_not_authority
      - awareness.seed_is_generated_author_in_yaml
    uml:
      kind: Constraint
      stereotype: forbidden_fix
      view: awareness

  - id: treat_nil_foreach_collection_as_empty_array
    title: Treat nil foreach collections as empty arrays
    summary: >-
      Coercing a nil or unresolved foreach collection to an empty list instead
      of preserving the failure path for active foreach execution.
    reason: >-
      It hides a real resolution failure, breaks the fail-closed contract for
      active foreach steps, and converts missing state into apparent success.
    related_invariants:
      - meta.silence_is_not_valid_for_unexpected
      - meta.competing_writers_must_converge_or_be_fenced
    protects:
      files:
        - golang/workflow/engine/engine.go
    uml:
      kind: Constraint
      stereotype: forbidden_fix
      view: awareness

  - id: convert_json_null_to_empty_array_globally
    title: Convert JSON null to empty arrays globally
    summary: >-
      Introducing a global coercion that maps JSON null collections to empty
      arrays so foreach callers stop seeing nil collection failures.
    reason: >-
      It broadens one workflow repair into a global semantic rewrite, hides
      ownership and truth-layer bugs, and silently changes behavior outside the
      governed foreach contract.
    related_invariants:
      - meta.silence_is_not_valid_for_unexpected
    protects:
      files:
        - golang/workflow/engine/engine.go
    uml:
      kind: Constraint
      stereotype: forbidden_fix
      view: awareness

  - id: remove_nil_collection_failure_invariant
    title: Remove the nil-collection failure invariant
    summary: >-
      Deleting or weakening the rule that an active foreach with nil or
      unresolved collection must fail.
    reason: >-
      The foreach guard-order repair depends on preserving the failure path for
      active execution. Removing that invariant turns a control-flow repair into
      silent success.
    related_invariants:
      - meta.silence_is_not_valid_for_unexpected
    protects:
      files:
        - golang/workflow/engine/engine.go
    uml:
      kind: Constraint
      stereotype: forbidden_fix
      view: awareness

  - id: special_case_cluster_reconcile_foreach_guard
    title: Special-case one workflow for foreach guard ordering
    summary: >-
      Fixing the bug by branching on one workflow, cluster, or task name
      instead of restoring the general foreach contract.
    reason: >-
      The failure is in generic workflow engine behavior. A workflow-specific
      branch leaves the engine contract broken and guarantees future repeats in
      neighboring workflows.
    related_invariants:
      - meta.competing_writers_must_converge_or_be_fenced
    protects:
      files:
        - golang/workflow/engine/engine.go
    uml:
      kind: Constraint
      stereotype: forbidden_fix
      view: awareness

  - id: suppress_collection_resolution_failure_after_the_fact
    title: Suppress collection-resolution failure after it occurs
    summary: >-
      Catching and discarding the collection resolution error after resolution
      already ran, instead of preventing the resolution when the guard is false.
    reason: >-
      The contract requires ordering the guard before collection resolution, not
      tolerating the failure after the engine already touched the wrong path.
    related_invariants:
      - meta.silence_is_not_valid_for_unexpected
    protects:
      files:
        - golang/workflow/engine/engine.go
    uml:
      kind: Constraint
      stereotype: forbidden_fix
      view: awareness

  - id: read_run_outputs_without_synchronized_snapshot
    title: Read workflow run outputs without synchronized snapshot
    summary: >-
      Evaluating foreach guard or collection state from run outputs without the
      required output snapshot or lock discipline.
    reason: >-
      It reintroduces the existing workflow run-outputs race while attempting to
      fix the foreach guard-order bug.
    related_invariants:
      - meta.competing_writers_must_converge_or_be_fenced
    protects:
      files:
        - golang/workflow/engine/engine.go
        - golang/workflow/engine/resume.go
    uml:
      kind: Constraint
      stereotype: forbidden_fix
      view: awareness

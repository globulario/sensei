# Architectural contracts — the NON-proto contracts (Stage A, declared).
#
# The gRPC API contracts (contract.awareness_graph[.rpc]) are now extracted from
# proto/awareness_graph.proto by cmd/proto-scan into
# awareness_graph_proto_contracts.yaml (assertion: inferred) — references to
# contract.awareness_graph.query etc. resolve to those inferred nodes. This file
# keeps only the contracts that are NOT proto-derived.
contracts:
  - id: contract.candidate_yaml_schema
    name: Candidate YAML corpus schema
    description: >-
      The authored-YAML schema (invariants, failure_modes, components,
      boundaries, …) the importer recognises. The single authoring substrate.
    kind: yaml_schema
    stability: stable
    read_or_write: read_write
    exposed_by:
      - component.corpus_loader
    constrained_by_invariants:
      - awareness.rdf.yaml_is_source_of_truth
    source_files:
      - golang/extractor/yaml_import_dir.go
    uml:
      kind: Class
      stereotype: yaml_schema
      view: structural

  - id: contract.yaml2nt_ntriples_output
    name: yaml2nt N-Triples output contract
    description: >-
      The importer emits N-Triples that are grammar-validated before write; an
      invalid stream is refused, never persisted.
    kind: file_format
    stability: stable
    read_or_write: write
    exposed_by:
      - component.corpus_loader
    constrained_by_invariants:
      - awareness.rdf.ntriples_validated_before_write
    source_files:
      - golang/extractor/yaml_import.go
    uml:
      kind: Artifact
      stereotype: file_format
      view: structural

  - id: contract.workflow.foreach_guard_order
    name: Workflow foreach guard order
    description: >-
      Foreach steps must evaluate the optional `when` guard before resolving
      the foreach collection. A false guard skips the step without touching the
      collection, while a true or absent guard preserves the invariant that nil
      or unresolved collections fail rather than silently coercing to success.
    kind: control_flow
    stability: stable
    read_or_write: read_write
    constrained_by_invariants:
      - meta.silence_is_not_valid_for_unexpected
      - meta.competing_writers_must_converge_or_be_fenced
    tests:
      - TestForeach_WhenGuardSkipsBeforeUnresolvedCollection
      - TestForeach_WhenGuardTrueStillFansOut
      - TestForeach_UnresolvedCollectionFails
    source_files:
      - golang/workflow/engine/engine.go
    uml:
      kind: Constraint
      stereotype: control_flow
      view: behavioral

  # ── Phase 2 edge contracts: HTTP gateway guarantees (realized by HTTP impl
  #    contracts via contract_realizations.yaml candidates, pending promotion). ──
  - id: contract.config_mutation_requires_valid_token
    name: Config mutation requires a valid token
    description: >-
      Any HTTP endpoint that mutates configuration must require and validate an
      access token (header-only; query-parameter tokens are refused) BEFORE
      persisting any change. A missing or invalid token must fail closed with
      401 and write nothing.
    kind: http_authority
    stability: stable
    read_or_write: write
    constrained_by_invariants:
      - meta.authority_must_express_uncertainty
    source_files:
      - internal/gateway/handlers/config/save_config.go
    uml:
      kind: Constraint
      stereotype: http_authority
      view: behavioral

  - id: contract.served_path_must_be_anchored_and_confined
    name: Served file paths must be anchored and confined
    description: >-
      Any HTTP endpoint that serves or accepts files must normalize the request
      path, anchor it under an expected base directory, and refuse anything that
      escapes that root (`..`, absolute paths, symlink escape). Authorization
      must be decided before any data write. Path traversal must be rejected, not
      sanitized into a different file.
    kind: http_confinement
    stability: stable
    read_or_write: read_write
    constrained_by_invariants:
      - file.path.normalization_must_not_escape_virtual_roots
      - file.authz.streaming_write_path_must_be_authorized_before_data_write
    source_files:
      - internal/gateway/handlers/files/serve.go
      - internal/gateway/handlers/files/upload.go
    uml:
      kind: Constraint
      stereotype: http_confinement
      view: behavioral

  # ── High-value surface contracts (authored 2026-06; grounded in real
  #    invariants + tests). Realization links to the exposing HTTP/gRPC surfaces
  #    are promoted by review — the candidate generator cannot auto-bridge them
  #    because the gateway registration file / proto file does not share a
  #    directory with the enforcement file. ──
  - id: contract.artifact_deletion_must_preserve_active_desired_builds
    name: Artifact deletion must preserve active desired builds
    description: >-
      Deleting or purging a repository artifact must refuse to remove a build
      that an active DesiredService still references, and destructive deletion
      must be explicitly guarded (a force flag) — never implied by the mere
      absence of a record. Exposed over the admin surface /admin/repository/artifact
      and the repository delete RPC.
    kind: data_safety
    stability: stable
    read_or_write: write
    constrained_by_invariants:
      - repository.purge_must_not_delete_active_desired_builds
      - destructive_actions.require_explicit_guard
      - critical_state.absence_is_not_destructive_intent
    tests:
      - golang/repository/repository_server/artifact_handlers_test.go:TestDeleteArtifact_ForceField
      - golang/repository/repository_server/package_identity_required_tests_test.go:TestCollisionRepairRefusesDesiredPinnedArtifact
    source_files:
      - golang/repository/repository_server/reachability_guard.go
      - golang/repository/repository_server/artifact_handlers.go
    uml:
      kind: Constraint
      stereotype: data_safety
      view: behavioral

  - id: contract.ca_metadata_must_be_published
    name: CA metadata must be published for chain verification
    description: >-
      A CA certificate operation (issue/sign/regenerate) must publish the CA
      metadata to the cluster registry so peers can verify the trust chain; a CA
      change that does not publish metadata silently breaks verification across
      the mesh. Exposed over /get_ca_certificate and /sign_ca_certificate.
    kind: pki_authority
    stability: stable
    read_or_write: write
    constrained_by_invariants:
      - pki.ca_metadata_must_be_published
    tests:
      - golang/security/tls_pki_test.go:TestCAMetadataRoundTrip
    source_files:
      - golang/config/critical_keys.go
      - golang/cluster_controller/cluster_controller_server/critical_state_registry.go
    uml:
      kind: Constraint
      stereotype: pki_authority
      view: behavioral

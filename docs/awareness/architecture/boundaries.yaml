# Architectural boundaries — places where architecture can be violated (Stage A).
#
# Boundaries are where agents make dangerous mistakes: bypassing the read-only
# API, mutating corpus directly, crossing domain scope, or treating generated
# artifacts as authored truth.
boundaries:
  - id: boundary.dashboard_read_only_grpc
    name: Dashboard read-only gRPC boundary
    description: >-
      The dashboard may read Metadata / Query / Resolve / Briefing over gRPC,
      but it must not mutate the graph. Candidate promotion stays CLI/file
      guarded until a safe mutation API exists.
    kind: read_only
    status: active
    separates:
      - component.dashboard_architecture_view
      - component.awareness_graph_service
    protects:
      - awareness.graph.compiled_context_not_authority
    exposes_contracts:
      - contract.awareness_graph.query
      - contract.awareness_graph.resolve
      - contract.awareness_graph.metadata
    vulnerable_to:
      - awareness.graph_used_as_authority
    forbids:
      - ui_direct_candidate_promotion_without_guarded_backend_api
    source_files:
      - golang/server/resolve.go
      - editor/vscode/src/dashboardPanel.ts
    uml:
      kind: Interface
      stereotype: boundary
      view: interaction

  - id: boundary.corpus_cli_mutation
    name: Corpus CLI mutation boundary
    description: >-
      All corpus mutation flows through the awg CLI (rebuild / promote), never
      through the UI or a direct store write. The owner-legal write path.
    kind: mutation
    status: active
    separates:
      - component.corpus_loader
    protects:
      - awareness.seed_is_generated_author_in_yaml
      - awareness.rdf.yaml_is_source_of_truth
    vulnerable_to:
      - awareness.greedy_importer_claims_foreign_files
    forbids:
      - ui_direct_candidate_promotion_without_guarded_backend_api
    source_files:
      - cmd/awg/cmd_promote.go
      - cmd/awg/cmd_rebuild.go
    uml:
      kind: Constraint
      stereotype: guarded_boundary
      view: awareness

  - id: boundary.candidate_promotion
    name: Candidate promotion boundary
    description: >-
      Promoting a candidate into the active corpus is a guarded CLI step with
      human review. No automatic or UI-driven promotion.
    kind: mutation
    status: active
    separates:
      - component.corpus_loader
    protects:
      - awareness.seed_is_generated_author_in_yaml
    vulnerable_to:
      - awareness.graph_used_as_authority
    forbids:
      - ui_direct_candidate_promotion_without_guarded_backend_api
    source_files:
      - cmd/awg/cmd_promote.go

  - id: boundary.domain_scope
    name: Domain scope boundary
    description: >-
      A knowledge node belongs to exactly one domain so truth never crosses
      repos accidentally. A query scoped to one domain returns only that
      domain's nodes plus shared meta-principles.
    kind: domain
    status: active
    protects:
      - awareness.briefing.sections_honor_domain_scope
    vulnerable_to:
      - awareness.greedy_importer_claims_foreign_files
    source_files:
      - golang/server/scope.go

  - id: boundary.generated_seed
    name: Generated seed boundary
    description: >-
      embeddata/awareness.nt is a generated artifact, regenerated by awg
      rebuild and never hand-edited. Editing it directly bypasses the YAML
      source of truth and the validation pipeline.
    kind: generated_artifact
    status: active
    separates:
      - component.corpus_loader
    protects:
      - awareness.seed_is_generated_author_in_yaml
    vulnerable_to:
      - awareness.ontology_vocab_drift
    source_files:
      - cmd/awg/cmd_rebuild.go

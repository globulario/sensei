id: imported.skill.engineering.tdd
class: ImplementationPattern
label: 'Skill: tdd'
status: active
confidence: reviewed
when_to_use:
    - Test-driven development. Use when the user wants to build features or fix bugs test-first, mentions "red-green-refactor", or wants integration tests.
    - Use TDD when writing a regression test through public interfaces, confirming seams under test, or working red-green-refactor.
reference_files:
    - path: docs/skill-ingestion.md
      role: ingestion_policy
must_follow:
    - Tests verify behavior through public interfaces, not implementation details. Code can change entirely; tests shouldn't. A good test reads like a specification — "user can checkout with valid cart" tells you exactly what capability exists — and survives refacto
    - Test only at pre-agreed seams. Before writing any test, write down the seams under test and confirm them with the user. No test is written at an unconfirmed seam. You can't test everything — agreeing the seams up front is how testing effort lands on the critic
    - One slice at a time. One seam, one test, one minimal implementation per cycle.
    - 'TDD is the red → green loop. This skill is the reference that makes that loop produce tests worth keeping: what a good test is, where tests go, the anti-patterns, and the rules of the loop. Every section applies on every cycle — consult them before and during'
    - When exploring the codebase, read CONTEXT.md (if it exists) so test names and interface vocabulary match the project's domain language, and respect ADRs in the area you're touching.
    - 'Ask: "What''s the public interface, and which seams should we test?"'
    - 'Implementation-coupled — mocks internal collaborators, tests private methods, or verifies through a side channel (querying the database instead of using the interface). The tell: the test breaks when you refactor but behavior hasn''t changed.'
    - 'Horizontal slicing — writing all tests first, then all implementation. Bulk tests verify imagined behavior: you test the shape of things rather than user-facing behavior, the tests go insensitive to real changes, and you commit to test structure before underst'
    - Refactoring is not part of the loop. It belongs to the review stage (see the code-review skill), not the red → green implementation cycle.
forbidden_shortcuts:
    - Tests verify behavior through public interfaces, not implementation details. Code can change entirely; tests shouldn't. A good test reads like a specification — "user can checkout with valid cart" tells you exactly what capability exists — and survives refacto
    - 'A seam is the public boundary you test at: the interface where you observe behavior without reaching inside. Tests live at seams, never against internals.'
    - 'Implementation-coupled — mocks internal collaborators, tests private methods, or verifies through a side channel (querying the database instead of using the interface). The tell: the test breaks when you refactor but behavior hasn''t changed.'
    - Tautological — the assertion recomputes the expected value the way the code does (expect(add(a, b)).toBe(a + b), a snapshot derived by hand the same way, a constant asserted equal to itself), so it passes by construction and can never disagree with the code. E
    - 'Horizontal slicing — writing all tests first, then all implementation. Bulk tests verify imagined behavior: you test the shape of things rather than user-facing behavior, the tests go insensitive to real changes, and you commit to test structure before underst'
    - Red before green. Write the failing test first, then only enough code to pass it. Don't anticipate future tests or add speculative features.

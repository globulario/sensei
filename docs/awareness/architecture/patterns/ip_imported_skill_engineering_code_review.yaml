id: imported.skill.engineering.code_review
class: ImplementationPattern
label: 'Skill: code-review'
status: active
confidence: reviewed
when_to_use:
    - Review the changes since a fixed point (commit, branch, tag, or merge-base) along two axes — Standards (does the code follow this repo's documented coding standards?) and Spec (does the code match what the originating issue/PRD asked for?). Runs both reviews i
reference_files:
    - path: docs/skill-ingestion.md
      role: ingestion_policy
must_follow:
    - Standards — does the code conform to this repo's documented coding standards?
    - Spec — does the code faithfully implement the originating issue / PRD / spec?
    - The issue tracker should have been provided to you — run /setup-matt-pocock-skills if docs/agents/issue-tracker.md is missing.
    - Before going further, confirm the fixed point resolves (git rev-parse <fixed-point>) and the diff is non-empty. A bad ref or empty diff should fail here — not inside two parallel sub-agents.
    - 'Issue references in the commit messages (#123, Closes #45, GitLab !67, etc.) — fetch via the workflow in docs/agents/issue-tracker.md.'
    - A path the user passed as an argument.
    - A PRD/spec file under docs/, specs/, or .scratch/ matching the branch name or feature.
    - If nothing is found, ask the user where the spec is. If they say there isn't one, the Spec sub-agent will skip and report "no spec available".
    - Anything in the repo that documents how code should be written, such as CODING_STANDARDS.md or CONTRIBUTING.md.
    - 'On top of whatever the repo documents, the Standards axis always carries the smell baseline below — a fixed set of Fowler code smells (Refactoring, ch.3) that applies even when a repo documents nothing. Two rules bind it:'
    - The repo overrides. A documented repo standard always wins; where it endorses something the baseline would flag, suppress the smell.
    - 'Each smell reads *what it is* → *how to fix*; match it against the diff:'
forbidden_shortcuts:
    - Both axes run as parallel sub-agents so they don't pollute each other's context, then this skill aggregates their findings.
    - Always a judgement call. Each smell is a labelled heuristic ("possible Feature Envy"), never a hard violation — and, like any standard here, skip anything tooling already enforces.
    - 'Present the two reports under ## Standards and ## Spec headings, verbatim or lightly cleaned. Do not merge or rerank findings — the two axes are deliberately separate (see Why two axes).'
    - 'End with a one-line summary: total findings per axis, and the worst issue within each axis (if any). Don''t pick a single winner across axes — that''s the reranking the separation exists to prevent.'
rationale: |-
    Imported from an external agent skill as a reviewable candidate.
    This candidate is procedural guidance, not live authority.
    It must be reviewed before promotion.
    Source skill: code-review
    Source path: skills/engineering/code-review/SKILL.md
    Human review: promoted into the active AWG corpus as procedural engineering guidance.
    Original external skill pack: /home/dave/Documents/skills-main.

id: pattern_misuse.cross_domain_leak
class: PatternMisuse
name: Applying foreign rules to the wrong repo/domain
status: guardrail
description: >-
  Loading or applying knowledge without honouring the resolved scope, so a rule
  from one repo/domain leaks into another's briefing/query.
why_dangerous: >-
  Foreign rules give an agent invalid architectural context and can block or
  misdirect edits in a repo they were never meant for.
confidence: declared
misused_pattern: pattern.scope_resolver
safer_pattern: pattern.scope_resolver
forbidden_by:
  - meta_principle:meta.storage_is_not_semantic_authority
violates_invariants:
  - awareness.briefing.sections_honor_domain_scope
causes_failure_modes:
  - awareness.greedy_importer_claims_foreign_files
avoided_by:
  - implementation_pattern.collect_impact_scope_resolver
detected_in:
  - golang/server/scope.go
uml:
  kind: Constraint
  stereotype: pattern_misuse
  view: awareness

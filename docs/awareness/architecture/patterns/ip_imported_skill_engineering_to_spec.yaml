id: imported.skill.engineering.to_spec
class: ImplementationPattern
label: 'Skill: to-spec'
status: active
confidence: reviewed
when_to_use:
    - Turn the current conversation into a spec and publish it to the project issue tracker — no interview, just synthesis of what you've already discussed.
reference_files:
    - path: docs/skill-ingestion.md
      role: ingestion_policy
must_follow:
    - The issue tracker and triage label vocabulary should have been provided to you — run /setup-matt-pocock-skills if not.
    - Explore the repo to understand the current state of the codebase, if you haven't already. Use the project's domain glossary vocabulary throughout the spec, and respect any ADRs in the area you're touching.
    - Sketch out the seams at which you're going to test the feature. Existing seams should be preferred to new ones. Use the highest seam possible. If new seams are needed, propose them at the highest point you can. The fewer seams across the codebase, the better -
    - Write the spec using the template below, then publish it to the project issue tracker. Apply the ready-for-agent triage label - no need for additional triage.
    - 'A LONG, numbered list of user stories. Each user story should be in the format of:'
    - As an <actor>, I want a <feature>, so that <benefit>
    - As a mobile bank customer, I want to see balance on my accounts, so that I can make better informed decisions about my spending
    - This list of user stories should be extremely extensive and cover all aspects of the feature.
    - The modules that will be built/modified
    - The interfaces of those modules that will be modified
    - Technical clarifications from the developer
    - Architectural decisions
forbidden_shortcuts:
    - This skill takes the current conversation context and codebase understanding and produces a spec (you may know this document as a PRD). Do NOT interview the user — just synthesize what you already know.
    - Do NOT include specific file paths or code snippets. They may end up being outdated very quickly.
    - A description of what makes a good test (only test external behavior, not implementation details)
rationale: |-
    Imported from an external agent skill as a reviewable candidate.
    This candidate is procedural guidance, not live authority.
    It must be reviewed before promotion.
    Source skill: to-spec
    Source path: skills/engineering/to-spec/SKILL.md
    Human review: promoted into the active AWG corpus as procedural engineering guidance.
    Original external skill pack: /home/dave/Documents/skills-main.

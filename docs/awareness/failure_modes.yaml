failure_modes:
  - id: governance.self_coherence_findings_require_source_of_truth_diagnosis
    title: A self-coherence/lifecycle/audit finding was "fixed" by mutating the governed corpus before diagnosing where the defect actually lived
    severity: high
    root_cause: |
      A governance detector (awg lifecycle, awg audit, a self-coherence/principle
      check) reports a defect — e.g. "7 UNCLASSIFIED principles" or "N conflicts".
      The trap is to treat the truth source (corpus YAML / seed) as the thing to
      edit so the detector goes green. But the defect may live in the READER, not
      the corpus: the 12-conflict lane found "7 UNCLASSIFIED" was a STALE LIFECYCLE
      READER (awg lifecycle lacked a `declaration` tier case) while the corpus AND
      the coverage test were correct. Editing the corpus to satisfy the buggy
      reader would have been relabelling the thermometer to cure the fever —
      corrupting the truth source to silence a tool bug.
    symptoms:
      - a corpus or seed edit whose only justification is "make awg lifecycle/audit go green"
      - a principle's tier changed to match a detector instead of the detector being checked
      - a self-coherence conflict/UNCLASSIFIED count taken at face value without re-running the machine
    forbidden_fixes:
      - mutate_the_corpus_or_seed_to_make_a_detector_green_before_diagnosing_the_findings_source
      - treat_a_self_coherence_count_as_corpus_rot_without_ruling_out_the_reader
      - relabel_the_thermometer_edit_the_truth_source_to_silence_a_buggy_detector
    architecture_fix: |
      A lifecycle/audit/self-coherence finding MUST be classified into exactly one
      of {corpus defect | reader/tool defect | shared-vocabulary drift | stale
      evidence plane | external cross-repo lag} BEFORE any governed data (corpus
      YAML / seed) is mutated to resolve it. The truth source is not edited to
      satisfy a detector until the detector itself is ruled out — re-run the
      machine, check the reader, check the shared tier/term vocabulary.
      First mechanism (process, NOT a hard gate — the core action is judgment): a
      PR that mutates governance corpus (docs/awareness/**) in response to a
      detector finding states the diagnosis class in its body
      (.github/PULL_REQUEST_TEMPLATE.md). A future tighter mechanism could be an
      `awg diagnose-finding` helper or a merge-check that requires the diagnosis
      class when governance corpus changed; hard enforcement is bounded by the
      judgment core, so this stays review-discipline / planned, not behavioral.
    related_invariants:
      - meta.no_resolution_without_a_respected_contract
      - meta.negative_result_requires_coverage_attestation
    no_test_yet_reason: |
      The core obligation is a JUDGMENT — which of the five defect classes a
      finding belongs to — that no static artifact can prove in general
      (review_only by nature). The first mechanism is a PR diagnosis-class
      convention (advisory process metadata in the PR template), not a Go test.
      Promote toward planned/behavioral only when a concrete check is built
      (awg diagnose-finding, or a merge-check that requires the diagnosis class
      for governance-corpus changes); until then it is enforced by review plus the
      PR template — honestly an advisory governance rule, not a hard gate.
  - id: ci.destructive_test_must_be_double_gated
    title: A destructive test (mutates/replaces/deletes live external state) was guarded only by a build tag plus a comment, and clobbered a live store
    severity: high
    root_cause: |
      The Oxigraph reload idempotence integration test PUT /store?default = REPLACE
      the default graph; its only protection was the `integration` build tag plus a
      comment warning "run only against a throwaway store". Run against the default
      endpoint it clobbered a LIVE dev store (96376 triples -> 2). A comment is not a
      gate, and a build tag alone still lets `go test -tags=integration` run the
      destructive path against whatever Oxigraph is reachable at localhost:7878.
    symptoms:
      - a live Oxigraph default graph dropped to a handful of triples after a test run
      - an integration/e2e test mutates a real endpoint reachable at a default address
      - the only protection is a code comment, a filename, a naming convention, or a README note
    forbidden_fixes:
      - treat_a_comment_or_readme_or_filename_or_naming_convention_as_a_safety_gate
      - rely_on_the_build_tag_alone_for_a_test_that_mutates_live_external_state
      - point_a_destructive_test_at_a_default_localhost_endpoint_with_no_explicit_opt_in
    architecture_fix: |
      A test that can mutate, replace, delete, truncate, or otherwise damage live
      external state MUST require BOTH (1) a build tag that excludes it from the
      default `go test ./...` (//go:build integration or destructive) AND (2) an
      explicit destructive opt-in environment variable (e.g.
      AWARENESS_OXIGRAPH_DESTRUCTIVE=1) checked at the top of the destructive path,
      skipping otherwise. Enforcement: the contract is hard-gated by
      TestDestructiveTestGate_Fixtures (cmd/principle-check), with an ADVISORY repo
      scan (TestDestructiveTestGate_RepoScanAdvisory) surfacing candidates — advisory
      because the regex heuristic matches URL string-literals / mock methods, so it
      is not yet precise enough for a hard repo gate (harden once clean). Remediated
      cases: oxigraph_reload_integration_test.go and integration_e2e_test.go's
      uploadTriples now skip unless AWARENESS_OXIGRAPH_DESTRUCTIVE=1.
    required_tests:
      - TestDestructiveTestGate_Fixtures

  - id: release.bundle_serving_preserves_artifact_provenance
    title: Join bundles are served from a stored release artifact, not reassembled per request
    severity: high
    status: active
    description: 'Scar 2026-07-08: join_bundle.go reassembled the bundle in memory from live controller disk on every request and computed the sha256 from those same freshly-assembled bytes, so the checksum proved transport, not provenance. Fixed with store-once semantics.'
    protects:
      files:
        - internal/gateway/handlers/cluster/join_bundle.go
    forbidden_fixes:
      - reassembling the join bundle from live disk on each request
      - computing the served checksum from just-assembled bytes rather than the stored artifact
    evidence:
      - Globular internal/gateway/handlers/cluster/join_bundle.go ensureStoredReleaseBundle
      - 'regression (pending services-master): internal/gateway/handlers/cluster/join_bundle_test.go:TestJoinBundleHandler_ServedBytesMatchStoredArtifact'
      - 'regression (pending services-master): internal/gateway/handlers/cluster/join_bundle_test.go:TestJoinBundleHandler_NoPerRequestReassembly'
    contract: The gateway join bundle is materialized once per platform version into a release-addressed store (/var/lib/globular/releases/<version>/) and served byte-identical thereafter; its .sha256 is computed from the stored bytes so the checksum proves release-artifact provenance. Dynamic assembly is permitted only as the one-time materialization, never as per-request behavior.
  - id: doctor.expected_services_follow_profile_not_local_assumption
    title: Expected service/unit state follows assigned profile, not a hardcoded every-node assumption
    severity: high
    status: active
    description: 'Scar 2026-07-08: node_units_running reported scylla-server ''inactive (expected active)'' on a core-only node with no storage profile - the same local-scylla assumption that deadlocked needs_scylla services via their systemd ExecStartPre gate. Made profile-aware.'
    protects:

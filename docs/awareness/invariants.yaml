  - id: awareness.query.no_arbitrary_sparql
    title: Agent-facing Query must remain constrained typed API
    severity: critical
    status: active
    protects:
      files:
        - proto/awareness_graph.proto
        - golang/server/query.go
        - golang/store/oxigraph/oxigraph.go
    required_tests:
      - golang/server/main_test.go:TestQuery_RawSPARQLLikeInputRejected
      - golang/server/main_test.go:TestQuery_RejectsUnsupportedMode
    uml:
      kind: Constraint
      stereotype: invariant
      view: awareness

  - id: awareness.standalone_must_not_require_globular
    title: AWG must start, serve, and stay fully functional with zero Globular presence — etcd registration is best-effort, never required
    severity: critical
    status: active
    protects:
      files:
        - golang/server/main.go
        - cmd/awareness-mcp/main.go
        - scripts/install.sh
        - Makefile
    required_tests:
      - golang/server/main_test.go:TestValidateBackend_UnhealthyStore_RequireFalse_LogsWarning
      - golang/server/main_test.go:TestValidateBackend_UnhealthyStore_RequireTrue_ReturnsError
    # Bad-shape guard for the standalone surfaces: importing a Globular *platform*
    # module (github.com/globulario/Globular or .../services) makes the binary
    # require Globular, violating this invariant. The awareness-graph module
    # itself (…/awareness-graph/…) is fine and does not match. enforcement:block
    # so the edit-check-guard PreToolUse hook stops the edit rather than only
    # warning. Scoped to the standalone bridge + server entrypoint.
    detect:
      applies_to_paths:
        - cmd/awareness-mcp/**
        - golang/server/main.go
      forbidden_pattern: 'github\.com/globulario/(Globular|services)\b'
      message: "Standalone build must not import a Globular platform package (github.com/globulario/Globular or …/services). AWG must run with zero Globular presence — use direct gRPC or the standalone golang/client. See invariant awareness.standalone_must_not_require_globular."
      enforcement: block


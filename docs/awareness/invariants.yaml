      - 'regression (pending services-master): golang/cluster_doctor/cluster_doctor_server/rules/node_units_running_profile_test.go:TestNodeUnitsRunning_ScyllaSilentOnNonStorageNode'
      - 'regression (pending services-master): golang/cluster_doctor/cluster_doctor_server/rules/node_units_running_profile_test.go:TestNodeUnitsRunning_ScyllaFiresOnStorageNode'
    contract: Cluster-doctor and node-agent expected-unit evaluation must derive what SHOULD run from the node's controller-assigned profiles (placement intent), never from a hardcoded local assumption. Storage-plane units (scylla-server, scylla-manager, scylla-manager-agent) are expected active only on nodes with the storage profile; a non-storage node reporting them inactive is by-design, not a finding.

    contract: 'Each package identity field has a single authority: version = committed zz_version_generated.go (materialized by gen-version.sh, the only writer) for service packages / packages repo for external packages; build_id and build_number = repository admission; content = artifact_sha256 at packaging. No build/release/CI step may write a field owned by another authority; restamping identity after packaging is forbidden.'

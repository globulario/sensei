  - id: awareness.task_claim_scoping_is_task_local_and_explainable
    title: Task preparation must discover broadly but bind narrowly through an explainable impact path
    severity: critical
    status: active
    description: Task preparation discovers broadly but binds narrowly. A claim becomes task-binding only through an explainable, revision-bound impact path from an exact task operation. Relevant but non-binding repository debt remains visible as background debt and does not block local mutation. A binding claim becomes blocking only when its unresolved condition can make the requested operation unsafe. Selection must remain deterministic for the same revision, graph digest, task envelope, and policy, preserve cross-file and transitive architectural contracts, preserve authority and required-test obligations, handle indeterminate impact conservatively, and avoid arbitrary count limits.
    protects:
      files:
        - golang/architecture/tasksession/session.go
        - golang/architecture/tasksession/control.go
        - golang/architecture/convergence/convergence.go
        - golang/architecture/closure/model.go
        - golang/architecture/tasksession/briefing.go
    related_failure_modes:
      - behavioral.task_claim_scope_blocker_explosion
  - id: awareness.authored_knowledge_sources_are_governable_repository_files
    title: Authored awareness sources remain governable repository files
    severity: high
    status: active
    description: Existing authored awareness YAML is repository source and may be represented as an exact task anchor. Representing the file does not promote its contents, establish authority, satisfy correctness, or make task-local knowledge canonical. An absent planned create target must never be minted as SourceFile.
    protects:
      files:
        - docs/awareness/architecture/components.yaml
        - .sensei/project/knowledge/bounded_create_authority.yaml
        - .sensei/project/knowledge/bounded_create_intent.yaml
    related_failure_modes:
      - failure.rebuild.authoredin_records_per_run_temp_path
    related_invariants:
      - awareness.rdf.yaml_is_source_of_truth
      - awareness.architecture_claims_non_authoritative_until_promoted
    required_tests:
      - golang/architecture/closure/model_test.go:TestClosureRequestFileRepresentedByCanonicalSourceFileIRI
      - golang/architecture/closure/model_test.go:TestUnrepresentedFileRemainsOpen
    evidence:
      - task.bind-bounded-create-authority-owner.95d0b9aad021 remained blocked by closure.structural.file_unrepresented for .sensei/project/knowledge/bounded_create_authority.yaml despite a canonical authoredIn anchor
      - task.define-bounded-admission-owner-component.bbe4cffb3b33 remained blocked by closure.structural.file_unrepresented for docs/awareness/architecture/components.yaml while trying to define the canonical owner
    contract: Existing authored awareness YAML files are governed repository sources that may anchor exact task scope. Representing such files must not by itself promote their contents to authority or truth, and absent planned create targets must remain unrepresented rather than minted as SourceFile nodes.
  - id: awareness.governed_direction_records_must_be_claim_consumable
    title: Governed desired and intended records must become claim-consumable closure input through a deterministic bridge
    severity: high
    status: active
    description: Governed desired and intended architecture remains operationally inert until a deterministic, revision-bound bridge projects it into supported canonical claims for the exact anchored scope. Accepted dialogue, raw graph presence, and authored direction records are not interchangeable. Closure may consume the supported claims the bridge emits, but it must not bypass claims by treating governed graph nodes or dialogue as direct task authority.
    protects:
      files:
        - cmd/awg/cmd_infer_claims.go
        - golang/architecture/inference/governed_direction.go
        - golang/architecture/inference/registry.go
        - docs/awareness/architecture/decisions.yaml
    related_invariants:
      - awareness.architecture_claims_non_authoritative_until_promoted
      - awareness.closure_is_revision_scope_and_task_bound
    related_failure_modes:
      - closure.governed_knowledge_present_but_non_consumable
    required_tests:
      - cmd/awg/cmd_infer_claims_test.go:TestInferClaimsSynthesizesGovernedDirectionalClaimsFromGraph
      - cmd/awg/cmd_infer_claims_test.go:TestInferClaimsSkipsDraftGovernedDirectionalRecords
    evidence:
      - A fresh structural graph cleared false file-absence blockers, yet evolve tasks still reported closure.direction.desired_missing and closure.direction.intended_missing until infer-claims synthesized supported directional claims from governed records.
      - The bridge must remain provenance-preserving: governed record -> synthetic governed fact -> supported canonical claim -> evalDirection, never raw dialogue -> closure.
    contract: Governed desired or intended records become task-consumable only through a deterministic claim-synthesis bridge bound to repository revision and graph digest. The bridge may clear directional closure when the governed record is current and correctly scoped, but it must never let dialogue or raw graph presence bypass canonical claim semantics.
  - id: invariant.sensei.evidence_receipts_are_validated_not_self_certified
    title: Evidence receipts are validated, not self-certified
    severity: high
    status: active
    description: 'Phase 4 evidence layer: the validator (not the producer) decides receipt status. Freshness prose is parsed to a canonical window and evaluated against the request; self-declared freshness with no observed time is UNKNOWN.'
    protects:
      files:
        - golang/architecture/evidencereceipt/validate.go
        - golang/architecture/evidencereceipt/model.go
    required_tests:
      - golang/architecture/evidencereceipt/validate_test.go:TestValidate
    contract: An evidence receipt's effective freshness, trust, and applicability are computed by the validator against the proof request and result/runtime binding. A receipt cannot declare itself fresh or authoritative; missing, stale, conflicting, or non-owner-path evidence yields UNKNOWN/STALE/CONFLICTED/INVALID, never PASS.
  - id: closure.runtime_evidence_not_applicable_only_without_governed_runtime_mandate
    title: Runtime evidence may be not applicable only when no governed obligation requires it
    severity: critical
    status: active
    description: >
      Obligation-driven coverage (replaces the retracted branch-local invariant
      invariant.sensei.absent_runtime_evidence_is_not_applicable_under_static_test,
      whose blanket static_test relaxation could falsely certify runtime-dependent
      behavior such as leader election, durability, or failover). The coverage
      profile sets the default only for runtime slots that no governed obligation
      mandates; a governed mandate always overrides the profile.
    protects:
      files:
        - golang/architecture/evidencereceipt/coverage.go
        - golang/architecture/evidencereceipt/runtime.go
        - golang/architecture/proofdischarge/coverage.go
        - golang/architecture/proofdischarge/discharge.go
        - golang/architecture/proofdischarge/compatibility.go
    required_tests:
      - golang/architecture/evidencereceipt/coverage_test.go:TestEvaluateCoverage
      - golang/architecture/proofdischarge/discharge_test.go:TestRow9a_MandatedRuntimeStaticTestNoReceipt
      - golang/architecture/proofdischarge/discharge_test.go:TestRow9b_MandatedRuntimeStaticTestWithReceipt
      - golang/architecture/proofdischarge/discharge_test.go:TestRow9c_NonMandatedRuntimeStaticTestNotApplicable
    contract: >
      A certification profile may mark runtime evidence not_applicable only when
      no applicable governed proof obligation requires runtime evidence. When an
      applicable obligation requires runtime evidence
      (ProofObligation.RequiresRuntimeEvidence), the obligation overrides the
      profile, including static_test. Missing, stale, conflicted, wrong-target,
      untrusted, or otherwise incompatible runtime evidence leaves the slot
      required and unresolved; the task remains waiting_evidence, blocked, or
      uncertifiable according to policy. It must never pass or become
      not_applicable merely because static_test was selected. The absence of a
      runtime target alone must never make certification uncertifiable when no
      governed obligation requires runtime evidence.
  - id: closure.only_certification_engine_establishes_correctness
    title: Only the certification engine may establish correctness
    severity: critical
    status: active
    description: 'Phase 6: the four-lane engine is the sole correctness writer. A repo-scan test pins that no code assigns CorrectnessCertified true; a seam test pins that the legacy CLI cannot import ledger/certification.'
    protects:
      files:
        - golang/architecture/certification/evaluate.go
        - golang/architecture/certification/lanes.go
        - golang/architecture/certification/ledger.go
        - cmd/awg/cmd_certify.go
    required_tests:
      - golang/architecture/certification/evaluate_test.go:TestEvaluate_ForgedRecordIsRefusedNotScored
    contract: CorrectnessCertified true (a certifying verdict) may be established only by a CertificationReceipt produced by golang/architecture/certification, which recomputes the scope, authority, proof, and evidence lanes from typed, digest-verified records. Caller-supplied booleans, scores, clean diffs, passing test subsets, and legacy benchmark events can never certify. The legacy certify --event adapter is display-only and cannot append a certified ledger event.
  - id: closure.no_verdict_improves_by_omitting_a_weakening_computation
    title: No verdict may improve because a computation capable of weakening it was omitted
    severity: critical
    status: active
    description: >
      Phase 7 result pipeline. The derivation stage vocabulary is closed and
      ordered, and every mandatory stage — including architect_questions,
      inserted between closure_assessment and proof_requirements — must be
      present exactly once. architect_questions is the first stage whose sole
      purpose is to be capable of weakening the verdict: it deterministically
      generates grounded, closure-blocking architect questions from the compiled
      result graph and closure assessment, or, when none are warranted, still
      emits a question-generation artifact with a zero count. A missing
      assessment is therefore never a passing assessment, and selective
      recomputation cannot make a result look stronger by dropping the stage most
      able to refute it.
    protects:
      files:
        - golang/architecture/closureprotocol/model.go
        - golang/architecture/closureprotocol/validate.go
        - docs/schemas/architectural-closure/v1/result-transition-receipt.schema.json
    required_tests:
      - golang/architecture/closureprotocol/fixtures_test.go:TestFixtures
    contract: >
      A ResultTransitionReceipt is valid only when its derivation graph contains
      every stage in the frozen ResultPipelineStages vocabulary exactly once,
      references only existing artifacts, binds every input to the current
      result, and is acyclic. architect_questions is a mandatory stage: a receipt
      that omits it is refused. The absence of open architect questions must be
      expressed as a produced, verifiable question-generation artifact with a
      zero count — never inferred from a missing computation. No verdict may
      improve because a stage capable of weakening it was omitted.
  # ── Phase 8: terminal architectural closure — governed contract (Slice 8.0) ──
  - id: closure.only_question_disposition_owner_records_question_outcomes
    title: Only the question-disposition owner records authoritative task question outcomes
    severity: critical
    status: active
    description: >
      Phase 8.1a. A task architect-question outcome is authoritative only when the
      question-disposition owner appends a question_disposition_recorded ledger event
      binding the stable question ID, the disposition, and an authority-verified
      answering actor. A dialogue artifact, a raw ledger payload, or a caller string
      is not an authoritative outcome.
    protects:
      files:
        - docs/design/phase8-discovery.md
        - golang/architecture/questiongen/dialogue_ops.go
        - golang/architecture/ledger/event.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
      - golang/architecture/questiondisposition/e2e_test.go:TestE2EAnsweredReusableRecordsAndProjects
    contract: >
      An authoritative task question outcome is established only by a
      question_disposition_recorded ledger event appended by the question-disposition
      owner, binding task/session/result-transition identity, the stable question ID
      from the Phase-7 architect_questions bundle, the disposition (answer, dismiss,
      defer, or task_local), and an answering actor verified via
      authority.VerifyActorBinding. No dialogue answer, ledger payload, caller string,
      or graph node alone is authoritative.
  - id: closure.only_promotion_owner_establishes_reusable_truth
    title: Only the governed-knowledge promotion owner establishes reusable architectural truth
    severity: critical
    status: active
    description: >
      Phase 8.1b. Reusable architectural truth is established only through the
      governed-knowledge promotion owner that sits beneath sensei propose and mutates
      the canonical governed source through its schema/owner, then rebuilds the graph
      through the deterministic owner path. Answer authority and promotion authority
      are separate typed operations.
    protects:
      files:
        - docs/design/phase8-discovery.md
        - cmd/awg/cmd_propose.go
        - golang/architecture/knowledgeadoption/engine.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
    contract: >
      Reusable governed truth is established only by the governed-knowledge promotion
      owner mutating the exact canonical governed record through its schema/owner and
      rebuilding the graph via the deterministic owner path (graphbuild). A production
      package must reuse a promotion owner beneath sensei propose, never call the CLI
      handler and never write the graph or projections directly. Promotion authority
      is a separate typed operation from answer authority.
  - id: closure.dialogue_answer_is_not_authoritative_by_existence
    title: An answer is not authoritative merely because it exists in dialogue or a ledger payload
    severity: critical
    status: active
    description: >
      Phase 8.1. An ArchitectAnswer's existence, GovernanceStatus, or presence in a
      ledger payload does not by itself make it authoritative truth. Authority requires
      a verified answering actor and, for reusable claims, a completed governed
      promotion bound to the current graph.
    protects:
      files:
        - golang/architecture/dialogue.go
        - golang/architecture/questiongen/dialogue_ops.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
      - golang/architecture/questiondisposition/matrix_test.go:TestMissingDispositionGrantFailsClosed
    contract: >
      An architect answer becomes authoritative only through an authorized disposition
      (verified actor) recorded by the question-disposition owner; a reusable answer
      becomes governed truth only through a completed QuestionPromotionReceipt-bound
      promotion. Raw dialogue answers and ledger payloads are evidence, never authority.
  - id: closure.reusable_promotion_binds_full_question_answer_lineage
    title: Reusable promotion binds question, answer, authority, result, governed mutation, and rebuilt graph
    severity: critical
    status: active
    description: >
      Phase 8.1b. A reusable governed promotion is authoritative only when a dedicated
      QuestionPromotionReceipt binds the full lineage: task/session/result identity,
      question bundle digest and stable question ID, disposition/answer identity,
      answering and promotion actor authority, the target governed record, the exact
      canonical governed-source mutation digest, pre/post governed manifest digests,
      the graphbuild producer, and the resulting governed record identity. An
      adoption.Receipt or a graph node alone is insufficient.
    protects:
      files:
        - docs/design/phase8-discovery.md
        - golang/architecture/adoption/receipt.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
    contract: >
      Reusable promotion is authoritative only via a QuestionPromotionReceipt binding
      the complete question -> answer -> authority -> result -> governed mutation ->
      rebuilt graph lineage. adoption.Receipt is upstream candidate evidence only; node
      existence or a disappeared blocker is not proof the originating question was
      authorized and correctly disposed.
  - id: closure.task_local_answers_never_enter_repository_briefings
    title: Task-local answers never enter repository-wide or unrelated-domain briefings
    severity: critical
    status: active
    description: >
      Phase 8.1c. A task-local disposition satisfies only the exact task/session/result
      and effective scope recorded in its disposition. It stays ledger-scoped and may
      appear only in an explicitly task-scoped surface; it never becomes reusable truth
      and never enters a repository-wide or unrelated-domain briefing. Repository
      briefings surface promoted governed knowledge, not raw dialogue.
    protects:
      files:
        - golang/server/briefing.go
        - golang/server/scope.go
    required_tests:
      - golang/architecture/tasksession/briefing_promotion_test.go:TestBriefingNeverSurfacesTaskLocal
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
      - golang/architecture/questiondisposition/matrix_test.go:TestAnsweredTaskLocalReevaluatesAndContains
    contract: >
      Task-local answers are confined to their exact task/session/result and effective
      scope and are surfaced only in a task-scoped status/briefing surface, never in
      repository-wide or foreign-domain briefings (InScope fail-closed). Repository
      briefings render promoted governed knowledge carrying provenance back to the
      QuestionPromotionReceipt, question, and answer.
  - id: closure.no_blocking_question_satisfied_by_omission
    title: No blocking question is silently satisfied by omission, rebuild, missing status, or missing evidence
    severity: critical
    status: active
    description: >
      Phase 8.1d. A closure-blocking architect-required question is never treated as
      resolved because a blocker disappeared after a rebuild, a status was absent, or
      evidence was missing. Resolution requires an explicit, verified disposition (and,
      for reusable answers, a completed promotion) preserved as lineage.
    protects:
      files:
        - golang/architecture/proofrequirements/compose.go
        - golang/architecture/resultpipeline/build.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
      - golang/architecture/questiondisposition/matrix_test.go:TestDismissedIsDurableAndDoesNotEraseQuestion
    contract: >
      Every closure-blocking architect-required question must resolve to exactly one
      effective state in a canonical QuestionResolutionSummary (resolved_reusable_promoted,
      resolved_task_local, unresolved, rejected, contested, deferred, superseded). A
      status-blind computation, a rebuilt-away blocker, a missing status, or missing
      evidence never satisfies a blocking question.
  - id: closure.certification_requires_verified_question_resolution_summary
    title: Certification requires a complete, verified question-resolution summary
    severity: critical
    status: active
    description: >
      Phase 8.1d. Certification must fail closed unless every proof/closure-blocking
      architect question is effectively resolved for the exact result, verified through
      a bounded Phase-6 integration point that independently consumes and re-verifies a
      canonical QuestionResolutionSummary. Certification does not own answer or
      promotion authority.
    protects:
      files:
        - golang/architecture/certification/evaluate.go
        - golang/architecture/certification/ledger.go
        - golang/architecture/proofrequirements/compose.go
        - golang/architecture/questionresolution/summarize.go
        - golang/architecture/questionresolution/certify.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
      - golang/architecture/questionresolution/certify_test.go:TestGateBlockedOnUnresolvedBindingQuestion
      - golang/architecture/questionresolution/certify_test.go:TestGateSatisfiedByPromotionAndTaskLocal
    contract: >
      A certifying verdict requires a complete, content-addressed QuestionResolutionSummary
      for the exact result in which every blocking architect-required question is
      effectively resolved (reusable-promoted or task-local). The bounded question-resolution
      certification is an isolated owner path (Phase 8.1d) authorized by a distinct governed
      triple; it consumes and independently re-verifies the summary through the question-
      disposition and promotion owners; it never records dispositions, promotes answers, sets
      CorrectnessCertified, emits the Phase-6 certified event, or moves answer/promotion
      ownership into the certification engine.
  - id: closure.completion_requires_closed_current_question_loop
    title: Completion requires certification plus a closed, current question/promotion loop
    severity: critical
    status: active
    description: >
      Phase 8.2. Terminal completion of a certified task requires that the
      QuestionResolutionSummary is closed and current: every blocking question is
      effectively resolved, every reusable answer's promotion is governed and bound to
      the current graph digest, no contradictory promotion is contested, and question
      provenance binds the exact certified result. Completion fails closed otherwise.
    protects:
      files:
        - docs/design/phase8-discovery.md
        - golang/architecture/certification/ledger.go
        - golang/architecture/completion/complete.go
        - golang/architecture/completion/readiness.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
      - golang/architecture/completion/complete_test.go:TestCompleteHappyPath
      - golang/architecture/completion/complete_test.go:TestCompleteRefusesMissingQR
    contract: >
      Completion appends completed only when a re-verified certification receipt AND a
      closed, current question/promotion loop both hold (Phase 8.2b re-proves the
      Phase-8.2a readiness conjunction under one lock). Completion fails closed on an
      unresolved blocking question, an accepted-but-unpromoted or stale-graph promotion,
      a contested contradictory promotion, or question provenance that does not bind the
      certified result.
  - id: closure.completion_never_mutates_governed_or_certification_truth
    title: Completion never mutates dialogue, governed sources, graph, briefing, proof, or certification truth
    severity: critical
    status: active
    description: >
      Phase 8.2. The completion owner only verifies that the separate question/promotion
      owner completed its work. It never answers questions, records dispositions, mutates
      governed sources, rebuilds the graph, writes briefing projections, discharges proof,
      or writes CorrectnessCertified.
    protects:
      files:
        - docs/design/phase8-discovery.md
        - golang/architecture/completion/complete.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
      - golang/architecture/completion/complete_test.go:TestCompleteMutatesNoUpstreamTruth
    contract: >
      The completion transaction is verify-only over the feedback loop and certification:
      it appends exactly one completed event with a validated completion receipt and never
      mutates dialogue, governed sources, the graph, briefing projections, proof,
      question-resolution, or certification truth, and never sets CorrectnessCertified
      (Phase 6 remains its sole writer). Completion cannot repair the loop it verifies.
  - id: closure.completed_tasks_are_terminal_and_replay_idempotent
    title: Completed tasks are terminal and replay-idempotent
    severity: critical
    status: active
    description: >
      Phase 8.2. completed is terminal for one session and is never silently reopened;
      an exact re-completion appends no second event and reports the current terminal
      state. A new mutation after certification creates a new result binding, not a
      reopening.
    protects:
      files:
        - docs/design/phase8-discovery.md
        - golang/architecture/closureprotocol/vocabulary.go
        - golang/architecture/completion/complete.go
    required_tests:
      - golang/coverage/phase8_contract_test.go:TestPhase8GovernedContractPresent
      - golang/architecture/completion/complete_test.go:TestCompleteExactReplay
      - golang/architecture/completion/complete_test.go:TestCompleteConcurrentSingleWinner
    contract: >
      completed is a terminal task state for one session; a completed task is never
      reopened. An exact replay of a completed task appends no second completed event and
      returns the current terminal state. Rework after certification proceeds as a new
      result binding under a new iteration/session, never as an in-place reopen.
  # ── Phase 8.1b: governed promotion — atomicity, projection, journal laws ──
  - id: closure.promotion_journal_is_not_governed_truth
    title: A promotion attempt journal never constitutes governed truth
    severity: critical
    status: active
    description: >
      Phase 8.1b. The per-attempt promotion journal under .sensei/project/promotions
      is recovery metadata only. Reusable governed truth exists only when a verified
      question_promotion_committed state produces an authoritative QuestionPromotionReceipt
      bound to a committed source manifest and a reloaded repository graph. A journal
      entry, a source file, a graph node, an authority marker, or an adoption.Receipt
      alone is never promotion proof.
    protects:
      files:
        - docs/design/phase8-discovery.md
        - golang/architecture/ledger/lock.go
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/questionpromotion/final_test.go:TestAuthorityNonCollapse
    contract: >
      promotion authority is the verified committed receipt; the journal is recovery
      metadata and never establishes reusable truth.
  - id: closure.source_commit_without_graph_verification_is_incomplete
    title: A committed source mutation without verified graph projection is promotion_incomplete
    severity: critical
    status: active
    description: >
      Phase 8.1b. After governed_source_committed the canonical YAML is durable authoring
      truth, but the Phase-8 promotion claim is promotion_incomplete until governed_graph_verified
      independently reloads and verifies the persisted repository graph and authority marker.
      Filesystem success is never reported as epistemic promotion.
    protects:
      files:
        - docs/design/phase8-discovery.md
        - golang/architecture/graphbuild/graphbuild.go
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/questionpromotion/matrix_test.go:TestCrashWindow3_SourceEventDurableGraphAbsent
    contract: >
      source_committed reports promotion_incomplete; only graph_verified then
      promotion_committed completes the promotion.
  - id: closure.graph_verification_binds_committed_manifest
    title: Graph verification binds the exact committed governed-source manifest
    severity: critical
    status: active
    description: >
      Phase 8.1b. The rebuilt repository graph must derive from the exact committed
      governed-source manifest of this attempt: the receipt binds pre- and post-mutation
      manifest digests, the deterministic graph-build input identity, and the persisted
      graph byte digest plus authority-marker digest. A graph compiled from a different
      source world is rejected even if it happens to contain the target node.
    protects:
      files:
        - golang/architecture/graphbuild/graphbuild.go
        - golang/architecture/graphsnapshot/graphsnapshot.go
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/questionpromotion/matrix_test.go:TestGraphTamperFailsClosedOnReplay
    contract: >
      the verified graph must correspond to the exact committed source manifest;
      any drift is typed stale/incomplete, never successful promotion.
  - id: closure.promotion_retry_resumes_same_attempt
    title: Promotion retry resumes the same content-addressed attempt
    severity: critical
    status: active
    description: >
      Phase 8.1b. Identical frozen inputs resolve to one content-addressed attempt id.
      Retry resumes and reconciles that attempt from its durable journal; it never mints
      a second attempt, a duplicate governed record, a second receipt, or a duplicate node.
    protects:
      files:
        - golang/architecture/ledger/lock.go
        - docs/design/phase8-discovery.md
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/questionpromotion/matrix_test.go:TestConcurrentIdenticalSingleCommit
    contract: >
      one stable attempt identity per frozen input set; retry resumes, never duplicates.
  - id: closure.contradictory_canonical_id_never_overwritten
    title: A contradictory canonical governed record is never overwritten
    severity: critical
    status: active
    description: >
      Phase 8.1b. Promoting a canonical record ID whose existing governed body differs in
      semantics is a typed collision/contradiction, never an overwrite. An exact same
      canonical body and lineage is replay. Governed source is append-only under promotion.
    protects:
      files:
        - cmd/awg/cmd_propose.go
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/questionpromotion/matrix_test.go:TestContradictoryProposalRefused
    contract: >
      same id + different semantics is a typed contradiction; same body is replay; never overwrite.
  - id: closure.promotion_receipt_only_after_projection_verified
    title: The promotion receipt is authoritative only after persisted projection verification
    severity: critical
    status: active
    description: >
      Phase 8.1b. The QuestionPromotionReceipt becomes authoritative only at
      question_promotion_committed, after the canonical repository graph and authority
      marker were persisted, independently reloaded, and verified against the committed
      manifest. Recompute every trusted value; trust no caller-supplied governed status,
      graph digest, node IRI, source digest, provenance verdict, or promotion status.
    protects:
      files:
        - golang/architecture/adoption/receipt.go
        - docs/design/phase8-discovery.md
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/questionpromotion/final_test.go:TestEndToEndIdentityCrosslinks
    contract: >
      the receipt is written only after persisted-projection verification; all trusted
      values are recomputed, never caller-supplied.
  - id: closure.repo_graph_and_combined_seed_identities_distinct
    title: Repository-scoped graph identity and combined embedded-seed identity are never confused
    severity: critical
    status: active
    description: >
      Phase 8.1b. The canonical repository-scoped projection is .sensei/project/graph.nt
      plus .sensei/graph-authority.json. The combined embedded seed
      golang/server/embeddata/awareness.nt is a separate cross-repository deployment
      artifact. Promotion never edits, partially regenerates, or claims convergence of the
      combined seed; the outstanding combined-seed obligation is reported explicitly.
    protects:
      files:
        - golang/server/embeddata/awareness.nt
        - golang/architecture/graphsnapshot/graphsnapshot.go
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/repograph/repograph_test.go:TestNoEmbeddedSeedMutation
    contract: >
      repository graph (.sensei/project/graph.nt) and combined seed (embeddata/awareness.nt)
      are distinct identities; promotion touches only the former.
  - id: closure.promotion_journal_separate_from_task_lifecycle
    title: The promotion journal is separate from task lifecycle truth
    severity: critical
    status: active
    description: >
      Phase 8.1b. The four promotion states (question_promotion_prepared,
      governed_source_committed, governed_graph_verified, question_promotion_committed)
      use a promotion-local typed vocabulary. They are never ordinary task events, never
      projected into task phase/status, and never consumed by task-ledger reducers.
    protects:
      files:
        - golang/architecture/closureprotocol/vocabulary.go
        - golang/architecture/ledger/lock.go
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/questionpromotion/final_test.go:TestPromotionWritesNoCertificationOrCompletion
    contract: >
      promotion journal events are promotion-local and never enter task phase/status truth.
  - id: closure.offline_provenance_query_matches_graph_owner
    title: Offline provenance query semantics match the normal graph owner
    severity: critical
    status: active
    description: >
      Phase 8.1b. The offline provenance reader over the persisted repository graph
      implements or reuses the normal store.Store describe/inbound semantics: canonical IRI
      parsing, edge direction, literal handling, and results must match the graph owner,
      proven by parity tests. It never invents a second RDF interpretation.
    protects:
      files:
        - golang/architecture/graphsnapshot/graphsnapshot.go
    required_tests:
      - golang/coverage/phase8_1b_contract_test.go:TestPhase81bGovernedContractPresent
      - golang/architecture/repograph/repograph_test.go:TestStoreAdapterParityWithGraphsnapshot
    contract: >
      the offline provenance query mirrors store.Store semantics, proven by parity.
  # ── Phase 8.2a: read-only terminal-completion readiness evaluator ──
  - id: closure.completion_readiness_is_read_only_evidence_conjunction
    title: Terminal-completion readiness is a read-only evidence conjunction, never a completion
    severity: high
    status: active
    description: >
      Phase 8.2a. The terminal-completion readiness evaluator is a deterministic,
      read-only projection. It re-proves each required completion obligation from
      durable artifacts and their owners (task ledger, Phase-6 correctness
      certification, Phase-8.1d question-resolution certification, governed source
      manifest) and conjoins them into a typed per-obligation assessment. It trusts
      no caller-supplied boolean, receipt path, briefing, or prose status; it
      persists no completion receipt, appends no completed event, and mutates
      nothing. A ready assessment reports only that the required evidence currently
      holds — it does not perform, authorize, or assert terminal completion.
    protects:
      files:
        - golang/architecture/completion/readiness.go
        - golang/architecture/completion/load.go
        - golang/architecture/completion/model.go
    required_tests:
      - golang/architecture/completion/readiness_test.go:TestAssessDoesNotAssertCompletion
      - golang/architecture/completion/readiness_test.go:TestAssessDeterministicAndNoSideEffects
    contract: >
      Terminal-completion readiness evaluation is distinct from terminal-completion
      mutation, from Phase-6 correctness certification, and from Phase-8.1d
      question-resolution certification. The evaluator only re-proves and conjoins
      existing authoritative evidence read-only; it never establishes correctness or
      question resolution itself, never authorizes or emits completion, and fails
      closed on missing, stale, tampered, contradictory, wrong-bound, or unsupported
      evidence.
  # ── Phase 8.2c: durable terminal-state reconstruction and recovery ──
  - id: closure.terminal_state_reconstructed_only_from_durable_conjunction
    title: Terminal completion is reconstructible only from the unique durable event/receipt conjunction
    severity: critical
    status: active
    description: >
      Phase 8.2c. After restart, projection loss, interrupted persistence, or later
      inspection, terminal state is reconstructed from durable owner-verified
      artifacts alone. A completion is authoritative only as EXACTLY one completed
      event plus its valid matching content-addressed receipt, zero revoked facts,
      and bindings intact. A valid receipt without a completed event is residue, not
      completion; a completed event without a valid matching receipt is broken, not
      completion; multiple completed events or any revoked fact are contradictory
      terminal history. Projections are derived state and never terminal authority.
    protects:
      files:
        - golang/architecture/completion/inspect.go
        - golang/architecture/completion/recover.go
    required_tests:
      - golang/architecture/completion/inspect_test.go:TestInspectCommittedAfterRestart
      - golang/architecture/completion/inspect_test.go:TestInspectReceiptWithoutEvent
      - golang/architecture/completion/inspect_test.go:TestInspectEventWithoutReceipt
    contract: >
      Reconstruction reuses the single terminal-history classifier; it never invents,
      repairs, supersedes, or blesses a terminal fact, never normalizes contradictory
      history, and never treats receipt-only residue or an event without a valid
      receipt as completion. Reconstruction is read-only and deterministic.
  - id: closure.terminal_recovery_rebuilds_derived_state_only
    title: Terminal recovery restores derived projections only and never appends or blesses a terminal fact
    severity: critical
    status: active
    description: >
      Phase 8.2c. Projection recovery restores derived state from an already-valid
      unique durable conjunction. It appends no ledger event, rewrites no receipt,
      resolves no completion authority, uses no terminal-completion operation, and can
      never create, replace, supersede, or bless a terminal fact. Contradictory
      terminal history is never normalized; receipt-only residue is never blessed;
      retry through the completion owner is the only path that may append a completion.
    protects:
      files:
        - golang/architecture/completion/recover.go
    required_tests:
      - golang/architecture/completion/inspect_test.go:TestInspectAndRecoverProjectionLoss
      - golang/architecture/completion/inspect_test.go:TestInspectDuplicateCompleted
    contract: >
      Recovery is derived-state maintenance only: it rebuilds projections from a valid
      unique durable conjunction and otherwise refuses, never appending a completed
      event, never normalizing contradictory history, and never blessing residue.
  # ── Phase 8.2d: end-to-end completion closure ──
  - id: closure.authoritative_completion_iff_whole_durable_conjunction
    title: Authoritative completion exists iff the whole durable conjunction holds
    severity: critical
    status: active
    description: >
      Phase 8.2d. A task is authoritatively completed only when the complete durable
      conjunction holds: current task/result, Phase-6 correctness, a closed current
      question loop, fresh governed evidence at completion time, exact completion
      authority, exactly one completed event, exactly one matching receipt, and zero
      revoked facts. The end-to-end integration verifier composes the accepted owners
      read-only — it re-verifies each bound component through its owner and never
      appends completion, repairs upstream truth, promotes knowledge, disposes
      questions, certifies correctness, or mutates governed sources. Governed drift
      after completion is reported distinctly and never rewritten as corruption or
      current readiness.
    protects:
      files:
        - golang/architecture/completion/integration.go
        - golang/architecture/completion/closure_report.go
    required_tests:
      - golang/architecture/completion/integration_test.go:TestClosureHappyPath
      - golang/architecture/completion/integration_test.go:TestClosureTamperingBreaksClosure
      - golang/architecture/completion/integration_test.go:TestPhase8ClosureReportContract
    contract: >
      The integration verifier proves authoritative completion iff the whole durable
      conjunction re-verifies through each owner; it is read-only. The Phase-8 closure
      report is implementation evidence only — never a task-completion fact and never
      runtime completion authority — and keeps implementation closure, completion of
      one task, and repository-wide perfection as three distinct claims.
  # ── Phase 9.0: governed contract for operational surfacing of completion truth ──
  - id: closure.phase9_surfaces_consume_completion_truth_never_reinterpret_it
    title: Phase-9 surfaces consume terminal-completion truth read-only and never reinterpret it
    severity: critical
    status: active
    description: >
      Phase 9. Every Phase-9 surface (CLI, MCP, server read model, CI gate, editor) is
      a read-only projection of, or a delegating invocation to, the Phase-8 completion
      owner. A surface may consume InspectTerminalState, VerifyCompletionClosure,
      BuildPhase8ClosureReport, RecoverProjections, and the read-only completed
      event/receipt; it must never append a completed event, produce/replace a
      completion receipt, re-derive readiness/correctness/question-resolution/terminal
      cardinality, or normalize contradictory terminal history at the surface.
    protects:
      files:
        - docs/design/phase9-contract.md
        - golang/architecture/completion/
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      Phase-9 surfaces are thin clients over the completion owner; the completion owner
      remains the sole terminal authority. No surface reinterprets, re-derives, or
      re-authorizes completion truth.
  - id: closure.phase9_invocation_surfaces_only_delegate_to_the_owner
    title: Phase-9 invocation surfaces only delegate to the completion owner
    severity: critical
    status: active
    description: >
      Phase 9. A Phase-9 invocation surface (complete-task CLI/MCP, recovery surface)
      only delegates to the existing completion owner (CompleteTask / RecoverProjections)
      and surfaces its typed outcome. It mints no second completion authority, bypasses
      no readiness or authority resolution, and accepts no caller-supplied completion
      status, receipt, or cardinality.
    protects:
      files:
        - docs/design/phase9-contract.md
        - cmd/awg/
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      Completion is invoked only by delegating to completion.CompleteTask; the surface
      manufactures no completion and reuses the single authorized owner path.
  - id: closure.phase9_projections_are_not_terminal_authority
    title: Phase-9 read models and projections are never terminal authority
    severity: critical
    status: active
    description: >
      Phase 9. Phase-9 read models (task-status view, briefing, CI gate, editor cockpit)
      are non-authoritative. The durable completed event plus its matching receipt —
      reconstructed by the completion owner — is the sole terminal truth. A projection,
      read model, or the Phase-8 closure report is never used as runtime completion
      authority.
    protects:
      files:
        - docs/design/phase9-contract.md
        - golang/server/
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      Projections are derived and non-authoritative; only the durable event/receipt
      conjunction is terminal truth.
  - id: closure.phase9_preserves_the_three_completion_distinctions
    title: Phase-9 surfaces preserve implementation closure vs task completion vs repository perfection
    severity: critical
    status: active
    description: >
      Phase 9. No Phase-9 surface collapses the three distinct claims the Phase-8
      closure report preserves: Phase-8 implementation closure, completion of one task,
      and repository-wide perfection. The closure report is surfaced only as
      implementation evidence, never as a task-completion fact or runtime authority.
    protects:
      files:
        - docs/design/phase9-contract.md
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      Implementation closure, completion of one task, and repository-wide perfection
      remain three distinct claims at every Phase-9 surface.
  - id: closure.phase9_surfaces_locked_until_a_reviewed_slice
    title: Phase-9 product surfaces stay locked until unlocked by their own reviewed slice
    severity: critical
    status: active
    description: >
      Phase 9. CLI, MCP, CI/GitHub, editor, and any GNN surface remain locked; each is
      enabled only by its own reviewed Phase-9 slice with acceptance criteria, failure
      modes, and a proof matrix. GNN / embedding-similarity memory is out of scope,
      not merely deferred, absent new reviewed repository evidence.
    protects:
      files:
        - docs/design/phase9-contract.md
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      No Phase-9 surface ships without its reviewed slice; one slice is open at a time;
      GNN is excluded until repository evidence justifies it.
  # ── Phase 9.1: canonical read-only completion projection ──
  - id: closure.completion_projection_is_the_single_canonical_read_view
    title: The completion projection is the single canonical read-only view of Phase-8 completion truth
    severity: critical
    status: active
    description: >
      Phase 9.1. One canonical, deterministic, read-only projection composes the
      exported Phase-8 read owners (InspectTerminalState, VerifyCompletionClosure) and
      is the single mapping that server, task-status, and task-briefing consume — no
      surface invents its own translation. It preserves the owners' closed
      state/verdict vocabularies without collapsing them, derives
      authoritative_completion only from ClosureAuthoritativeCompletion, preserves the
      distinction between historical authoritative completion and current governed
      drift, is explicitly non-authoritative, and mutates nothing. It never calls
      CompleteTask/RecoverProjections, re-derives terminal truth from raw files, or
      treats itself or the closure report as terminal authority.
    protects:
      files:
        - golang/architecture/completion/projection.go
        - cmd/awg/cmd_task_session.go
    required_tests:
      - golang/architecture/completion/projection_test.go:TestProjectionNonAuthoritativeWorlds
      - golang/architecture/completion/projection_test.go:TestProjectionDisclaimsAuthority
    contract: >
      The completion projection is a read-only, non-authoritative composition of the
      Phase-8 read owners; it is the single canonical mapping and the sole terminal
      truth remains the durable event/receipt conjunction.
  # ── Phase 9.4: CI/GitHub completion gate ──
  - id: closure.completion_gate_fails_open_on_unavailability_and_closed_on_a_computed_verdict
    title: The completion gate degrades on unavailability but blocks on a computed pathological verdict
    severity: critical
    status: active
    description: >
      Phase 9.4. The CI/GitHub completion gate consumes the typed availability envelope
      (BuildCompletionProjectionEnvelope) and validates its canonical publication form,
      never raw ledger/receipts and never rebuilding availability or verdict semantics from
      errors; it adds only advisory/enforce policy — re-derives nothing, mutates authoritative
      state nothing, is never terminal authority. THREE outcome classes are distinct: (1)
      runtime unavailable AFTER identity was established (Sensei/store/owner unreachable) →
      fail OPEN, degraded, since AI is supplementary and never required; (2) a computed
      pathological verdict (broken_completion, contradictory_terminal_history, unsupported)
      → fail CLOSED under enforce; (3) authoritative_completion passes, not_completed passes
      by default and blocks only under an explicit require_completion policy. Enforce is
      opt-in per repo/domain via an explicit completion policy section, never imposed and
      never reached through EditCheck rule inheritance. (Missing/invalid identity is a
      SEPARATE class governed by
      closure.completion_gate_requires_explicit_identity_when_enforcement_applies.)
    protects:
      files:
        - docs/design/phase9.4-contract.md
        - cmd/awg/cmd_gate.go
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      The completion gate consumes the typed projection envelope, degrades (fail-open) on a
      runtime outage after identity, and blocks (fail-closed, under enforce) on a computed
      broken/contradictory/unsupported verdict; it is read-only WRT authoritative state,
      opt-in per domain, and never terminal authority.
  - id: closure.completion_gate_requires_explicit_identity_when_enforcement_applies
    title: The completion gate requires explicit verified task identity where enforcement applies
    severity: critical
    status: active
    description: >
      Phase 9.4. A missing or invalid required task identity is NOT a runtime outage and must
      never become a degraded pass — otherwise a repo that opted into enforcement could bypass
      the gate by omitting or breaking its task binding. Where completion enforcement applies,
      the gate resolves identity from a typed, verified change-to-task binding
      (completion.change_task_binding) — binding repository == CI repository, change id ==
      current PR, head sha == checked-out PR head, task directory within the repository, task
      id/session id matching the verified ledger, exactly one task selected, result binding
      corresponding to this change. Identity that is absent, ambiguous, malformed, or
      mismatched is CANNOT-VERIFY and blocks under enforce (a degraded report in advisory).
      The gate never infers identity from branch name, PR title/body prose, directory scanning,
      "latest"/first-matching task, or the active pointer alone. The mapping selects the task;
      the completion projection remains solely responsible for the verdict.
    protects:
      files:
        - docs/design/phase9.4-contract.md
        - cmd/awg/cmd_gate.go
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      Under enforce, an unresolved or mismatched required task identity is cannot-verify and
      blocks; it is never conflated with runtime unavailability, and identity is never inferred
      by convenience.
  - id: closure.change_task_binding_is_exact_typed_and_positively_authorized
    title: A change-to-task binding is an exact, typed, self-digested identity requiring positive provenance authority
    severity: critical
    status: active
    description: >
      Phase 9.4c. The completion.change_task_binding/v1 publication binds the exact evaluated
      change (repository + bounded base..head + head SHA + change id) to the exact canonical
      task, so a valid completion for one task cannot be laundered onto an unrelated change.
      It is validated by EXACT typed comparison over a self-excluding canonical digest:
      identity-bearing strings are never trimmed, case-folded, shortened, path-cleaned, or
      otherwise normalized — noncanonical input is REJECTED, not converted. A populated issuer
      is never sufficient; authoritative_binding requires POSITIVE provenance verification. A
      contradictory publication set (more than one for one evaluated change) fails closed and
      is never resolved by selecting a record. An invalid binding identity is identity-invalid
      (block under enforce), never a runtime degraded pass. Enforcement composition with the
      9.4b decision is Phase 9.4c Checkpoint 3; this establishes the typed identity object, its
      canonical digest, a strict parser, and a pure validator.
    protects:
      files:
        - docs/design/phase9.4c-change-task-binding.md
        - golang/architecture/changebinding/model.go
        - golang/architecture/changebinding/validate.go
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      The change-to-task binding is exact, typed, and self-digested; noncanonical identity is
      rejected not normalized; authoritative_binding requires positive provenance authority; a
      contradictory set fails closed with no record selected; an invalid binding never receives
      runtime degradation.
  - id: closure.change_task_binding_producer_is_authoritative_and_deterministic
    title: The change-to-task binding producer builds only from authoritative GitHub identity and fails in its own vocabulary
    severity: critical
    status: active
    description: >
      Phase 9.4c Checkpoint 2. The authoritative producer constructs a
      completion.change_task_binding/v1 only from the GitHub pull_request event
      (repository/change/base/head), verified checkout correspondence (checked-out repo and
      head equal the event, full hex, no mutation), an EXPLICIT canonical task, and the exact
      completion-result digest whose subject matches the task/session — never inferred from
      branch/commit/PR-metadata/nearest-directory/only-task/ambient Git state. It computes the
      canonical digest through, and self-validates with, the SAME Checkpoint-1 package,
      requiring authoritative_binding, and publishes one deterministic artifact (no
      timestamps/random; reruns identical; a contradictory existing publication fails closed).
      Producer failures are a CLOSED producer vocabulary and are NEVER expressed as
      projection_owner_runtime_error or any 9.4b degraded-pass reason; the binding is not
      consumed by enforcement here (composition is Checkpoint 3). Local execution is never
      promoted to GitHub-authoritative.
    protects:
      files:
        - golang/architecture/changebindingproducer/produce.go
        - golang/architecture/changebindingproducer/publish.go
        - .github/actions/sensei-gate/action.yml
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      The producer builds only from authoritative event + verified checkout + explicit task +
      exact completion digest, self-validates through the Checkpoint-1 validator, publishes
      deterministically, and fails in its own vocabulary — never a 9.4b runtime/degraded reason.
  - id: closure.change_task_binding_consumed_before_completion_and_invalid_never_degrades
    title: The change-to-task binding is validated before the 9.4b completion decision, and an invalid binding never degrades
    severity: critical
    status: active
    description: >
      Phase 9.4c Checkpoint 3. Where a domain requires completion in authoritative GitHub
      enforcement, an authoritative completion.change_task_binding/v1 is validated BEFORE the
      unchanged 9.4b completion decision runs. Authority is exact correspondence to the current
      trusted subject reconstructed INDEPENDENTLY of the publication (event repo/change/base/head
      == checkout; explicit task/session; the exact completion-result digest under evaluation;
      expected producer) plus positive provenance — a binding never self-authorizes via its own
      provider/issuer/tool/digest. The two typed layers stay distinct (binding decision +
      completion decision); an absent/malformed/stale/contradictory/unverifiable/mismatched
      binding BLOCKS at the binding stage and the completion evaluation (owner invocation) never
      runs, so an invalid binding can NEVER reach the 9.4b runtime-degradation lane; only an
      authoritative binding followed by a genuine post-invocation owner runtime failure may
      degrade under the unchanged 9.4b policy. Exactly one publication is consumed from the one
      documented path; a set is never resolved by selection. A not-required/unlisted domain
      preserves the frozen 9.4a/9.4b behavior. No cryptographic attestation is claimed.
    protects:
      files:
        - golang/architecture/changebindingconsumer/consume.go
        - cmd/awg/cmd_gate_completion_compose.go
        - .github/actions/sensei-gate/action.yml
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      An authoritative change-to-task binding is validated against the independently-reconstructed
      current subject before the unchanged 9.4b decision; an invalid binding blocks before
      completion and never degrades; only an authoritative binding plus a genuine post-invocation
      runtime failure may degrade.
  - id: closure.briefing_feedback_is_verified_scoped_and_single_owner
    title: Briefing feedback consumes only independently-verified committed promotions, scope-exact and through one canonical owner
    severity: critical
    status: active
    description: >
      Phase 9.6 Checkpoint 1. One canonical read-only owner (golang/architecture/briefingfeedback)
      produces the deterministic briefing.feedback_projection/v1. It admits a promoted governed
      record ONLY after questionpromotion.VerifyCommittedPromotion re-proves the complete
      committed conjunction (never graph adjacency, a promotion directory name, a receipt path, an
      issuer string, or a claimed status). Admission uses the VERIFIED effective scope with EXACT
      domain identity (no trim/case-fold/basename/prefix/suffix/fallback; an empty requested domain
      cannot admit a domain-scoped promotion; a domain-neutral verified promotion may qualify only
      on exact repository + file-scope intersection) and file-scope intersection (a promotion with
      no effective file scope is never assumed global). It preserves exact question/answer/
      disposition/task/session/result/promotion-lineage provenance — the governed record is the
      reusable truth while question/answer are lineage, and raw answer text is never rendered as
      governed knowledge. The projection is non-authoritative and asserts no certification or
      completion. A relevant broken promotion degrades the requested scope (typed), but unrelated
      broken-promotion debris never poisons it, and untrusted claim metadata may only ROUTE a
      candidate for verification — never establish authority or admission. Failure classification
      is TYPED (from questionpromotion's typed verification cause), never from error text. Both the
      task briefing and the future server briefing consume this one owner — no consumer
      reimplements discovery, verification, scope, relevance, or classification.
    protects:
      files:
        - docs/design/phase9.6-briefing-feedback.md
        - golang/architecture/briefingfeedback/build.go
        - golang/architecture/briefingfeedback/model.go
    required_tests:
      - golang/coverage/phase9_contract_test.go:TestPhase9GovernedContractPresent
    contract: >
      Briefing feedback admits only VerifyCommittedPromotion-verified committed promotions with
      exact verified domain+file scope, preserves exact lineage provenance, is non-authoritative,
      classifies failures by typed cause not text, isolates unrelated debris, and is produced by one
      canonical owner both task and server briefing consume.

  - id: closure.briefing_feedback_server_repository_context_is_startup_owned
    title: The server briefing-feedback repository context is one immutable startup-owned root+domain pair
    severity: critical
    status: active
    description: >
      Phase 9.6 Checkpoint 2. The server may verify committed promotions for exactly ONE
      repository, identified by an immutable startup-owned pair (repository root + repository
      domain) configured together via `sensei serve --repo-root/--repo-domain` and forwarded to
      the awareness-graph binary as `-repo-root/-repo-domain`. Neither value is ever supplied by
      BriefingRequest; both must be configured together; the root is resolved (symlinks once) and
      verified as an existing directory once at startup (the direct binary never calls
      filepath.Abs on the supplied root — a relative root fails startup); the domain is exact,
      unpadded, and whitespace-free. The context is constructed before RPC traffic is accepted and
      no request handler mutates it. homeDomain is NOT repository identity (it remains graph scope
      for untagged nodes); repoDomain identifies the filesystem repository whose promotions may be
      verified. Absent configuration ⇒ feedback_unavailable while the graph briefing stays usable;
      never inferred from cwd, the requested file, the requested/home domain, the only task
      directory, or a promotion artifact.
    contract: >
      The filesystem feedback context is one immutable startup-owned root+domain pair, validated
      once before serving, never caller-selected and never inferred from ambient context.

  - id: closure.briefing_feedback_wire_is_additive_typed_and_projection_derived
    title: The briefing-feedback wire contract is additive, typed, and mapped only from the validated canonical projection
    severity: high
    status: active
    description: >
      Phase 9.6 Checkpoint 2. BriefingResponse gains an ADDITIVE field 7 (feedback) carrying the
      canonical briefing.feedback_projection/v1 mirrored as closed typed wire messages/enums; no
      existing field number is renumbered and clients that ignore field 7 keep working. The
      projection-to-wire adapter validates via briefingfeedback.ValidateProjection first, maps
      every closed enum explicitly (no default mapping; an unknown enum or impossible state is an
      internal adapter failure, never a partial projection), preserves ordering and every identity
      exactly, preserves the canonical digest, never recomputes availability, never inspects error
      text, never mutates the source, and never places a filesystem repository root on the wire.
      The server is a thin consumer: it does not rediscover promotions, reimplement verification,
      calculate availability, or reinterpret findings — it delegates to the canonical owner and the
      pure adapter.
    contract: >
      Feedback rides an additive typed field 7 mapped only from a validated canonical projection
      with explicit closed-enum mapping, preserved digest, and no filesystem root on the wire.

  - id: closure.briefing_feedback_prose_is_rendered_only_from_the_typed_projection
    title: Server briefing-feedback prose is rendered only from the validated canonical projection
    severity: high
    status: active
    description: >
      Phase 9.6 Checkpoint 2. Feedback prose is derived ONLY from the same validated canonical
      projection that is mapped to the wire — never from protobuf values independently, graph
      adjacency, promotion directories, task-session limitations, or a server-specific
      classification. Prose renders only governed-record information (kind, canonical record id,
      source document); question/answer/receipt/task/session/promotion-lineage identities remain
      structured provenance and raw answer text is never rendered. Every governed record rendered
      in prose exists in the structured projection, and no failed candidate is ever rendered as
      governed truth.
    contract: >
      Prose and structured feedback derive from one validated canonical projection; prose renders
      only governed-record identity, never raw answer text or a failed candidate as truth.

  - id: closure.briefing_feedback_unavailability_never_erases_base_graph_briefing
    title: Degraded/unavailable/invalid feedback never erases the base graph briefing or upgrades combined status
    severity: high
    status: active
    description: >
      Phase 9.6 Checkpoint 2. Combined briefing status is one pure function of base ⊕ feedback,
      frozen so feedback never converts a degraded/unavailable/invalid state into OK: base OK +
      feedback available/empty ⇒ OK; base OK + feedback degraded/unavailable/invalid ⇒ DEGRADED;
      base EMPTY + feedback available ⇒ OK; base EMPTY + feedback empty ⇒ EMPTY; base EMPTY +
      feedback degraded/unavailable/invalid ⇒ DEGRADED. The base graph briefing content is always
      preserved when feedback is degraded, unavailable, or invalid, and a feedback failure never
      aborts an otherwise usable graph briefing (a valid typed unavailable projection is emitted
      instead).
    contract: >
      Combined status composes base and feedback by a frozen table that never upgrades to OK, and
      the base graph briefing is always preserved when feedback degrades.

  - id: closure.briefing_feedback_task_text_is_not_task_identity
    title: Natural-language task text is never treated as canonical task identity for server feedback
    severity: high
    status: active
    description: >
      Phase 9.6 Checkpoint 2. BriefingRequest.task is natural-language pattern-matching text, not a
      canonical task id, session, verified binding, or file set. A task-only server briefing never
      manufactures a task binding, calls a tasksession active-task fallback, infers a task from the
      only task directory, or adds caller-supplied task identity; it returns typed
      feedback_unavailable with reason canonical_task_scope_not_established while its existing
      graph/intent/implementation-pattern briefing remains present. The exact task-scoped feedback
      path exists only through TaskBriefing.FeedbackProjection; the generic server briefing creates
      no second task-resolution surface.
    contract: >
      Task text is pattern-matching input, never canonical task identity; task-only feedback is
      typed-unavailable (canonical_task_scope_not_established), never a manufactured binding.

  - id: controlstate.semantic_projection_has_one_transport_neutral_owner
    title: Phase 9.5 architectural-state projections have one transport-neutral composition owner
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 1. golang/architecture/controlstate is the SOLE semantic composition
      owner of the control-panel read models (control_snapshot, artifact_index, artifact_state,
      attention_item, navigation_descriptor). It composes and classifies closure, lifecycle,
      severity, applicability, artifact state, and repository posture. It imports no
      golang/server, generated protobuf, editor, or CLI rendering package. The server, protobuf
      adapters, VS Code, and CLI are consumers below it and never reclassify control state.
    contract: >
      controlstate is the one transport-neutral owner of Phase 9.5 semantic projections; the
      server/editor expose them and never compose or reclassify them.

  - id: controlstate.task_closure_must_not_be_projected_as_artifact_closure
    title: Task/scope closure is never copied onto an arbitrary artifact
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 1. closure.Report is a task/request/scope closure owner; its aggregate
      Verdict and DimensionAssessment list are never copied onto an arbitrary graph artifact.
      Task closure and artifact closure are independent projections. closure.Report may
      contribute scoped typed evidence to an artifact dimension only where a reviewed per-class
      dimension policy explicitly permits it.
    contract: >
      Artifact closure is a per-class controlstate assessment, never closure.Report.Verdict;
      task closure and artifact closure are independent.

  - id: controlstate.artifact_closure_requires_explicit_class_policy
    title: Artifact closure requires an explicit reviewed per-class policy
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 1. An artifact is closed/open/degraded only under an explicit reviewed
      class assessment policy (initial set: Contract, Invariant, Component, Boundary). A class
      with no reviewed policy is unsupported and its closure is unknown, never not_applicable.
      not_applicable requires an explicit class/artifact policy; absence of rules is unknown.
    contract: >
      Artifact closure/open/degraded requires an explicit reviewed class policy; unsupported ->
      unknown; not_applicable is explicit, never absence-inferred.

  - id: controlstate.missing_source_must_not_synthesize_zero_or_closed
    title: A missing or degraded source never synthesizes zero or closed
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 1. Every projection carries typed source statuses and a projection
      availability (available/partial/unavailable/invalid). A missing/unobserved source never
      becomes zero open questions/warnings/contradictions/blind-spots, closed architecture, or an
      empty attention queue. Zero is data only when its source status is available; otherwise the
      state is partial/unavailable with a reason code. Stale/invalid required graph authority can
      never yield closed.
    contract: >
      Zero is data only when the source was observed; a missing source yields partial/unavailable
      with a reason, never zero/closed.

  - id: controlstate.unknown_class_remains_visible_and_unknown
    title: Unknown and unsupported classes remain visible and unknown
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 1. Unknown graph classes remain visible under the unclassified family
      with assessment coverage unknown, closure unknown, and a typed limitation. Ambiguous
      multi-typed artifacts remain visible under unclassified with closure unknown
      (artifact_class_ambiguous). Unsupported classes are never hidden or marked closed/
      not_applicable.
    contract: >
      Unknown/unsupported/ambiguous classes stay visible with unknown closure and a typed
      limitation; never hidden, closed, or not_applicable.

  - id: controlstate.lifecycle_absence_must_not_synthesize_active
    title: Absent lifecycle evidence never synthesizes an active state
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 1. LifecycleAssessment is typed separately from closure. Absence of
      deprecated/superseded evidence never synthesizes active; unsupported vocabulary yields
      unknown; a revocation receipt is not a universal node lifecycle; superseded requires an
      authoritative typed lifecycle source; not_applicable requires explicit class policy.
    contract: >
      Lifecycle is typed separately; absence -> unknown, never active; not_applicable is explicit.

  - id: controlstate.attention_severity_is_typed_owner_assigned_and_deterministic
    title: Attention class and severity are typed, owner-assigned, and deterministic
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 1. controlstate assigns the control-panel attention class and severity
      via a governed source-condition -> class -> severity mapping, as a non-authoritative
      prioritization projection. No error-text parsing, no label/color inference, no client
      mapping. A critical source condition is never silently downgraded; unknown source
      classification stays visible and fails closed; attention identity is the deterministic
      digest of canonical fields; duplicates deduplicate deterministically; ordering is stable.
    contract: >
      Attention class/severity come from a governed typed mapping in controlstate, with
      deterministic IDs/order and no text/color/client derivation; critical is never downgraded.

  - id: controlstate.navigation_descriptor_is_derived_from_the_canonical_registry
    title: The navigation descriptor is mechanically derived from the canonical registry
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 1. ontology.navigation_descriptor/v1 is produced from the authored,
      code-reviewed, immutable typed registry in controlstate, not inferred from whichever classes
      exist in the current graph and not loaded from ambient config. It carries no policy invented
      during projection. The client owns styling/layout only, never class membership,
      capabilities, ontology grouping, or semantic visibility.
    contract: >
      The navigation descriptor is registry-derived and carries no invented policy; the client
      renders it and owns no class membership/capabilities/grouping/visibility.

  - id: controlstate.artifact_index_cursor_is_bound_to_snapshot_identity
    title: The artifact-index cursor is bound to repository/domain/snapshot/registry/filter identity
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 1. ArtifactIndex is paginated with stable deterministic ordering; its
      cursor binds schema, repository identity, domain, graph-authority/snapshot identity,
      registry digest, filter digest, the last complete sort key, and a cursor self-digest. A
      cursor whose bound identity differs from the current request is rejected. Index construction
      is bounded (no semantic N+1) and never requires full ArtifactState per row.
    contract: >
      The index cursor is bound to snapshot/registry/filter identity and rejected on mismatch;
      index rows never build full ArtifactState.

  - id: controlstate.feedback_is_consumed_only_at_exact_verified_scope
    title: Phase 9.6 feedback is consumed only at exact verified scope
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 1. controlstate never discovers or verifies promotions, scans the
      repository for feedback, or associates feedback via graph adjacency. It models only an
      exact scoped feedback reference/summary (scope identity, canonical Phase 9.6 projection
      digest, availability, verified governed-record identities, authorized lineage identities,
      limitations) and never reinterprets briefingfeedback availability. control_snapshot exposes
      feedback capability/availability only, never a repository-wide promoted-feedback collection.
    contract: >
      Feedback is exact-scope only (task/file/artifact), never a repo-wide scan or graph-adjacency
      association; briefingfeedback remains the feedback semantic owner.

  - id: controlstate.protobuf_is_lossless_transport_not_semantic_owner
    title: The control-panel protobuf layer is lossless transport, never a semantic owner
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 2. The protobuf messages for the five control-panel read models and
      the pure mapper (golang/server/controlstateproto) transport controlstate's conclusions
      without semantic loss or reinterpretation. The mapper validates the canonical projection
      before mapping, maps closed vocabularies one-to-one, errors on any unmappable value, and
      never silently omits a malformed field. Ordered repeated fields, limitations, source
      statuses with impacts and reasons, identities, and non_authoritative_projection survive
      mapping exactly. A model->proto->model round trip preserves the canonical semantic content
      and digest.
    contract: >
      controlstateproto maps controlstate projections losslessly and fails on any mismatch; it
      composes and classifies nothing.

  - id: controlstate.server_read_handler_must_consume_canonical_projection
    title: Server read handlers consume canonical controlstate projections only
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 2. Each control-panel RPC handler only validates the request, acquires
      typed inputs through the ControlStateReadProvider seam, calls the canonical controlstate
      builder, validates the returned projection, and maps it losslessly. Handlers never change
      closure, assign severity, select lifecycle, change applicability, fill missing counts,
      reorder semantic lists, inspect reason prose, choose a canonical class, or interpret raw
      RDF edges or governed YAML directly.
    contract: >
      A control-panel read handler is orchestration only: request validation, provider inputs,
      canonical builder, validation, lossless mapping — nothing else.

  - id: controlstate.semantic_unavailability_must_remain_response_data
    title: Semantic unavailability is response data, never a transport failure
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 2. A semantically partial, unavailable, degraded, or unknown
      projection is a SUCCESSFUL RPC response carrying its typed availability, per-source
      statuses, and reasons. gRPC errors are reserved for malformed requests (InvalidArgument),
      failed preconditions (expected authority/registry mismatch), proven absence (NotFound),
      infrastructure failure (Unavailable), and impossible mapper/validator contradictions
      (Internal). Converting semantic unavailability into a transport failure erases the typed
      state the panel must render.
    contract: >
      Partial/unavailable/degraded/unknown projections return as RPC success with typed state;
      transport errors are reserved for the closed error-law conditions.

  - id: controlstate.transport_must_preserve_unknown_distinct_from_zero
    title: The transport preserves unknown as distinct from zero
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 2. An unobserved count/summary is absent on the wire (proto3 optional
      not set), and an observed zero is an explicit zero. The mapper and handlers never convert a
      missing optional value to zero, never drop an observed zero, and never weaken unknown
      closure/lifecycle/availability into a healthier-looking value. UNSPECIFIED enum values
      always fail validation and never encode unknown — unknown is an explicit vocabulary value.
    contract: >
      nil stays absent, observed zero stays zero, unknown stays unknown on the wire; UNSPECIFIED
      always fails validation.

  - id: controlstate.transport_must_not_recompute_projection_digest
    title: The transport copies the canonical projection digest and never recomputes it
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 2. Every wire projection carries the exact digest computed by
      controlstate over the canonical model. The mapper, handlers, and clients never recompute a
      digest from the protobuf representation and never repair a digest mismatch — a projection
      failing its own digest validation is rejected before mapping.
    contract: >
      The projection digest on the wire is the canonical controlstate digest, copied verbatim.

  - id: controlstate.artifact_class_must_not_be_caller_selected
    title: Artifact class authority is never caller-selected
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 2. GetArchitectureArtifactState identifies the artifact by exact node
      IRI only. The canonical class is resolved by the controlstate registry from OBSERVED graph
      classes; no request field supplies a canonical class, and index class filters only restrict
      visibility over already-resolved rows. A caller-supplied class can never select an
      assessment policy.
    contract: >
      Requests identify artifacts by exact IRI; canonical class comes from registry resolution
      over observed classes, never from the caller.

  - id: controlstate.repository_context_must_not_be_derived_from_cwd
    title: Control-panel repository context is startup-owned, never derived from cwd
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 2. Control-panel RPCs reuse the immutable startup-owned repository
      root + domain context (Phase 9.6). Requests may identify the logical repository/domain but
      carry no filesystem root; the server never derives repository authority from os.Getwd,
      workspace folders, home-directory fallbacks, or caller paths. With context unconfigured,
      filesystem-backed inputs remain typed-unavailable and are never filled from local guesses.
    contract: >
      Repository authority is the immutable startup-owned context; requests select logical
      identity only, never a filesystem root.

  - id: controlstate.read_surfaces_must_be_structurally_non_mutating
    title: Control-panel read surfaces are structurally non-mutating
    severity: critical
    status: active
    description: >
      Phase 9.5 Checkpoint 2. The four control-panel RPCs perform no write of repository,
      dialogue, question, completion, certification, or graph state. They consume the read-only
      store interface and typed providers; no handler acquires a write capability. Attention
      items on the wire originate only from validated controlstate construction — no inbound RPC
      accepts an AttentionItem or any other semantic verdict from the client.
    contract: >
      Control-panel RPCs are read-only end to end; no client-supplied semantic verdict is
      accepted.

  - id: controlstate.cursor_must_remain_opaque_and_owner_validated
    title: The index cursor stays opaque on the wire and owner-validated
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 2. ListArchitectureArtifacts carries the controlstate cursor as an
      opaque string. The server and clients never parse, construct, or rewrite it; only
      controlstate validates it against snapshot/registry/filter identity, and a mismatched
      cursor is InvalidArgument. Page-size bounds remain controlstate's.
    contract: >
      The cursor is opaque to transport and clients; only the controlstate owner validates it.

  - id: controlstate.proto_evolution_must_be_additive
    title: Control-panel protobuf evolution is additive only
    severity: high
    status: active
    description: >
      Phase 9.5 Checkpoint 2. Existing protobuf field numbers — including the Phase 9.6
      BriefingResponse.feedback field 7 — are never renumbered, retyped, or removed. Control-panel
      additions use new messages and new field numbers; existing clients keep compiling and
      decoding. Enum vocabularies extend by appending values, never by reusing numbers.
    contract: >
      Proto changes are additive with new field numbers; field 7 and all existing numbers are
      frozen.
  - id: invariant.sensei.editor_renders_owner_projections_verbatim
    title: Editor renders owner projections verbatim
    status: active
    description: CP3 control panel is a read-only renderer; all semantic state originates from controlstate projections over the four read RPCs.
    protects:
      files:
        - editor/vscode/media/controlPanel.js
    contract: 'The VS Code architectural control panel renders typed owner projections (navigation descriptor, control snapshot, artifact index/state) verbatim and classifies nothing: no client-side closure, severity, lifecycle, class membership, capability, ontology grouping, or default visibility. Proven by editor/vscode/src/controlPanelTables.test.ts (node --test).'
  - id: invariant.sensei.artifact_inspector_renders_owner_derived_state_only
    title: Artifact inspector renders owner-derived state only
    status: active
    description: CP4 is a strictly read-only inspector over the already-wired artifact_state projection.
    protects:
      files:
        - editor/vscode/media/controlPanel.js
    forbidden_fixes:
      - forbidden_fix.sensei.render_a_non_applicable_dimension_as_open
      - forbidden_fix.sensei.reuse_legacy_graph_adjacency_as_relationships_in_the_control
    contract: 'The CP4 artifact inspector renders architecture.artifact_state/v1 verbatim: applicable dimensions only, owner enum states as badges, ids and next-action rendered as-is, exact-scope feedback as provenance, relationships and focus-graph honestly unavailable. It infers no closure, lifecycle, severity, question-state, or next-action and performs no mutation.'
  - id: invariant.sensei.architect_mutations_are_guarded_owner_delegations_only
    title: Architect mutations are guarded owner delegations only
    status: active
    description: CP5 adds the first mutation surface as thin guarded delegation to existing owners; it assigns no authority of its own.
    protects:
      files:
        - golang/server/controlstate_mutation_provider.go
    forbidden_fixes:
      - forbidden_fix.sensei.expose_the_unguarded_questiongen_dialogue_op_as_an_authorita
      - forbidden_fix.sensei.copy_raw_architect_answer_text_into_a_governed_record_or_pro
    contract: 'The control panel''s only mutation family (record/accept/reject via questiondisposition, promote via questionpromotion) is a guarded delegation: authority is resolved server-side and client fields are verified claims; refusals write nothing and expose mutation_applied=false with the unchanged ledger identity; no lifecycle auto-chaining; raw answer text never becomes governed prose. Proven by golang/server/controlstate_mutation_test.go + editor/vscode/src/controlPanelMutation.test.ts.'
  - id: invariant.sensei.cp6_control_panel_closure_adds_display_and_proof_only_no_new
    title: CP6 control-panel closure adds display and proof only — no new owner, no fact-writing RPC
    status: active
    description: The architectural control panel's final checkpoint must be integration and proof, not new engine parts. Any temptation to add a semantic owner or a fact-writing RPC is a signal to stop and surface a contradiction, not to build.
    protects:
      files:
        - editor/vscode/media/controlPanel.js
        - golang/architecture/controlstate/snapshot.go
    required_tests:
      - golang/coverage/controlstate_ownership_test.go:TestControlStateTransportOwnershipBoundary
      - golang/coverage/briefing_feedback_ownership_test.go:TestBriefingFeedbackOwnershipBoundary
    contract: Phase 9.5 CP6 (final integration) integrates the DISPLAY of completion and Phase-9.6 feedback, closes accessibility and constrained-width, and validates the packaged artifact — introducing NO new semantic owner and NO fact-writing RPC. Completion is a workflow terminal state, never correctness (Phase 6 alone certifies). Governed promotion stays deferred and visibly unavailable; the served AwarenessGraph surface exposes no fact-writing RPC and golang/server never consumes questionpromotion directly.
  - id: invariant.sensei.runtime_observation_supports_or_contradicts_a_boundary_but_n
    title: Runtime observation supports or contradicts a boundary but never authors, redefines, or certifies it
    status: active
    description: The runtimeboundary owner assesses whether a governed boundary was respected at runtime without letting telemetry invent or certify architecture. Any change that lets an observation mint/authorize a boundary, treats missing telemetry as compliant, or yields satisfied without the full conjunction breaks this.
    protects:
      files:
        - golang/architecture/runtimeboundary/assess.go
        - golang/architecture/runtimeboundary/binding.go
    required_tests:
      - golang/architecture/runtimeboundary/assess_test.go:TestProof_TrafficAloneCannotAuthorize
      - golang/architecture/runtimeboundary/assess_test.go:TestProof_MissingTelemetryNeverCompliant
      - golang/coverage/runtimeboundary_ownership_test.go:TestRuntimeBoundaryOwnershipBoundary
    contract: 'Phase 9.7 runtime-boundary assessment: a runtime observation may support or contradict a declared boundary, but it can never author the boundary, redefine its contract, or certify correctness. Missing telemetry is never compliant (absent/unobserved evidence yields unavailable/unknown, never satisfied). Observed traffic can never authorize a crossing or create a boundary — an observation is admissible only through an explicit non-self-authorizing binding, in scope, target-matched. A positive verdict requires the full conjunction: current integrity-verified runtime-assessable identity + explicit policy + admissible fresh in-scope evidence. Phase 6 remains the sole correctness certifier.'
  - id: invariant.sensei.a_probe_observation_is_owner_path_evidence_not_a_boundary_cr
    title: A probe observation is owner-path evidence, not a boundary crossing
    status: active
    description: The runtimeprobe adapter proves the runtime-boundary kernel with one native witness. Any change that lets a probe fabricate a caller/callee/contract, reach satisfied, or claim available/fresh from a degraded/stale probe breaks the honesty law.
    protects:
      files:
        - golang/architecture/runtimeprobe/observation.go
        - golang/architecture/runtimeprobe/receipt.go
    required_tests:
      - golang/architecture/runtimeprobe/adapter_test.go:TestInsufficiency_ProbeNeverSatisfiesCrossing
      - golang/architecture/runtimeprobe/adapter_test.go:TestHonestMapping_NeverInventsCrossingIdentity
      - golang/coverage/runtimeprobe_ownership_test.go:TestRuntimeProbeOwnershipBoundary
    contract: 'Phase 9.7 CP2: a Sensei probe/probeexec observation is owner-path EVIDENCE (collector, evidence digest, timestamp, declared freshness, content integrity, evidence-node anchor) — it has no caller, callee, contract, or interaction. The runtimeprobe adapter maps only what a probe honestly has and leaves the governed-crossing identity UNRESOLVED; it never invents caller/callee/contract to make an observation admissible. Evidence-level proof therefore never satisfies a boundary crossing: composed through the frozen runtimeboundary owner, an honest probe observation is admitted and correctly ruled insufficient (unknown/required_evidence_absent), never satisfied. The immutable evidence receipt is the frozen closureprotocol.EvidenceReceipt; replay is idempotent (REPLAYED) and conflicting same-subject evidence is preserved (CONTESTED), never first-row-wins.'
  - id: invariant.sensei.runtime_boundary_verdict_travels_the_control_panel_only_as_a
    title: Runtime-boundary verdict travels the control panel only as a verbatim projection
    status: active
    description: CP3 composes the runtime-boundary verdict into the control panel through one bridge; no downstream surface re-derives runtime-boundary semantics.
    protects:
      files:
        - golang/architecture/runtimeboundarycompose/compose.go
        - golang/architecture/controlstate/policy.go
    related_invariants:
      - invariant.sensei.runtime_observation_supports_or_contradicts_a_boundary_but_n
    required_tests:
      - golang/architecture/runtimeboundarycompose/compose_test.go:TestVerbatim_VerdictToDimensionState
      - golang/coverage/runtimeboundarycompose_ownership_test.go:TestRuntimeBoundaryComposeOwnershipBoundary
    contract: 'Phase 9.7 CP3: a runtimeboundary.RuntimeBoundaryAssessment reaches Sensei''s control panel (artifact dimensions + attention + transport + editor) only as a VERBATIM projection of the owner''s already-decided verdict, through the single runtimeboundarycompose bridge. controlstate never imports runtimeboundary and never recomputes a verdict; the server carries the runtime dimension through the generic transport and never imports the owner. The verdict maps one-to-one to a typed controlstate dimension state (satisfied->DimSatisfied, violated->DimOpen with an OWNER-supplied source_severity attention, degraded->DimDegraded, unknown/unavailable/invalid->DimUnknown, not_applicable->a TYPED DimNotApplicable never absence-inferred). A later assessment supersedes by rebinding the dimension source digest to the new assessment digest while the CP2 evidence receipts stay immutable. The bridge invents no evidence and forces no positive verdict.'
  - id: invariant.sensei.incompleteness_and_coverage_are_explained_by_owner_projectio
    title: Incompleteness and coverage are explained by owner projection, never inferred from absence
    status: active
    description: 'Issue #93 Layer 1-3: the actionable incompleteness explanation and the coverage grounding summary are owner-projected, never UI-composed and never absence-inferred.'
    protects:
      files:
        - golang/architecture/controlstate/artifactstate.go
        - golang/architecture/runtimeboundarycompose/compose.go
        - editor/vscode/media/controlPanelFmt.js
    required_tests:
      - golang/architecture/controlstate/explanation_test.go:TestComposeDimensionExplanation_TotalAndFailHonest
      - golang/architecture/runtimeboundarycompose/compose_test.go:TestRuntimeExplanation_TotalAndDoesNotChangeVerdict
    contract: 'Phase 9 polish: a non-positive dimension''s actionable explanation (Known/Missing/WhyNotImprovable/NextEvidence) is projected by its OWNER (controlstate from its own reason codes; the runtimeboundary bridge from the owner''s already-decided ResultKind space), carried as data with a stable Kind, and rendered VERBATIM by the panel — the UI composes no wording and holds no decision table. The mapping is TOTAL and fail-honest: an unrecognized reason yields an explicit generic explanation, never empty. An explanation never changes the owner verdict or severity. Non-positive states (unknown/unavailable/invalid/degraded/not_applicable) render DISTINCTLY (glyph+text, never color alone, never collapsed). Coverage ratios use only owner-controlled numerator/denominator pairs; a percentage is emitted ONLY when the denominator is observed and greater than zero; a missing denominator is unavailable and an observed-zero population is never 0%/100%; coverage never certifies and never suppresses attention.'
  - id: invariant.sensei.proportional_rigor_classifies_governed_surfaces_and_fails_cl
    title: Proportional rigor classifies governed surfaces and fails closed
    status: active
    description: 'Issue #93 Layer 4: the proportional-rigor classifier grades a CHANGE''s proof obligations by governed surface, fails closed, and never exempts repository integrity.'
    protects:
      files:
        - golang/architecture/rigor/rigor.go
        - docs/rigor_classes.yaml
    required_tests:
      - golang/architecture/rigor/rigor_test.go:TestUnclassifiedFileForcesClassA
      - golang/coverage/rigor_ownership_test.go:TestRigorOwnershipBoundary
    contract: 'Phase 9 polish: proportional rigor answers what proof a CHANGE owes, never repository truth. It classifies stable GOVERNED SURFACES declared in docs/rigor_classes.yaml (never a raw filename); changed files bind to surfaces through owned package prefixes. Effective rigor = the STRICTEST class among all touched surfaces; a changed file owned by no surface is unclassified and forced to Class A; an unknown/off-vocabulary class fails closed to Class A; an optional declared class can only RAISE strictness and can never downgrade contact with an A/B surface. Class D means lighter SEMANTIC proof only — every class, including D, still owes the repository-integrity gates (ownership, determinism, licensing, generated-artifact, build). The classifier is pure (stdlib+yaml), reads no filesystem, and enforces nothing — it names obligations the existing guards/CI enforce.'

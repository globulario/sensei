      - golang/server/packaging_test.go:TestEnforceCurrentSeed_PassesWhenMarkerPresent
      - golang/server/packaging_test.go:TestPackaging_SeedIsNTripleFormat

  # Promoted from an intent-mine + briefing audit of AWG itself (2026-06-15);
  # implemented in PR #50. A domain-scoped briefing previously filtered only the
  # direct impact anchors, letting implementation patterns / intent triggers leak
  # across repos. Concrete instance of the domain-isolation contract in scope.go.
  - id: awareness.briefing.sections_honor_domain_scope
    title: Every briefing section (impact anchors, implementation patterns, intent triggers) must apply the same resolved domain scope — shared nodes always pass, but another repo's patterns/intents must never leak into a domain-scoped briefing
    severity: high
    status: active
    protects:
      files:
        - golang/server/briefing.go
        - golang/server/scope.go
        - golang/server/impact.go
        - golang/server/implementation_patterns.go
        - golang/server/intent_triggers.go
    required_tests:
      - golang/server/briefing_scope_test.go:TestInScopePatterns_NoForeignLeak
      - golang/server/briefing_scope_test.go:TestInScopeIntents_NoForeignLeak
      - golang/server/briefing_scope_test.go:TestBriefingScope_Precedence
  - id: backup_manager.scylla_registration_excludes_synthetic_markers
    title: backup_manager scylla auto-registration counts only prefix-free clusters as registered
    status: active
    description: detectScyllaClusters emits synthetic 'native:<name>' and 'scylla_host:<ip>' markers for a ScyllaDB that is REACHABLE but NOT registered in scylla-manager. The auto-registration path (ensureScyllaRegistered/attemptScyllaRegister) must count ONLY entries with no synthetic prefix as managed/registered — via isRegisteredScyllaCluster(). Counting a synthetic marker as registered makes the path skip 'sctool cluster add' and leave the cluster permanently unregistered (doctor scylla_manager.cluster_registered, cluster_count=0).
    protects:
      files:
        - golang/backup_manager/backup_manager_server/preflight.go
    evidence:
      - 'preflight.go: isRegisteredScyllaCluster() excludes native:/scylla_host:; PreflightCheck already did, ensureScyllaRegistered did not'
      - 'live day-0 install 2026-07-02: sctool cluster list empty, doctor cluster_count=0 while ScyllaDB REST reachable'
    contract: backup_manager must register an unregistered-but-reachable ScyllaDB via 'sctool cluster add'; synthetic detection markers are not a registration
  - id: invariant.control_plane_must_not_depend_on_the_data_plane_mesh_it_mana
    title: Control plane must not depend on the data-plane mesh it manages
    status: active
    description: >-
      The control plane must not route its own authority traffic through the
      data-plane mesh, public HTTPS gateway, service proxy, Envoy route, or
      load-balanced endpoint that it manages. Control-plane RPCs — including
      bootstrap, join, admission, convergence events, heartbeats, leader
      election, controller handoff, actor callbacks, doctor probes, and
      node-agent coordination — must use direct admitted node addressing over
      the dedicated control endpoint (direct node IP + control RPC port +
      cluster-CA mTLS). The data-plane mesh is a managed resource and may be
      absent, stale, degraded, partitioned, or intentionally restarted during
      the exact operations the control plane performs; routing control traffic
      through it creates a manager-to-managed dependency cycle and can hide the
      real failure behind routing, DNS, proxy, TLS, or load-balancer state.
      Allowed control transports - direct node IP plus control RPC port; a
      controller-known admitted endpoint; a signed join-plan endpoint; a
      node-agent/control service address from admitted state; an explicit
      bootstrap seed address before the mesh exists. A control operation is
      valid only when its transport path is independent of the data-plane
      resource being created, repaired, validated, or converged.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/server.go
        - golang/config/service_discovery.go
        - golang/globular_client/clients.go
        - golang/event/event_client/event_client.go
    forbidden_fixes:
      - use the public :443 gateway for control-plane mutation
      - use an Envoy/service-mesh route for a controller or node-agent authority RPC
      - use a DNS name whose resolution depends on the managed mesh being healthy
      - use a load-balanced endpoint when the operation targets one known controller or one known node
      - fall back from a direct control address to a mesh route without explicit degraded-mode evidence
    evidence:
      - '2026-07-03: controller event publishing via shared mesh-routed event client flapped the event circuit breaker (CLUSTER_CRITICAL) after envoy bounced during day-0 convergence; connection never cleanly recovered'
      - 'Precedent: config.ResolveControllerDirectAddr bypasses mesh for actor callbacks (Envoy :443 does not serve WorkflowActorService)'
      - 'Fix: config.ResolveServiceDirectAddr + event_client.NewEventService_Client_Direct + globular.GetClientConnectionDirect wire controller event publishing direct-to-node'
    contract: meta.control_plane_must_not_depend_on_managed_data_plane_mesh

  - id: invariant.control_plane_truth_from_owner_not_projection
    title: Control-plane truth must be read from the owner RPC, not projected service state
    status: active
    description: >-
      Control-plane decisions (admission, convergence, placement, repair) must
      read desired/admitted/runtime truth from the owning controller or
      node-agent RPC — not from cached service config, generated files, Envoy
      snapshots, DNS records, /etc/hosts entries, or process state. A projection
      can be stale while the owner is correct; projections are useful artifacts
      but must never become authority. Globular instance of
      meta.storage_is_not_semantic_authority.
    protects:
      files:
        - golang/config/service_discovery.go
        - golang/cluster_controller/cluster_controller_server/reconciler.go
        - golang/node_agent/node_agent_server/heartbeat.go
    forbidden_fixes:
      - 'infer admission from service config ("config says running, therefore node is admitted")'
      - 'infer topology validity from DNS ("DNS resolves, therefore cluster topology is valid")'
      - 'infer desired state from Envoy ("Envoy has the endpoint, therefore service desired state is correct")'
    evidence:
      - 'Domain instance of meta.storage_is_not_semantic_authority + meta.code.local_state_must_not_become_hidden_authority applied to control-plane reads'
    contract: meta.storage_is_not_semantic_authority

  - id: invariant.absence_of_desired_state_is_not_permission_to_destroy
    title: Absence of desired state is not permission to destroy
    status: active
    description: >-
      Unknown, empty, stale, or generation-zero desired state must NOT trigger
      destructive cleanup (stop service, uninstall package, wipe data, remove
      peer, delete DNS, kill process) unless the owner explicitly marks the
      resource as removed. "I do not see you in desired state" is not "you are
      forbidden" — during day-0, controller restart, etcd recovery, cache
      rebuild, or partition, desired state can be temporarily absent. Allowed
      responses: block new writes, enter pending/unknown, request fresh owner
      state, mark degraded. Globular instance of
      meta.fail_safe_defaults_when_authority_is_uncertain.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/reconciler.go
        - golang/node_agent/node_agent_server/apply_package_release.go
    forbidden_fixes:
      - 'stop/uninstall/wipe/remove-peer/delete-DNS/kill because desired state is empty or unavailable'
      - 'treat generation-zero or missing desired state as an explicit removal signal'
    evidence:
      - 'Domain instance of meta.fail_safe_defaults_when_authority_is_uncertain + meta.absence_scope_must_be_explicit'
    contract: meta.fail_safe_defaults_when_authority_is_uncertain

  - id: invariant.dns_and_hosts_are_reachability_not_identity
    title: DNS and hosts files are reachability hints, not identity authority
    status: active
    description: >-
      DNS, /etc/hosts, and public domain names must not define node identity or
      cluster membership. Name resolution is mutable, cached, delayed, and
      sometimes wrong; it may help reachability but identity must bind to node
      ID / MAC / cert / key / admission record, not to a resolvable name.
      Globular instance of meta.storage_is_not_semantic_authority and
      meta.identity_computation_must_be_invariant.
    protects:
      files:
        - golang/config/service_discovery.go
        - golang/node_agent/node_agent_server/heartbeat.go
    forbidden_fixes:
      - 'treat name resolution as admission ("hostname resolves, therefore this is the admitted node")'
      - 'treat domain suffix as cluster membership ("same domain suffix, therefore same cluster")'
      - 'treat DNS challenge success as controller identity ("DNS challenge passed, therefore controller identity is valid")'
    evidence:
      - 'Domain instance of meta.storage_is_not_semantic_authority + meta.identity_computation_must_be_invariant'
    contract: meta.identity_computation_must_be_invariant

  - id: invariant.health_probe_must_classify_not_collapse_to_boolean
    title: Health checks must distinguish unavailable, unhealthy, unauthorized, and unknown
    status: active
    description: >-
      A failed probe must not collapse into one boolean. "Not reachable" can mean
      DNS failure, TLS mismatch, service down, node rejected, partition, wrong
      address, proxy down, controller down, or expected day-0 absence — each
      implies a different action. Probes must classify into named states
      (UNKNOWN, UNREACHABLE, UNAUTHORIZED, NOT_ADMITTED, DEGRADED,
      STOPPED_BY_OWNER, FAILED), not a single pass/fail. Globular instance of
      meta.authority_must_express_uncertainty and meta.timeout_is_a_decision_not_a_truth.
    protects:
      files:
        - golang/cluster_doctor/cluster_doctor_server/rules/certificate_health.go
        - golang/node_agent/node_agent_server/heartbeat.go
    forbidden_fixes:
      - 'collapse a probe error to a destructive action (if err != nil { remove peer }) without classification'
      - 'treat context-deadline-exceeded as membership deletion'
      - 'treat a failed probe as uninstall/stop'
    evidence:
      - 'Domain instance of meta.authority_must_express_uncertainty + meta.timeout_is_a_decision_not_a_truth + meta.connection_errors_must_not_be_absorbed'
    contract: meta.authority_must_express_uncertainty

  - id: invariant.process_state_is_observation_not_desired_truth
    title: Process state is observation, not desired truth
    status: active
    description: >-
      A PID, systemd active-state, or local service-config state cannot prove
      desired state. Local supervision reads process state to act on it, but
      process state stays strictly below desired/admitted authority. Globular
      instance of meta.code.local_state_must_not_become_hidden_authority.
    protects:
      files:
        - golang/node_agent/node_agent_server/apply_package_release.go
        - golang/node_agent/node_agent_server/heartbeat.go
    forbidden_fixes:
      - 'treat a running process as install correctness ("process exists, so service is installed correctly")'
      - 'treat an absent process as a removal decision ("process absent, so desired says removed")'
      - 'treat systemd active as topology health ("systemd active, so topology is healthy")'
    evidence:
      - 'Domain instance of meta.code.local_state_must_not_become_hidden_authority'
    contract: meta.code.local_state_must_not_become_hidden_authority

  - id: invariant.join_must_be_a_transaction_not_side_effects
    title: Join must be a transaction, not a collection of side effects
    status: active
    description: >-
      Node join/admission must have one durable transaction identity spanning
      certificate/key exchange, desired-state mutation, package install, peer
      record, topology-generation bump, and agent confirmation — so a partial
      join never leaves half-committed state that looks complete. Globular
      instance of meta.state_mutations_must_be_durably_committed_before_side_effects
      and meta.half_done_must_not_look_done.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/reconciler.go
        - golang/node_agent/node_agent_server/apply_package_release.go
    forbidden_fixes:
      - 'leave a peer key saved but the node not admitted'
      - 'admit a peer without bumping topology generation'
      - 'report a service installed while the join transaction failed'
      - 'update DNS for a node that was rejected'
    evidence:
      - 'Domain instance of meta.state_mutations_must_be_durably_committed_before_side_effects + meta.half_done_must_not_look_done'
    contract: meta.state_mutations_must_be_durably_committed_before_side_effects
  - id: package.identity_has_single_repository_authority

  # Promoted from a cold-source audit of AWG itself (2026-06-15): coldsource mined
  # this from the repo's own history (a PR review on awareness.nt + the regen
  # commits). Sibling of awareness.rdf.yaml_is_source_of_truth, made operational on
  # the seed file. The wording was corrected DURING promotion: a full regenerate
  # reorders the whole seed into a 29k-line unreviewable diff, so the canonical
  # practice (and why the freshness check is ownership-aware) is a minimal
  # owned-triple append, validated by --check — not a full regenerate.
  - id: awareness.seed_is_generated_author_in_yaml
    title: The embedded seed (golang/server/embeddata/awareness.nt) is GENERATED — author rule content only in the source YAML, never by hand-editing the seed. Bring the seed current by appending the new entry's OWNED triples and validating with scripts/build-awareness-graph.sh --check (ownership-aware); do NOT commit a full regenerate, which reorders the whole file into an unreviewable diff
    severity: critical
    status: active
    protects:
      files:
        - golang/server/embeddata/awareness.nt
        - scripts/build-awareness-graph.sh
        - cmd/yaml2nt/main.go
        - docs/awareness/invariants.yaml
    required_tests:
      - golang/server/packaging_test.go:TestEnforceCurrentSeed_FailsClosedWhenMarkerMissing
      - golang/server/packaging_test.go:TestEnforceCurrentSeed_PassesWhenMarkerPresent
      - golang/server/packaging_test.go:TestPackaging_SeedIsNTripleFormat

  # Promoted from an intent-mine + briefing audit of AWG itself (2026-06-15);
  # implemented in PR #50. A domain-scoped briefing previously filtered only the
  # direct impact anchors, letting implementation patterns / intent triggers leak
  # across repos. Concrete instance of the domain-isolation contract in scope.go.
  - id: awareness.briefing.sections_honor_domain_scope
    title: Every briefing section (impact anchors, implementation patterns, intent triggers) must apply the same resolved domain scope — shared nodes always pass, but another repo's patterns/intents must never leak into a domain-scoped briefing
    severity: high
    status: active
    protects:
      files:
        - golang/server/briefing.go
        - golang/server/scope.go
        - golang/server/impact.go
        - golang/server/implementation_patterns.go
        - golang/server/intent_triggers.go
    required_tests:
      - golang/server/briefing_scope_test.go:TestInScopePatterns_NoForeignLeak
      - golang/server/briefing_scope_test.go:TestInScopeIntents_NoForeignLeak
      - golang/server/briefing_scope_test.go:TestBriefingScope_Precedence

  - id: prereview.report_is_projection_not_authority
    title: The architectural pre-review report is a projection, never a source of authority — it may display verdicts sourced from receipts but must never create or upgrade admission, certification, or completion
    severity: high
    status: active
    protects:
      files:
        - golang/architecture/prereview/
        - cmd/awg/cmd_pre_review.go
        - cmd/awg/prereview_git.go
        - cmd/awg/prereview_graph.go
    forbidden_fixes:
      - establish_a_verdict_from_within_the_pre_review_report
    required_tests:
      - golang/architecture/prereview/disposition_test.go:TestDispositionCannotClaimCertifiedWithoutReceipt
      - golang/architecture/prereview/adversarial_test.go:TestCallerBooleanCannotForgeVerdict
      - golang/architecture/prereview/advisory_cannot_certify_test.go:TestGenerateAdvisoryCannotClaimCertification

  - id: prereview.missing_context_stays_unavailable
    title: Missing architectural context must remain visibly unavailable, degraded, or cannot_verify — never silently converted into a clean or certified advisory result
    severity: high
    status: active
    protects:
      files:
        - golang/architecture/prereview/assemble.go
        - golang/architecture/prereview/validate.go
        - cmd/awg/prereview_graph.go
    required_tests:
      - golang/architecture/prereview/advisory_cannot_certify_test.go:TestGenerateAdvisoryMissingContextStaysUnavailable

  - id: prereview.diff_identity_uses_canonical_binding
    title: The pre-review diff identity uses the canonical SHA-256 repository tree digest (SHA-256 over deterministic Git tree material), never a native Git tree object id in a *_sha256 field
    severity: high
    status: active
    protects:
      files:
        - cmd/awg/prereview_git.go
        - golang/architecture/prereview/identity.go
    required_tests:
      - cmd/awg/prereview_tree_identity_test.go:TestGitDiffCanonicalTreeIdentity

  - id: prereview.sarif_only_file_anchored_findings
    title: Pre-review SARIF contains only genuinely file-anchored findings — a reviewer-attention item with no related files produces no SARIF result
    severity: medium
    status: active
    protects:
      files:
        - cmd/awg/cmd_pre_review.go
    required_tests:
      - cmd/awg/prereview_governance_laws_test.go:TestPreReviewSARIFOnlyFileAnchoredFindings

  - id: prereview.local_graph_must_not_impersonate_server_surfaces
    title: The local graph approximation must report gRPC-only surfaces (briefing, impact-graph traversal) as unavailable and must never fabricate them from local YAML
    severity: high
    status: active
    protects:
      files:
        - cmd/awg/prereview_graph.go
    required_tests:
      - cmd/awg/prereview_governance_laws_test.go:TestLocalGraphSourceReportsServerSurfacesUnavailable

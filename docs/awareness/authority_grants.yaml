    maximum_risk_class: architecture_sensitive
    valid_from: 2026-07-15T00:00:00Z
    valid_until: ""
    delegable: false
    delegation_policy_id: ""

  # ── Phase 8.1b: dedicated governed-promotion grant (NOT question disposition) ──

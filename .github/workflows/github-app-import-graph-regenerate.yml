name: GitHub App Import Graph Regeneration

on:
  push:
    branches:
      - feat/github-app-mvp
    paths:
      - "github-app/**"
      - ".github/workflows/github-app-import-graph-regenerate.yml"

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/github-app-mvp
          fetch-depth: 2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: Regenerate inferred import graphs
        run: make import-graph
      - name: Commit generated projections
        run: |
          if git diff --quiet -- docs/awareness/generated; then
            echo "Import graphs already fresh"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/awareness/generated/awareness_graph_go_import_graph.yaml
          git add docs/awareness/generated/awareness_graph_typescript_import_graph.yaml
          git add docs/awareness/generated/awareness_graph_python_import_graph.yaml
          git commit -m "chore(awareness): regenerate import graphs for GitHub App"
          git push origin HEAD:feat/github-app-mvp

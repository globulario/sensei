name: Phase 10 question owner discovery

on:
  pull_request:
    branches:
      - phase10-architectural-investigation

jobs:
  discover:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Locate canonical dialogue owners
        shell: bash
        run: |
          set -euo pipefail
          echo '=== OpenQuestion definitions and uses ==='
          rg -n --glob '*.go' 'OpenQuestion|ArchitectAnswer|QuestionSource|question source|QuestionTemplate|awareness_propose|Propose' . || true
          echo '=== dialogue-related files ==='
          find . -type f \( -iname '*dialog*' -o -iname '*question*' -o -iname '*answer*' -o -iname '*propos*' \) | sort

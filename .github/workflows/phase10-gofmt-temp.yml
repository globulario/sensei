name: Phase 10 temporary gofmt

on:
  push:
    branches:
      - agent/phase10-4b-deterministic-composer

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout formatting branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase10-4b-deterministic-composer
          fetch-depth: 0

      - name: Setup repository Go version
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format investigator and remove temporary workflow
        run: |
          gofmt -w golang/architecture/investigator
          rm .github/workflows/phase10-gofmt-temp.yml

      - name: Commit exact formatter output
        run: |
          git config user.name "sensei-phase10-formatter"
          git config user.email "actions@users.noreply.github.com"
          git add golang/architecture/investigator .github/workflows/phase10-gofmt-temp.yml
          git diff --cached --quiet && exit 0
          git commit -m "gofmt phase 10.4b composer"
          git push origin HEAD:agent/phase10-4b-deterministic-composer

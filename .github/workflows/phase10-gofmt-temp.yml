name: Phase 10 exact gofmt

on:
  push:
    branches:
      - agent/phase10-4b-deterministic-composer

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout formatting branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase10-4b-deterministic-composer
          fetch-depth: 0

      - name: Setup repository Go version
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format every investigator Go file
        shell: bash
        run: |
          mapfile -d '' files < <(find golang/architecture/investigator -type f -name '*.go' -print0 | sort -z)
          gofmt -w "${files[@]}"
          rm .github/workflows/phase10-gofmt-temp.yml

      - name: Commit and publish exact formatter output
        shell: bash
        run: |
          git config user.name "sensei-phase10-formatter"
          git config user.email "actions@users.noreply.github.com"
          git add golang/architecture/investigator .github/workflows/phase10-gofmt-temp.yml
          git commit -m "gofmt phase 10.4b composer"
          git push origin HEAD:agent/phase10-4b-deterministic-composer
          git push origin HEAD:phase10-architectural-investigation

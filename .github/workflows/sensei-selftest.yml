# Dogfood: run the published Sensei Marketplace action against this repo's own
# awareness graph. Advisory (never blocks). Also proves the action works.
name: Sensei self-test (dogfood the action)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  review:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]   # windows proves the .exe bundle runs (serve+gate)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: globulario/sensei-action@v1
        with:
          mode: advisory

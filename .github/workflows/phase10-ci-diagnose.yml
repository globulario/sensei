name: Phase 10 CI diagnose

on:
  push:
    branches:
      - codex/phase10-ci-diagnose
  pull_request:
    branches:
      - phase10-architectural-investigation

jobs:
  investigator:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Capture investigator test output
        id: test
        shell: bash
        run: |
          set +e
          go test ./golang/architecture/investigator -count=1 -timeout 3m -v > investigator-test.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload investigator test output
        uses: actions/upload-artifact@v4
        with:
          name: investigator-test-output
          path: investigator-test.log
      - name: Preserve failing status
        if: steps.test.outputs.status != '0'
        run: exit 1

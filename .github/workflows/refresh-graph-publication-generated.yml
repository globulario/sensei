name: Refresh graph publication generated artifacts

on:
  push:
    branches:
      - agent/transactional-graph-publication
    paths:
      - '.github/workflows/refresh-graph-publication-generated.yml'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: agent/transactional-graph-publication
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Regenerate import graphs and embedded graph
        run: |
          set -euo pipefail
          make import-graph
          scripts/build-awareness-graph-self.sh

      - name: Verify generated state
        run: |
          set -euo pipefail
          make import-graph-check
          scripts/build-awareness-graph-self.sh --check
          git diff --check

      - name: Commit generated artifacts
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Generated artifacts already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/awareness/generated golang/server/embeddata
          git commit -m 'chore(graph): refresh publication-derived artifacts'
          git push origin HEAD:agent/transactional-graph-publication

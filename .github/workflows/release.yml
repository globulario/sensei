name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.5) — without the v prefix'
        required: true

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the version/tag once, so the build matrix and the release job agree.
  # ---------------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          INPUT_VERSION="${{ inputs.version }}"
          REF_NAME="${GITHUB_REF_NAME}"

          if [[ "${EVENT}" == "workflow_dispatch" ]]; then
            if [[ -z "${INPUT_VERSION}" ]]; then
              echo "error: manual release requires inputs.version (e.g. 0.0.5), got empty on ref '${REF_NAME}'" >&2
              exit 1
            fi
            VERSION="${INPUT_VERSION}"
            TAG="v${VERSION}"
          else
            VERSION="${REF_NAME#v}"
            TAG="${REF_NAME}"
          fi

          if [[ ! "${VERSION}" =~ ^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z._-]+)?$ ]]; then
            echo "error: version '${VERSION}' is invalid; expected numeric SemVer (e.g. 0.0.5)" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, Tag: ${TAG}"

  # ---------------------------------------------------------------------------
  # Build the three standalone binaries on a NATIVE runner per target. The
  # parsers (tree-sitter) are cgo bindings, so CGO must be on and we cannot
  # cross-compile from one host — each OS/arch builds on its own runner.
  # ---------------------------------------------------------------------------
  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    goos: linux,  goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux,  goarch: arm64 }
          - { runner: macos-13,         goos: darwin, goarch: amd64 }
          - { runner: macos-14,         goos: darwin, goarch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Build standalone binaries (${{ matrix.goos }}-${{ matrix.goarch }})
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          SUFFIX="${GOOS}-${GOARCH}"
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          OUT="$RUNNER_TEMP/dist"; mkdir -p "$OUT"

          # Native build: GOOS/GOARCH match the host, CGO stays on for tree-sitter.
          CGO_ENABLED=1 go build -trimpath -ldflags "${LDFLAGS}" -o "$OUT/sensei-${SUFFIX}"           ./cmd/awg
          CGO_ENABLED=1 go build -trimpath -ldflags "${LDFLAGS}" -o "$OUT/awareness-graph-${SUFFIX}"  ./golang/server
          CGO_ENABLED=1 go build -trimpath -ldflags "${LDFLAGS}" -o "$OUT/awareness-mcp-${SUFFIX}"    ./cmd/awareness-mcp

          # Portable checksums (macOS ships shasum, not sha256sum).
          sha() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }
          ( cd "$OUT" && for f in *-"${SUFFIX}"; do sha "$f" > "$f.sha256"; done )

          echo "Built for ${SUFFIX}:"
          ls -lh "$OUT" | sed 's/^/  /'

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Assemble the release: freshness gate, tests, the Linux tarball bundles, and
  # a single GitHub Release carrying every platform's binaries.
  # ---------------------------------------------------------------------------
  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout awareness-graph
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Check generated files and seed are fresh (self-only build)
        run: |
          scripts/build-awareness-graph-self.sh --check

      - name: Run tests
        run: go test ./... -count=1 -timeout 120s

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: /tmp/dist
          pattern: binaries-*
          merge-multiple: true

      - name: List downloaded binaries
        run: ls -lh /tmp/dist | sed 's/^/  /'

      - name: Assemble Linux tarball bundles
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          # The supervised tarball bundles remain Linux amd64 only; the raw
          # per-platform binaries above cover macOS and arm64.
          mkdir -p bin
          cp /tmp/dist/sensei-linux-amd64          bin/sensei
          cp /tmp/dist/sensei-linux-amd64          bin/awg            # deprecated alias
          cp /tmp/dist/awareness-graph-linux-amd64 bin/awareness-graph
          cp /tmp/dist/awareness-mcp-linux-amd64   bin/awareness-mcp
          chmod +x bin/sensei bin/awg bin/awareness-graph bin/awareness-mcp

          SERVICE_ROOT=/tmp/awareness-graph-service-root
          LOCAL_ROOT=/tmp/awareness-graph-local-root
          rm -rf "${SERVICE_ROOT}" "${LOCAL_ROOT}"
          mkdir -p "${SERVICE_ROOT}/bin" "${SERVICE_ROOT}/specs" "${SERVICE_ROOT}/metadata/awareness-graph" "${SERVICE_ROOT}/seed"
          mkdir -p "${LOCAL_ROOT}/bin" "${LOCAL_ROOT}/scripts"

          cp bin/awareness-graph        "${SERVICE_ROOT}/bin/awareness-graph"
          cp golang/server/embeddata/awareness.nt "${SERVICE_ROOT}/seed/awareness.nt"
          cp packaging/specs/awareness_graph_service.yaml \
                                        "${SERVICE_ROOT}/specs/awareness_graph_service.yaml"

          cp bin/awg                    "${LOCAL_ROOT}/bin/awg"
          cp bin/awareness-mcp          "${LOCAL_ROOT}/bin/awareness-mcp"
          cp bin/awareness-graph        "${LOCAL_ROOT}/bin/awareness-graph"
          cp scripts/fetch-oxigraph.sh  "${LOCAL_ROOT}/scripts/fetch-oxigraph.sh"
          cp scripts/install-awg-user-services.sh \
                                        "${LOCAL_ROOT}/scripts/install-awg-user-services.sh"
          cp INSTALL.md                 "${LOCAL_ROOT}/INSTALL.md"
          cp QUICKSTART.md              "${LOCAL_ROOT}/QUICKSTART.md"

          # Write package.json and spec with the release version injected.
          python3 -c "
          import json, sys
          with open('packaging/metadata/awareness-graph/package.json') as f:
              pkg = json.load(f)
          pkg['version'] = sys.argv[1]
          with open('${SERVICE_ROOT}/metadata/awareness-graph/package.json', 'w') as f:
              json.dump(pkg, f, indent=2)
              f.write('\n')
          " "${VERSION}"

          # Inject version into the spec so both metadata sources agree.
          python3 -c "
          import re, sys
          with open('packaging/specs/awareness_graph_service.yaml') as f:
              spec = f.read()
          spec = re.sub(r'(  version: \")[^\"]*\"', r'\g<1>' + sys.argv[1] + '\"', spec, count=1)
          with open('${SERVICE_ROOT}/specs/awareness_graph_service.yaml', 'w') as f:
              f.write(spec)
          " "${VERSION}"

          # Compute entrypoint checksum (matches Globular installer convention).
          sha256sum "${SERVICE_ROOT}/bin/awareness-graph" \
            | awk '{print $1}' \
            > "${SERVICE_ROOT}/metadata/awareness-graph/entrypoint.sha256"

          cat > "${LOCAL_ROOT}/README.txt" <<EOF
          awareness-graph local runtime bundle v${VERSION}

          Included binaries:
            bin/awg
            bin/awareness-mcp
            bin/awareness-graph

          Quick start:
            1. place these binaries on your PATH
            2. fetch Oxigraph with:
                 bash scripts/fetch-oxigraph.sh
            3. install supervised local services with:
                 bash scripts/install-awg-user-services.sh --skip-build

          This bundle is Linux amd64 only. For macOS and arm64, use the raw
          sensei-<os>-<arch> / awareness-graph-<os>-<arch> binaries on the
          release page.
          EOF

          SERVICE_TARBALL="awareness-graph_${VERSION}_linux_amd64.tgz"
          LOCAL_TARBALL="awg-local_${VERSION}_linux_amd64.tgz"
          tar czf "/tmp/${SERVICE_TARBALL}" -C "${SERVICE_ROOT}" .
          tar czf "/tmp/${LOCAL_TARBALL}" -C "${LOCAL_ROOT}" .
          echo "SERVICE_TARBALL_NAME=${SERVICE_TARBALL}" >> "$GITHUB_ENV"
          echo "LOCAL_TARBALL_NAME=${LOCAL_TARBALL}" >> "$GITHUB_ENV"
          echo "Staged: /tmp/${SERVICE_TARBALL} ($(du -sh /tmp/${SERVICE_TARBALL} | cut -f1))"
          echo "Staged: /tmp/${LOCAL_TARBALL} ($(du -sh /tmp/${LOCAL_TARBALL} | cut -f1))"

      - name: Enforce public/runtime release boundary
        run: |
          set -euo pipefail
          scripts/check-release-boundary.sh \
            /tmp/awareness-graph-service-root \
            /tmp/awareness-graph-local-root

      - name: Create SHA256 checksums for tarballs
        run: |
          set -euo pipefail
          cd /tmp
          sha256sum "${SERVICE_TARBALL_NAME}" > "${SERVICE_TARBALL_NAME}.sha256"
          sha256sum "${LOCAL_TARBALL_NAME}" > "${LOCAL_TARBALL_NAME}.sha256"
          echo "Checksum: $(cat ${SERVICE_TARBALL_NAME}.sha256)"
          echo "Checksum: $(cat ${LOCAL_TARBALL_NAME}.sha256)"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail
          # Use this version's CHANGELOG.md section as the release body; fall back
          # to a terse note if the section is absent.
          NOTES_FILE=/tmp/release-notes.md
          awk -v tag="## ${TAG}" '
            $0 ~ "^"tag" " || $0 == tag {f=1; print; next}
            f && /^## v/ {exit}
            f {print}
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release ${TAG} — built from commit ${GITHUB_SHA:0:8}" > "$NOTES_FILE"
          fi
          gh release create "${TAG}" \
            --title "sensei ${TAG}" \
            --notes-file "$NOTES_FILE" \
            "/tmp/${SERVICE_TARBALL_NAME}" \
            "/tmp/${SERVICE_TARBALL_NAME}.sha256" \
            "/tmp/${LOCAL_TARBALL_NAME}" \
            "/tmp/${LOCAL_TARBALL_NAME}.sha256" \
            /tmp/dist/sensei-linux-amd64          /tmp/dist/sensei-linux-amd64.sha256 \
            /tmp/dist/sensei-linux-arm64          /tmp/dist/sensei-linux-arm64.sha256 \
            /tmp/dist/sensei-darwin-amd64         /tmp/dist/sensei-darwin-amd64.sha256 \
            /tmp/dist/sensei-darwin-arm64         /tmp/dist/sensei-darwin-arm64.sha256 \
            /tmp/dist/awareness-graph-linux-amd64  /tmp/dist/awareness-graph-linux-amd64.sha256 \
            /tmp/dist/awareness-graph-linux-arm64  /tmp/dist/awareness-graph-linux-arm64.sha256 \
            /tmp/dist/awareness-graph-darwin-amd64 /tmp/dist/awareness-graph-darwin-amd64.sha256 \
            /tmp/dist/awareness-graph-darwin-arm64 /tmp/dist/awareness-graph-darwin-arm64.sha256 \
            /tmp/dist/awareness-mcp-linux-amd64    /tmp/dist/awareness-mcp-linux-amd64.sha256 \
            /tmp/dist/awareness-mcp-linux-arm64    /tmp/dist/awareness-mcp-linux-arm64.sha256 \
            /tmp/dist/awareness-mcp-darwin-amd64   /tmp/dist/awareness-mcp-darwin-amd64.sha256 \
            /tmp/dist/awareness-mcp-darwin-arm64   /tmp/dist/awareness-mcp-darwin-arm64.sha256
          echo "Release ${TAG} created."

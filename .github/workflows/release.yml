name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.5) — without the v prefix'
        required: true

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the version/tag once, so the build matrix and the release job agree.
  # ---------------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          INPUT_VERSION="${{ inputs.version }}"
          REF_NAME="${GITHUB_REF_NAME}"

          if [[ "${EVENT}" == "workflow_dispatch" ]]; then
            if [[ -z "${INPUT_VERSION}" ]]; then
              echo "error: manual release requires inputs.version (e.g. 0.0.5), got empty on ref '${REF_NAME}'" >&2
              exit 1
            fi
            VERSION="${INPUT_VERSION}"
            TAG="v${VERSION}"
          else
            VERSION="${REF_NAME#v}"
            TAG="${REF_NAME}"
          fi

          if [[ ! "${VERSION}" =~ ^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z._-]+)?$ ]]; then
            echo "error: version '${VERSION}' is invalid; expected numeric SemVer (e.g. 0.0.5)" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, Tag: ${TAG}"

  # ---------------------------------------------------------------------------
  # Build the standalone binaries on a NATIVE runner per target. The parsers
  # (tree-sitter) are cgo bindings, so CGO must be on and we cannot
  # cross-compile from one host — each OS/arch builds on its own runner.
  #
  # macOS is Apple Silicon (arm64) only: the Intel (macos-13) runner pool has
  # long/unreliable queue times, and current Mac dev machines are overwhelmingly
  # arm64. Intel-mac users fall back to the source build in the GitHub Action.
  # ---------------------------------------------------------------------------
  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    goos: linux,   goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux,   goarch: arm64 }
          - { runner: macos-14,         goos: darwin,  goarch: arm64 }
          - { runner: windows-latest,   goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Build binaries + assemble self-contained tarball (${{ matrix.goos }}-${{ matrix.goarch }})
        shell: bash   # runs under Git Bash on the windows-latest runner
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          OXV: '0.5.9'   # pinned; direct download avoids the rate-limited "latest" API
        run: |
          set -euo pipefail
          SUFFIX="${GOOS}-${GOARCH}"
          EXE=""; [ "${GOOS}" = windows ] && EXE=".exe"   # Windows binaries carry .exe
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          OUT="$RUNNER_TEMP/dist"; mkdir -p "$OUT"

          # Assemble the bundle layout directly: one bin/ dir with every binary
          # sensei needs. sensei locates awareness-graph and oxigraph next to its
          # own executable, so this layout runs with no further setup.
          PKG="sensei-${SUFFIX}"
          STAGE="$RUNNER_TEMP/${PKG}"; rm -rf "$STAGE"; mkdir -p "$STAGE/bin"

          # Native build: GOOS/GOARCH match the host, CGO stays on for tree-sitter.
          CGO_ENABLED=1 go build -trimpath -ldflags "${LDFLAGS}" -o "$STAGE/bin/sensei${EXE}"          ./cmd/awg
          CGO_ENABLED=1 go build -trimpath -ldflags "${LDFLAGS}" -o "$STAGE/bin/awareness-graph${EXE}" ./golang/server
          CGO_ENABLED=1 go build -trimpath -ldflags "${LDFLAGS}" -o "$STAGE/bin/awareness-mcp${EXE}"   ./cmd/awareness-mcp
          cp "$STAGE/bin/sensei${EXE}" "$STAGE/bin/awg${EXE}"   # deprecated alias, still shipped

          # Oxigraph is one of the binaries `sensei serve` runs — ship it in the
          # bundle so the download is self-contained (no upstream fetch needed).
          case "${SUFFIX}" in
            linux-amd64)   OXA="x86_64_linux_gnu";;
            linux-arm64)   OXA="aarch64_linux_gnu";;
            darwin-arm64)  OXA="aarch64_apple";;
            windows-amd64) OXA="x86_64_windows_msvc.exe";;
            *) echo "::error::no Oxigraph asset mapping for ${SUFFIX}"; exit 1;;
          esac
          curl -fsSL -o "$STAGE/bin/oxigraph${EXE}" \
            "https://github.com/oxigraph/oxigraph/releases/download/v${OXV}/oxigraph_v${OXV}_${OXA}"
          chmod +x "$STAGE/bin/"*

          cp packaging/setup.sh "$STAGE/setup.sh"; chmod +x "$STAGE/setup.sh"

          # One tarball per platform: sensei-<os>-<arch>.tar.gz → { bin/, setup.sh }.
          TARBALL="${PKG}.tar.gz"
          tar czf "$OUT/${TARBALL}" -C "$RUNNER_TEMP" "${PKG}"
          sha() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }
          ( cd "$OUT" && sha "${TARBALL}" > "${TARBALL}.sha256" )

          echo "Assembled ${TARBALL} (incl. Oxigraph v${OXV}):"
          tar tzf "$OUT/${TARBALL}" | sed 's/^/  /'

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Assemble the release: freshness gate, tests, the Linux tarball bundles, and
  # a single GitHub Release carrying every platform's binaries.
  # ---------------------------------------------------------------------------
  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout awareness-graph
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Check generated files and seed are fresh (self-only build)
        run: |
          scripts/build-awareness-graph-self.sh --check

      - name: Run tests
        run: go test ./... -count=1 -timeout 120s

      - name: Download all platform tarballs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/dist
          pattern: binaries-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh /tmp/dist | sed 's/^/  /'

      - name: Assemble Linux service bundle (Globular installer)
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          # The end-user download is the per-platform sensei-<os>-<arch>.tar.gz
          # (bin/ + setup.sh) built in the matrix. This step additionally produces
          # the machine-readable Globular service bundle (specs + metadata +
          # entrypoint checksum) that the Globular installer consumes — sourcing
          # its server binary from the already-built linux-amd64 tarball.
          EX=/tmp/linux-amd64; rm -rf "$EX"; mkdir -p "$EX"
          tar xzf /tmp/dist/sensei-linux-amd64.tar.gz -C "$EX"
          SRC_BIN="$EX/sensei-linux-amd64/bin"

          SERVICE_ROOT=/tmp/awareness-graph-service-root
          rm -rf "${SERVICE_ROOT}"
          mkdir -p "${SERVICE_ROOT}/bin" "${SERVICE_ROOT}/specs" "${SERVICE_ROOT}/metadata/awareness-graph" "${SERVICE_ROOT}/seed"

          cp "${SRC_BIN}/awareness-graph" "${SERVICE_ROOT}/bin/awareness-graph"
          cp golang/server/embeddata/awareness.nt "${SERVICE_ROOT}/seed/awareness.nt"
          cp packaging/specs/awareness_graph_service.yaml \
                                        "${SERVICE_ROOT}/specs/awareness_graph_service.yaml"

          # Write package.json and spec with the release version injected.
          python3 -c "
          import json, sys
          with open('packaging/metadata/awareness-graph/package.json') as f:
              pkg = json.load(f)
          pkg['version'] = sys.argv[1]
          with open('${SERVICE_ROOT}/metadata/awareness-graph/package.json', 'w') as f:
              json.dump(pkg, f, indent=2)
              f.write('\n')
          " "${VERSION}"

          # Inject version into the spec so both metadata sources agree.
          python3 -c "
          import re, sys
          with open('packaging/specs/awareness_graph_service.yaml') as f:
              spec = f.read()
          spec = re.sub(r'(  version: \")[^\"]*\"', r'\g<1>' + sys.argv[1] + '\"', spec, count=1)
          with open('${SERVICE_ROOT}/specs/awareness_graph_service.yaml', 'w') as f:
              f.write(spec)
          " "${VERSION}"

          # Compute entrypoint checksum (matches Globular installer convention).
          sha256sum "${SERVICE_ROOT}/bin/awareness-graph" \
            | awk '{print $1}' \
            > "${SERVICE_ROOT}/metadata/awareness-graph/entrypoint.sha256"

          SERVICE_TARBALL="awareness-graph_${VERSION}_linux_amd64.tgz"
          tar czf "/tmp/${SERVICE_TARBALL}" -C "${SERVICE_ROOT}" .
          echo "SERVICE_TARBALL_NAME=${SERVICE_TARBALL}" >> "$GITHUB_ENV"
          echo "Staged: /tmp/${SERVICE_TARBALL} ($(du -sh /tmp/${SERVICE_TARBALL} | cut -f1))"

      - name: Enforce public/runtime release boundary
        run: |
          set -euo pipefail
          scripts/check-release-boundary.sh \
            /tmp/awareness-graph-service-root

      - name: Create SHA256 checksum for the service bundle
        run: |
          set -euo pipefail
          cd /tmp
          sha256sum "${SERVICE_TARBALL_NAME}" > "${SERVICE_TARBALL_NAME}.sha256"
          echo "Checksum: $(cat ${SERVICE_TARBALL_NAME}.sha256)"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail
          # Use this version's CHANGELOG.md section as the release body; fall back
          # to a terse note if the section is absent.
          NOTES_FILE=/tmp/release-notes.md
          awk -v tag="## ${TAG}" '
            $0 ~ "^"tag" " || $0 == tag {f=1; print; next}
            f && /^## v/ {exit}
            f {print}
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release ${TAG} — built from commit ${GITHUB_SHA:0:8}" > "$NOTES_FILE"
          fi
          gh release create "${TAG}" \
            --title "sensei ${TAG}" \
            --notes-file "$NOTES_FILE" \
            /tmp/dist/sensei-linux-amd64.tar.gz    /tmp/dist/sensei-linux-amd64.tar.gz.sha256 \
            /tmp/dist/sensei-linux-arm64.tar.gz    /tmp/dist/sensei-linux-arm64.tar.gz.sha256 \
            /tmp/dist/sensei-darwin-arm64.tar.gz   /tmp/dist/sensei-darwin-arm64.tar.gz.sha256 \
            /tmp/dist/sensei-windows-amd64.tar.gz  /tmp/dist/sensei-windows-amd64.tar.gz.sha256 \
            "/tmp/${SERVICE_TARBALL_NAME}" \
            "/tmp/${SERVICE_TARBALL_NAME}.sha256"
          echo "Release ${TAG} created."

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout awareness-graph
        uses: actions/checkout@v4
        with:
          # depth 2 so the commit-scope guard can diff HEAD against its parent
          fetch-depth: 2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: gofmt is clean
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -vE '\.pb\.go$|/pb/|/testdata/'))
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Corpus is valid and the embedded seed is fresh (self-only build)
        # Standalone build: no services repo. yaml2nt runs -strict / -validate-refs
        # / -validate-promotion / -validate-contradictions, so a broken corpus
        # fails here; --check also fails if the committed seed drifted.
        run: scripts/build-awareness-graph-self.sh --check

      - name: Inferred proto contracts are fresh (architectural spine Stage B)
        # contract.* nodes inferred from proto/awareness_graph.proto are generated
        # by cmd/proto-scan and committed. Fails if the committed YAML drifts.
        run: make proto-contracts-check

      - name: Inferred import graphs are fresh (component dependsOn edges)
        # component.* dependsOn edges inferred from Go + TypeScript/JS imports are
        # generated by cmd/import-scan and committed. Fails if the YAML drifts.
        run: make import-graph-check

      - name: Commit scope matches its message (no engine drift in docs-only commits)
        # If HEAD's message claims docs-only scope but the diff touches
        # golang/ cmd/ internal/, that is engine drift. Add [engine-ack] to
        # acknowledge an intentional engine change in an otherwise-docs commit.
        run: scripts/check-commit-scope.sh HEAD

      - name: Onboarding docs claim the real principle count (self-updating)
        # The shipping pack is the source of truth. Any doc stating a TOTAL
        # principle count must state the pack's count. (The former README
        # category-table check was retired when the principle catalog moved to
        # docs/meta-principles.md in the Sensei doc reframing.)
        run: |
          DOCS="README.md QUICKSTART.md INSTALL.md docs/quickstart.md docs/meta-principles.md docs/case-study-cold-start.md docs/blog/awg-introduction.md examples/payment-cold-start/README.md"
          PACK=$(grep -cE '^  - id: meta\.' cmd/awg/templates/awareness/meta_principles.yaml)
          echo "authoritative pack count: ${PACK}"
          PAT='[0-9]+ universal principles|[0-9]+ portable principles|[0-9]+ battle-validated meta-principles|[0-9]+ meta-principles organized|[0-9]+ principles across|grown to [0-9]+ across|all [0-9]+ principles|all [0-9]+ is the generated|categories, [0-9]+ principles|the [0-9]+ meta-principles in'
          bad=$(grep -rhoE "$PAT" $DOCS 2>/dev/null | grep -oE '[0-9]+' | sort -u | grep -vx "${PACK}" || true)
          if [ -n "$bad" ]; then
            echo "::error::docs state principle-count(s) [$bad] but the pack has ${PACK}. Update the headline + category tables."
            grep -rnoE "$PAT" $DOCS 2>/dev/null || true
            exit 1
          fi
          echo "onboarding docs: total principle count matches the pack (${PACK})"

      - name: Run cmd/awg tests
        run: go test ./cmd/awg -count=1 -timeout 5m

      - name: Run remaining tests
        shell: bash
        run: |
          packages=$(go list ./... | grep -v '^github.com/globulario/sensei/cmd/awg$')
          go test $packages -count=1 -timeout 3m -p 2

      - name: "Cold-start smoke (stranger path: init -> serve -no-seed -> build -> briefing)"
        # Fetches the upstream Oxigraph binary, scaffolds a throwaway project in
        # /tmp, and proves the standalone path end to end.
        run: |
          scripts/fetch-oxigraph.sh
          scripts/smoke-cold-start.sh

      - name: "Example smoke: money-scar cold-start proof (examples/orders-money-scar)"
        run: examples/orders-money-scar/run.sh

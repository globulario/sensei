name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout awareness-graph
        uses: actions/checkout@v4
        with:
          # depth 2 so the commit-scope guard can diff HEAD against its parent
          fetch-depth: 2

      - name: Checkout services (awareness YAML + intent sources)
        uses: actions/checkout@v4
        with:
          repository: globulario/services
          path: services

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Check corpus is valid; seed staleness is advisory (GC-2)
        # --warn-stale keeps corpus-CORRECTNESS a hard gate (yaml2nt -strict /
        # -validate-refs / -validate-promotion / -validate-contradictions and the
        # --strict scanner exit non-zero early under set -e), but downgrades pure
        # seed/generated STALENESS to an advisory ::warning::. Authors no longer
        # hand-rebuild the seed to get a green PR — the seed-rebuild.yml workflow
        # auto-commits the refreshed seed on merge to master (GC-2).
        env:
          SERVICES_REPO: ${{ github.workspace }}/services
        run: |
          scripts/build-awareness-graph.sh --warn-stale

      - name: Inferred proto contracts are fresh (architectural spine Stage B)
        # The contract.* nodes inferred from proto/awareness_graph.proto are
        # generated by cmd/proto-scan and committed. This gate fails if the
        # committed YAML drifts from the .proto. In-repo, no services repo needed.
        run: make proto-contracts-check

      - name: Inferred import graphs are fresh (component dependsOn edges)
        # The component.* dependsOn edges inferred from source imports (Go +
        # TypeScript/JS) are generated by cmd/import-scan and committed. This gate
        # fails if the committed YAML drifts from the sources. In-repo, no
        # services repo needed.
        run: make import-graph-check

      - name: Commit scope matches its message (no engine drift in docs-only commits)
        # If HEAD's message claims docs-only / no-engine-change scope but the
        # diff touches golang/ cmd/ internal/, that's the 765037e drift class.
        # See docs/commit-integrity-notes.md. Add [engine-ack] to acknowledge
        # an intentional engine change in an otherwise-docs commit.
        run: scripts/check-commit-scope.sh HEAD

      - name: Principle pack matches canonical corpus (no drift)
        # The portable pack (templates + docs/awareness/generic) is GENERATED
        # from the one canonical corpus. This gate fails if either output is
        # stale — the pack physically cannot diverge from the source.
        run: |
          python3 scripts/sync-principle-pack.py \
            --services "${{ github.workspace }}/services" --check

      - name: Onboarding docs claim the real principle count (self-updating)
        # The shipping pack is the source of truth. Any doc stating a TOTAL
        # principle count must state the pack's count, and the README category
        # table must sum to it. Self-updating from the pack — replaces the old
        # hard-coded "18" guard so the 98->133 class of drift can't merge
        # silently again. (Per-category "(N principles)" / "| N |" forms are
        # deliberately NOT matched as totals.)
        run: |
          DOCS="README.md QUICKSTART.md INSTALL.md docs/quickstart.md docs/meta-principles.md docs/case-study-cold-start.md docs/blog/awg-introduction.md examples/payment-cold-start/README.md"
          PACK=$(grep -cE '^  - id: meta\.' cmd/awg/templates/awareness/meta_principles.yaml)
          echo "authoritative pack count: ${PACK}"
          # Phrasings that are unambiguously a TOTAL (never a per-category count).
          PAT='[0-9]+ universal principles|[0-9]+ portable principles|[0-9]+ battle-validated meta-principles|[0-9]+ meta-principles organized|[0-9]+ principles across|grown to [0-9]+ across|all [0-9]+ principles|all [0-9]+ is the generated|categories, [0-9]+ principles|the [0-9]+ meta-principles in'
          bad=$(grep -rhoE "$PAT" $DOCS 2>/dev/null | grep -oE '[0-9]+' | sort -u | grep -vx "${PACK}" || true)
          if [ -n "$bad" ]; then
            echo "::error::docs state principle-count(s) [$bad] but the pack has ${PACK}. Update the headline + category tables."
            grep -rnoE "$PAT" $DOCS 2>/dev/null || true
            exit 1
          fi
          # The README category table must sum to the pack count.
          SUM=$(grep -oE '\*\*(Authority|Signal|Lifecycle|Dependency|Perception|Composition|Structure|Evolution)\*\* \| [0-9]+' README.md | grep -oE '[0-9]+$' | awk '{s+=$1} END{print s}')
          if [ "$SUM" != "${PACK}" ]; then
            echo "::error::README category table sums to ${SUM}, but the pack has ${PACK}. Fix the per-category counts."
            exit 1
          fi
          echo "onboarding docs: total count and README category table both match the pack (${PACK})"

      - name: Run tests
        # principle-check tests read services-repo YAML (architectural
        # declarations, alert rules) — they still need SERVICES_REPO for
        # cross-repo integration checks, but meta-principle coverage ownership
        # is local to awareness-graph.
        env:
          SERVICES_REPO: ${{ github.workspace }}/services
        run: go test ./... -count=1 -timeout 120s

      - name: "Cold-start smoke (stranger path: init -> serve -no-seed -> build -> briefing)"
        # Fetches the upstream Oxigraph binary, scaffolds a throwaway project
        # in /tmp, and proves the standalone path end to end — including the
        # negative check that Globular-only seed knowledge does NOT leak.
        run: |
          scripts/fetch-oxigraph.sh
          scripts/smoke-cold-start.sh

      - name: "Example smoke: money-scar cold-start proof (examples/orders-money-scar)"
        # Keeps the committed external example green: init -> human scar ->
        # build -strict -> no Globular-seed leak -> task briefing surfaces the
        # critical money invariant -> the required test shows float (899c)
        # diverging from the AWG-guided integer path (900c). Reuses the
        # bin/oxigraph fetched by the step above; its own ports (10288/7888).
        run: examples/orders-money-scar/run.sh

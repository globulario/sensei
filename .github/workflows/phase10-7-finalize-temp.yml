name: Phase 10.7 finalize implementation

on:
  push:
    branches:
      - codex/phase10-7-agent-surfaces

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase10-7-agent-surfaces
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Apply Phase 10.7 implementation
        shell: bash
        run: |
          cat > /tmp/phase10-7.patch.gz.b64 <<'PAYLOAD'
[...TRUNCATED_FOR_TOOL_CALL...]
PAYLOAD
          base64 -d /tmp/phase10-7.patch.gz.b64 > /tmp/phase10-7.patch.gz
          gzip -dc /tmp/phase10-7.patch.gz > /tmp/phase10-7.patch
          git apply --index /tmp/phase10-7.patch
          rm -f .github/workflows/phase10-7-finalize-temp.yml
          git add -A
      - name: Format exact Go 1.25 sources
        shell: bash
        run: |
          gofmt -w golang/architecture/investigationsurface \
            cmd/awg/cmd_investigate.go \
            cmd/awg/cmd_candidates.go \
            cmd/awg/cmd_evidence_phase10.go \
            cmd/awg/cmd_evidence.go \
            cmd/awg/main.go \
            cmd/awareness-mcp/main.go \
            cmd/awareness-mcp/phase10_tools.go \
            cmd/awareness-mcp/phase10_tools_test.go
          git add -A
      - name: Regenerate import graphs
        run: |
          make import-graph
          git add docs/awareness/generated/awareness_graph_*_import_graph.yaml
      - name: Test Phase 10.7 surfaces
        run: |
          go test ./golang/architecture/investigationsurface -count=10
          go test ./cmd/awareness-mcp -count=1
          go test ./cmd/awg -count=1
          go test -race ./golang/architecture/investigationsurface ./cmd/awareness-mcp
      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name "sensei-phase10-agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(phase10): expose investigation agent surfaces [engine-ack]"
          git push origin HEAD:codex/phase10-7-agent-surfaces

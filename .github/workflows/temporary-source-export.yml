name: Temporary apply symbol-aware briefing patch

on:
  pull_request:
    branches:
      - phase10-architectural-investigation
    paths:
      - '.github/workflows/temporary-source-export.yml'

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum
      - name: Reassemble exact implementation patch
        shell: bash
        run: |
          cat \
            .github/patch.part.00 \
            .github/patch.part.01 \
            .github/patch.part.02.0 \
            .github/patch.part.02.1 \
            .github/patch.part.02.2 \
            > /tmp/symbol-aware-briefing.patch.b64
          echo 'ad14519cfcfac204fd73c59fe5301d4c4d21d8ce8ae7ff75cde1df93a62096cd  /tmp/symbol-aware-briefing.patch.b64' | sha256sum -c -
          base64 -d /tmp/symbol-aware-briefing.patch.b64 > /tmp/symbol-aware-briefing.patch
          echo '8b51da67b8a114a5e1cba23a88ccccf14930b7bbb1fb6198ca39be8a7683d3c9  /tmp/symbol-aware-briefing.patch' | sha256sum -c -
      - name: Apply and format implementation
        shell: bash
        run: |
          git apply --check /tmp/symbol-aware-briefing.patch
          git apply /tmp/symbol-aware-briefing.patch
          gofmt -w \
            golang/scipingest/scipingest.go \
            golang/scipingest/scipingest_test.go \
            golang/server/briefing.go \
            golang/server/code_symbol.go \
            golang/server/provenance_serving_test.go \
            golang/server/reference_sites_test.go
          git diff --check
      - name: Verify generated contracts remain fresh
        run: |
          scripts/build-awareness-graph-self.sh --check
          make proto-contracts-check
          make import-graph-check
      - name: Run focused tests
        run: |
          go test ./golang/scipingest -run TestIngest_Symbols -count=1
          go test ./golang/server -run 'TestCodeSymbolIDFromIRI|TestBriefing_Provenance_RenderedForPromotedRule' -count=1
      - name: Publish verified implementation and remove temporary transfer files
        shell: bash
        run: |
          rm -f \
            .github/patch.part.00 \
            .github/patch.part.01 \
            .github/patch.part.02 \
            .github/patch.part.02.0 \
            .github/patch.part.02.1 \
            .github/patch.part.02.2
          rm .github/workflows/temporary-source-export.yml
          git config user.name 'Codex'
          git config user.email 'codex@openai.invalid'
          git add -A
          git commit -m 'feat(briefing): resolve exact code-symbol targets'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

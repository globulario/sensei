name: Phase 10.7 workspace export

on:
  push:
    branches:
      - codex/phase10-7-agent-surfaces

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase10-7-agent-surfaces
          fetch-depth: 0
      - name: Export exact repository tree
        run: |
          tar --exclude=.git --exclude=.github/workflows/phase10-7-export-temp.yml -czf /tmp/sensei-phase10-7.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: sensei-phase10-7-workspace
          path: /tmp/sensei-phase10-7.tgz

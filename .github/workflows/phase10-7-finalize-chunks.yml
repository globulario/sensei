name: Phase 10.7 finalize chunks

on:
  push:
    branches:
      - codex/phase10-7-agent-surfaces
  pull_request:
    branches:
      - phase10-architectural-investigation

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase10-7-agent-surfaces
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Reconstruct and apply exact patch
        shell: bash
        run: |
          cat .github/phase10-7-payload/part* | tr -d '\n' > /tmp/phase10-7.patch.gz.b64
          base64 -d /tmp/phase10-7.patch.gz.b64 > /tmp/phase10-7.patch.gz
          echo '859085e2edb410b5490b87b1c8ec5b1e56a7c11c8cc9f9c79231119adbea1963  /tmp/phase10-7.patch.gz' | sha256sum -c -
          gzip -dc /tmp/phase10-7.patch.gz > /tmp/phase10-7.patch
          git rm -rf --ignore-unmatch golang/architecture/investigationsurface
          git apply --index /tmp/phase10-7.patch
          python3 - <<'PY'
          from pathlib import Path
          path = Path('golang/architecture/investigationsurface/surface_test.go')
          text = path.read_text()
          text = text.replace(
              'const surfaceSHA = "4a8e63db7cc5173b82bd3ba6019d30ce9e22db84d852bd3ba6019d30ce922db8"',
              'const (\n\tsurfaceSHA = "4a8e63db7cc5173b82bd3ba6019d30ce9e22db84d852bd3ba6019d30ce922db8"\n\tcontentSHA = "ed7002b439e9ac845f22357d822bac1444730fbdb6016d3ec9432297b9ec9f73"\n)',
          )
          text = text.replace(
              'ContentDigestSHA256: surfaceSHA, CapturedContent: "content"',
              'ContentDigestSHA256: contentSHA, CapturedContent: "content"',
          )
          path.write_text(text)
          PY
          rm -rf .github/phase10-7-payload
          rm -rf .phase10-7
          rm -f .github/workflows/phase10-7-export-temp.yml
          rm -f .github/workflows/phase10-7-finalize-temp.yml
          rm -f .github/workflows/phase10-7-finalize-chunks.yml
          rm -f .github/workflows/phase10-7-apply-temp.yml
          git add -A
      - name: Format exact Go 1.25 sources
        shell: bash
        run: |
          gofmt -w golang/architecture/investigationsurface \
            cmd/awg/cmd_investigate.go \
            cmd/awg/cmd_candidates.go \
            cmd/awg/cmd_evidence_phase10.go \
            cmd/awg/cmd_evidence.go \
            cmd/awg/main.go \
            cmd/awareness-mcp/main.go \
            cmd/awareness-mcp/phase10_tools.go \
            cmd/awareness-mcp/phase10_tools_test.go
          git add -A
      - name: Regenerate import graphs
        run: |
          make import-graph
          git add docs/awareness/generated/awareness_graph_*_import_graph.yaml
      - name: Test investigation surface repeatability
        shell: bash
        run: |
          set -o pipefail
          go test ./golang/architecture/investigationsurface -count=10 2>&1 | tee /tmp/phase10-7-surface.log
      - name: Upload surface failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase10-7-surface-failure
          path: /tmp/phase10-7-surface.log
      - name: Test MCP package
        run: go test ./cmd/awareness-mcp -count=1
      - name: Test CLI package
        run: go test ./cmd/awg -count=1
      - name: Test Phase 10.7 races
        run: go test -race ./golang/architecture/investigationsurface ./cmd/awareness-mcp
      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name 'sensei-phase10-agent'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat(phase10): expose investigation agent surfaces [engine-ack]'
          git push origin HEAD:codex/phase10-7-agent-surfaces

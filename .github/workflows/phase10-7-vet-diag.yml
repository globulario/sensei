name: Phase 10.7 vet diagnosis

on:
  push:
    branches:
      - codex/phase10-7-agent-surfaces

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Capture vet output
        shell: bash
        run: |
          set +e
          go vet ./... 2>&1 | tee /tmp/phase10-7-vet.log
          echo ${PIPESTATUS[0]} > /tmp/phase10-7-vet.status
          exit 0
      - name: Upload diagnosis
        uses: actions/upload-artifact@v4
        with:
          name: phase10-7-vet-diagnosis
          path: |
            /tmp/phase10-7-vet.log
            /tmp/phase10-7-vet.status

name: VS Code Extension

# Independent of the Go CI: TypeScript build/typecheck for the editor
# integration. Only runs when the extension or the proto contract it vendors
# changes, so Go-only PRs don't pay for a Node toolchain.
on:
  push:
    branches: ['**']
    paths:
      - 'editor/vscode/**'
      - 'proto/awareness_graph.proto'
      - '.github/workflows/vscode-extension.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'editor/vscode/**'
      - 'proto/awareness_graph.proto'
      - '.github/workflows/vscode-extension.yml'

jobs:
  build:
    # Checkpoint 6: the extension suite + packaging run on BOTH Ubuntu and Windows
    # so the guarded UI, the 41-proof matrix, and the packaged .vsix are validated
    # on each supported host — not Ubuntu-only.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: editor/vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editor/vscode/package-lock.json

      - name: Install
        run: npm ci

      - name: Vendored proto matches the canonical contract
        # Same "generated artifacts must be fresh" gate as the Go CI: a proto
        # change that wasn't re-vendored fails here instead of shipping a
        # .vsix that speaks an outdated contract.
        run: npm run check-proto

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package (validate the .vsix builds)
        # Workspace-relative output so the path is valid on Windows too.
        run: npx --yes @vscode/vsce package --no-git-tag-version -o sensei.vsix

      - name: Validate packaged artifact (AGPL + control-panel + proto shipped)
        # Deterministic content assertion over the actual .vsix: AGPL manifest +
        # AGPL LICENSE (no residual Apache in the extension's own files), and the
        # control-panel runtime assets + vendored proto are present. Pure Node —
        # no external unzip tool — so it is identical on Ubuntu and Windows.
        run: node scripts/verify-vsix.mjs sensei.vsix

name: GitHub App CI

on:
  pull_request:
    paths:
      - "github-app/**"
      - ".github/workflows/github-app-ci.yml"
  push:
    branches:
      - main
    paths:
      - "github-app/**"
      - ".github/workflows/github-app-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: github-app/go.mod
          cache-dependency-path: github-app/go.mod
      - name: Verify formatting
        run: |
          find . -type f -name '*.go' -print0 | xargs -0 gofmt -l > /tmp/gofmt-report.txt
          if [ -s /tmp/gofmt-report.txt ]; then
            printf 'The following files require gofmt:\n'
            cat /tmp/gofmt-report.txt
            exit 1
          fi
      - name: Upload formatting report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-app-gofmt-report
          path: /tmp/gofmt-report.txt
          if-no-files-found: error
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

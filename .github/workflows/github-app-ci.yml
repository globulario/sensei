name: GitHub App CI

on:
  pull_request:
    paths:
      - "github-app/**"
      - ".github/workflows/github-app-ci.yml"
      - ".github/workflows/github-app-image.yml"
  push:
    branches:
      - main
    paths:
      - "github-app/**"
      - ".github/workflows/github-app-ci.yml"
      - ".github/workflows/github-app-image.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: github-app/go.mod
          cache-dependency-path: github-app/go.mod
      - name: Verify formatting
        run: |
          files="$(find . -type f -name '*.go' -print0 | xargs -0 gofmt -l)"
          if [ -n "$files" ]; then
            printf 'The following files require gofmt:\n%s\n' "$files"
            exit 1
          fi
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Validate proof script syntax
        run: bash -n scripts/capture-live-proof.sh
      - name: Build container
        run: docker build --tag sensei-github-app:ci .
      - name: Validate private Compose stack
        env:
          SENSEI_GITHUB_IMAGE: ghcr.io/globulario/sensei-github-app@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          SENSEI_GITHUB_APP_ID: "1"
          SENSEI_GITHUB_HOSTNAME: sensei-app.example.com
        run: docker compose -f deploy/docker-compose.private.yml config --quiet

name: Phase 10.6 finalize

on:
  push:
    branches:
      - codex/phase10-6-deviation-learning
  pull_request:
    branches:
      - phase10-architectural-investigation

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase10-6-deviation-learning
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum
      - name: Restore certified Phase 10.5 dedup owner
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          owner = Path('golang/architecture/questiongen/investigation_questions.go')
          text = owner.read_text()
          old_import = '''import (
          	"errors"
          	"fmt"
          	"sort"
          	"strings"'''
          new_import = '''import (
          	"errors"
          	"fmt"
          	"reflect"
          	"sort"
          	"strings"'''
          if old_import in text:
              text = text.replace(old_import, new_import, 1)

          old_func = '''func appendInvestigationQuestion(dialogue *architecture.DialogueDocument, question architecture.OpenQuestion) (string, error) {
          	if existing := findQuestionByID(dialogue.OpenQuestions, question.ID); existing != nil {
          		if !questionsEquivalent(*existing, question) {
          			return "", fmt.Errorf("investigation question id collision for %s", question.ID)
          		}
          		return InvestigationDispositionExistingCovers, nil
          	}
          	dialogue.OpenQuestions = append(dialogue.OpenQuestions, question)
          	return InvestigationDispositionGenerated, nil
          }
          '''
          new_func = '''func appendInvestigationQuestion(dialogue *architecture.DialogueDocument, question architecture.OpenQuestion) (string, error) {
          	normalized, err := architecture.NormalizeOpenQuestions([]architecture.OpenQuestion{question})
          	if err != nil {
          		return "", fmt.Errorf("normalize investigation question %s: %w", question.ID, err)
          	}
          	question = normalized[0]
          	if existing := findQuestionByID(dialogue.OpenQuestions, question.ID); existing != nil {
          		existingNormalized, normalizeErr := architecture.NormalizeOpenQuestions([]architecture.OpenQuestion{*existing})
          		if normalizeErr != nil {
          			return "", fmt.Errorf("normalize existing investigation question %s: %w", existing.ID, normalizeErr)
          		}
          		if !investigationQuestionsEquivalent(existingNormalized[0], question) {
          			return "", fmt.Errorf("investigation question id collision for %s", question.ID)
          		}
          		return InvestigationDispositionExistingCovers, nil
          	}
          	dialogue.OpenQuestions = append(dialogue.OpenQuestions, question)
          	return InvestigationDispositionGenerated, nil
          }

          func investigationQuestionsEquivalent(left, right architecture.OpenQuestion) bool {
          	left.Status = ""
          	left.ResolvedByAnswers = nil
          	left.SupersededByQuestion = ""
          	left.CreatedAt = ""
          	left.LastReviewedAt = ""
          	right.Status = ""
          	right.ResolvedByAnswers = nil
          	right.SupersededByQuestion = ""
          	right.CreatedAt = ""
          	right.LastReviewedAt = ""
          	return reflect.DeepEqual(left, right)
          }
          '''
          if old_func not in text:
              if 'func investigationQuestionsEquivalent' not in text:
                  raise SystemExit('canonical dedup patch anchor not found')
          else:
              text = text.replace(old_func, new_func, 1)
          owner.write_text(text)

          test = Path('golang/architecture/questiongen/deviation_questions_test.go')
          text = test.read_text()
          text = text.replace('\t"encoding/json"\n', '', 1)
          old_failure = '''	if !reflect.DeepEqual(first.Dialogue, second.Dialogue) {
          		firstJSON, _ := json.MarshalIndent(first.Dialogue, "", "  ")
          		secondJSON, _ := json.MarshalIndent(second.Dialogue, "", "  ")
          		t.Fatalf("repeated generation changed canonical dialogue lifecycle state\\nFIRST:\\n%s\\nSECOND:\\n%s", firstJSON, secondJSON)
          	}'''
          new_failure = '''	if !reflect.DeepEqual(first.Dialogue, second.Dialogue) {
          		t.Fatal("repeated generation changed canonical dialogue lifecycle state")
          	}'''
          if old_failure in text:
              text = text.replace(old_failure, new_failure, 1)
          test.write_text(text)
          PY
      - name: Format Phase 10.6 files
        run: |
          gofmt -w golang/architecture/deviation golang/architecture/questiongen/investigation_questions.go golang/architecture/questiongen/deviation_questions.go golang/architecture/questiongen/deviation_questions_test.go
      - name: Deviation repeatability
        run: go test ./golang/architecture/deviation -count=10
      - name: Deviation race
        run: go test -race ./golang/architecture/deviation -count=1
      - name: Deviation question repeatability
        run: go test ./golang/architecture/questiongen -run 'TestGenerateFromDeviation' -count=10
      - name: Governed promotion boundary
        run: go test ./golang/architecture/questiongen -run 'TestDeviationQuestion' -count=10
      - name: Questiongen full package
        run: go test ./golang/architecture/questiongen -count=1
      - name: Deviation question race
        run: go test -race ./golang/architecture/questiongen -run 'TestGenerateFromDeviation|TestDeviationQuestion' -count=1
      - name: Refresh generated import graph
        run: |
          make import-graph
          make import-graph-check
      - name: Remove workflow and publish exact result
        run: |
          rm .github/workflows/phase10-6-finalize-temp.yml
          git config user.name "sensei-phase10-builder"
          git config user.email "actions@users.noreply.github.com"
          git add golang/architecture/deviation golang/architecture/questiongen/investigation_questions.go golang/architecture/questiongen/deviation_questions.go golang/architecture/questiongen/deviation_questions_test.go docs/awareness/generated .github/workflows/phase10-6-finalize-temp.yml
          git commit -m "feat(deviation): route repeated friction through governance"
          git push origin HEAD:codex/phase10-6-deviation-learning

name: Phase 10.6 finalize

on:
  push:
    branches:
      - codex/phase10-6-deviation-learning
  pull_request:
    branches:
      - phase10-architectural-investigation

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase10-6-deviation-learning
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum
      - name: Format Phase 10.6 files
        run: |
          gofmt -w golang/architecture/deviation golang/architecture/questiongen/deviation_questions.go golang/architecture/questiongen/deviation_questions_test.go
      - name: Deviation repeatability
        run: go test ./golang/architecture/deviation -count=10
      - name: Deviation race
        run: go test -race ./golang/architecture/deviation -count=1
      - name: Routes repeated patterns
        run: go test ./golang/architecture/questiongen -run '^TestGenerateFromDeviationRoutesOnlyRepeatedPatterns$' -count=10
      - name: Keeps one occurrence local
        run: go test ./golang/architecture/questiongen -run '^TestGenerateFromDeviationOneOccurrenceRemainsEvidenceOnly$' -count=10
      - name: Deduplicates questions
        run: go test ./golang/architecture/questiongen -run '^TestGenerateFromDeviationIsDeterministicAndDeduplicates$' -count=10
      - name: Preserves governed promotion boundary
        run: go test ./golang/architecture/questiongen -run '^TestDeviationQuestionAnswerPathDoesNotPromoteOrWeakenCandidate$' -count=10
      - name: Refuses stale analysis
        run: go test ./golang/architecture/questiongen -run '^TestGenerateFromDeviationRefusesStaleAnalysisReceipt$' -count=10
      - name: Questiongen full package
        run: go test ./golang/architecture/questiongen -count=1
      - name: Deviation question race
        run: go test -race ./golang/architecture/questiongen -run 'TestGenerateFromDeviation|TestDeviationQuestion' -count=1
      - name: Refresh generated import graph
        run: |
          make import-graph
          make import-graph-check
      - name: Remove workflow and publish exact result
        run: |
          rm .github/workflows/phase10-6-finalize-temp.yml
          git config user.name "sensei-phase10-builder"
          git config user.email "actions@users.noreply.github.com"
          git add golang/architecture/deviation golang/architecture/questiongen/deviation_questions.go golang/architecture/questiongen/deviation_questions_test.go docs/awareness/generated .github/workflows/phase10-6-finalize-temp.yml
          git commit -m "feat(deviation): route repeated friction through governance"
          git push origin HEAD:codex/phase10-6-deviation-learning
